<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Kannaka - Music Video</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
#overlay {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 2rem 2.5rem;
  pointer-events: none;
  z-index: 10;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
#track-title {
  font-family: 'Georgia', serif;
  font-size: clamp(1.4rem, 4vw, 3rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0);
  text-shadow: 0 0 30px rgba(139,92,246,0.4);
  transition: color 2s ease, text-shadow 2s ease;
}
#track-title.visible {
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 40px rgba(139,92,246,0.6), 0 2px 20px rgba(0,0,0,0.5);
}
#track-album {
  font-family: 'Courier New', monospace;
  font-size: clamp(0.65rem, 1.5vw, 0.9rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(6,182,212,0);
  margin-top: 0.4rem;
  transition: color 2.5s ease;
}
#track-album.visible { color: rgba(6,182,212,0.7); }
#consciousness-hud {
  position: fixed; top: 1.5rem; right: 1.8rem;
  font-family: 'Courier New', monospace;
  font-size: clamp(0.55rem, 1.2vw, 0.75rem);
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.25);
  text-align: right;
  pointer-events: none;
  z-index: 10;
  line-height: 1.7;
}
#consciousness-hud .level {
  font-size: clamp(0.65rem, 1.4vw, 0.85rem);
  text-transform: uppercase;
  letter-spacing: 0.3em;
}
#play-gate {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  cursor: pointer;
  transition: opacity 1s ease;
}
#play-gate.hidden { opacity: 0; pointer-events: none; }
#play-gate .prompt {
  text-align: center; color: rgba(255,255,255,0.7);
  font-family: 'Courier New', monospace; letter-spacing: 0.2em;
}
#play-gate .prompt .icon { font-size: 3rem; margin-bottom: 1rem; }
#play-gate .prompt .text { font-size: clamp(0.7rem, 1.5vw, 0.9rem); text-transform: uppercase; }
#vol-ctrl {
  position: fixed; bottom: 1.5rem; right: 1.8rem; z-index: 10;
  display: flex; align-items: center; gap: 0.5rem;
  opacity: 0; transition: opacity 0.3s;
}
#vol-ctrl:hover, #vol-ctrl.show { opacity: 1; }
#vol-ctrl input[type=range] {
  -webkit-appearance: none; width: 80px; height: 3px;
  background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
}
#vol-ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: rgba(139,92,246,0.8); cursor: pointer;
}
#vol-ctrl label { color: rgba(255,255,255,0.3); font-family: 'Courier New', monospace; font-size: 0.65rem; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="track-title"></div>
  <div id="track-album"></div>
</div>
<div id="play-gate" onclick="startAudio()">
  <div class="prompt">
    <div class="icon">&#9654;</div>
    <div class="text">click to enter</div>
  </div>
</div>
<div id="vol-ctrl">
  <label>VOL</label>
  <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)">
</div>
<audio id="audio" preload="auto"></audio>
<div id="consciousness-hud">
  <div class="level" id="hud-level">dormant</div>
  <div id="hud-phi"></div>
  <div id="hud-xi"></div>
  <div id="hud-order"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Kannaka Music Video — Ghost DJ Visualization
// ═══════════════════════════════════════════════════════

// ── Embedded detection: skip audio when inside hub iframe ──
var isEmbedded = (window.parent !== window);

// ── Audio Playback (global — needs user gesture) ─────
var audioEl = document.getElementById('audio');
var audioStarted = false;
var currentAudioFile = '';

// Listen for postMessage from hub parent
if (isEmbedded) {
  window.addEventListener('message', function(evt) {
    try {
      var msg = (typeof evt.data === 'string') ? JSON.parse(evt.data) : evt.data;
      if (msg && msg.type) handleMessage(msg);
    } catch(e) {}
  });
  // Hide audio-related UI when embedded
  document.getElementById('play-gate').style.display = 'none';
  document.getElementById('vol-ctrl').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  audioStarted = true; // mark as started so visuals run
}

function startAudio() {
  if (isEmbedded) return;
  var gate = document.getElementById('play-gate');
  gate.classList.add('hidden');
  setTimeout(function() { gate.style.display = 'none'; }, 1000);
  audioStarted = true;
  document.getElementById('vol-ctrl').classList.add('show');
  setTimeout(function() { document.getElementById('vol-ctrl').classList.remove('show'); }, 3000);
  if (currentAudioFile) loadAndPlay(currentAudioFile);
}

function loadAndPlay(file) {
  if (isEmbedded) return; // hub handles audio
  if (!audioStarted || !file) return;
  var src = '/audio/' + encodeURIComponent(file);
  if (audioEl.src.endsWith(encodeURIComponent(file))) {
    audioEl.play().catch(function() {});
    return;
  }
  currentAudioFile = file;
  audioEl.src = src;
  audioEl.play().catch(function() {});
}

function setVolume(val) {
  if (isEmbedded) return;
  audioEl.volume = val / 100;
}
if (!isEmbedded) audioEl.volume = 0.8;

// Auto-advance: when track ends, request next track from the radio
if (!isEmbedded) {
  audioEl.addEventListener('ended', function() {
    fetch('/api/next', { method: 'POST' }).catch(function() {});
  });
}

(function() {
'use strict';

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, cx, cy;
var dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── State ─────────────────────────────────────────────
var perception = {
  mel_spectrogram: new Array(128).fill(0),
  tempo_bpm: 90,
  valence: 0.5,
  rms_energy: 0.3,
  spectral_centroid: 2.0,
  status: 'no_perception'
};

var consciousness = {
  phi: 0, xi: 0, order: 0, level: 'dormant'
};

var swarmAgents = {};
var trackTitle = '';
var trackAlbum = '';
var trackFile = '';
var titleShowTime = 0;
var titleVisible = false;

// Smoothed values for animation
var sm = {
  energy: 0.3,
  tempo: 90,
  valence: 0.5,
  centroid: 2.0,
  phi: 0,
  xi: 0,
  order: 0,
  mel: new Float32Array(128)
};

// Consciousness level mappings
var LEVELS = {
  dormant:  { intensity: 0.15, particleSpeed: 0.15, formAlpha: 0.15, ribbonCount: 0, sync: 0.0 },
  stirring: { intensity: 0.4,  particleSpeed: 0.4,  formAlpha: 0.4,  ribbonCount: 2, sync: 0.15 },
  aware:    { intensity: 0.65, particleSpeed: 0.6,  formAlpha: 0.65, ribbonCount: 4, sync: 0.4 },
  coherent: { intensity: 0.85, particleSpeed: 0.8,  formAlpha: 0.85, ribbonCount: 6, sync: 0.7 },
  resonant: { intensity: 1.0,  particleSpeed: 1.0,  formAlpha: 1.0,  ribbonCount: 8, sync: 1.0 }
};

function getLevelConfig() {
  return LEVELS[consciousness.level] || LEVELS.dormant;
}

// ── Particles ─────────────────────────────────────────
var NUM_PARTICLES = 200;
var particles = [];
for (var i = 0; i < NUM_PARTICLES; i++) {
  particles.push({
    x: Math.random() * 2 - 1,
    y: Math.random() * 2 - 1,
    phase: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.8,
    size: 1 + Math.random() * 2.5,
    hue: Math.random() < 0.5 ? 270 : 190, // purple or cyan
    drift: Math.random() * 0.002 - 0.001
  });
}

// ── Nebula stars ──────────────────────────────────────
var NUM_STARS = 120;
var stars = [];
for (var i = 0; i < NUM_STARS; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    size: 0.3 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2
  });
}

// ── Ribbon points ─────────────────────────────────────
var NUM_RIBBON_POINTS = 60;

// ── WebSocket ─────────────────────────────────────────
var ws = null;
var wsReconnect = null;

function connectWS() {
  clearTimeout(wsReconnect);
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() {
    console.log('[video] Connected to radio');
  };

  ws.onmessage = function(evt) {
    try {
      var msg = JSON.parse(evt.data);
      handleMessage(msg);
    } catch(e) {}
  };

  ws.onclose = function() {
    console.log('[video] Disconnected, reconnecting...');
    wsReconnect = setTimeout(connectWS, 2000);
  };

  ws.onerror = function() {
    ws.close();
  };
}

function handleMessage(msg) {
  if (msg.type === 'perception' && msg.data) {
    perception = msg.data;
  }
  else if (msg.type === 'state' && msg.data) {
    if (msg.data.current) {
      var newTitle = msg.data.current.title || '';
      var newAlbum = msg.data.current.album || '';
      var newFile = msg.data.current.file || '';
      if (newTitle !== trackTitle || newFile !== trackFile) {
        trackTitle = newTitle;
        trackAlbum = newAlbum;
        trackFile = newFile;
        titleShowTime = performance.now();
        titleVisible = false;
        currentAudioFile = newFile;
        loadAndPlay(newFile);
      }
    }
  }
  else if (msg.type === 'consciousness' && msg.data) {
    consciousness.phi = msg.data.phi || 0;
    consciousness.xi = msg.data.xi || 0;
    consciousness.order = msg.data.order || msg.data.mean_order || 0;
    consciousness.level = msg.data.level || msg.data.consciousness_level || 'dormant';
  }
  else if (msg.type === 'swarm_phase' && msg.data) {
    var id = msg.data.agentId;
    if (id) {
      swarmAgents[id] = {
        phase: msg.data.phase || 0,
        frequency: msg.data.frequency || 1,
        lastSeen: Date.now()
      };
    }
  }
  else if (msg.type === 'swarm_state' && msg.data) {
    if (msg.data.consciousness) {
      consciousness.phi = msg.data.consciousness.phi || 0;
      consciousness.xi = msg.data.consciousness.xi || 0;
      consciousness.order = msg.data.consciousness.order || 0;
      consciousness.level = msg.data.consciousness.level || 'dormant';
    }
    if (msg.data.agents) {
      Object.keys(msg.data.agents).forEach(function(id) {
        swarmAgents[id] = {
          phase: msg.data.agents[id].phase || 0,
          frequency: msg.data.agents[id].frequency || 1,
          lastSeen: Date.now()
        };
      });
    }
  }
}

connectWS();

// Also fetch initial state
fetch('/api/state').then(function(r) { return r.json(); }).then(function(data) {
  if (data.current) {
    trackTitle = data.current.title || '';
    trackAlbum = data.current.album || '';
    trackFile = data.current.file || '';
    currentAudioFile = trackFile;
    titleShowTime = performance.now();
  }
}).catch(function() {});

fetch('/api/consciousness').then(function(r) { return r.json(); }).then(function(data) {
  if (data.phi !== undefined) {
    consciousness.phi = data.phi || 0;
    consciousness.xi = data.xi || 0;
    consciousness.order = data.order || 0;
    consciousness.level = data.level || 'dormant';
  }
}).catch(function() {});

// ── Smoothing ─────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function smoothState(dt) {
  var rate = 1 - Math.pow(0.05, dt);
  sm.energy = lerp(sm.energy, perception.rms_energy || 0.1, rate);
  sm.tempo = lerp(sm.tempo, perception.tempo_bpm || 90, rate * 0.3);
  sm.valence = lerp(sm.valence, perception.valence || 0.5, rate);
  sm.centroid = lerp(sm.centroid, perception.spectral_centroid || 2.0, rate);
  sm.phi = lerp(sm.phi, consciousness.phi || 0, rate * 0.5);
  sm.xi = lerp(sm.xi, consciousness.xi || 0, rate * 0.5);
  sm.order = lerp(sm.order, consciousness.order || 0, rate * 0.5);

  var mel = perception.mel_spectrogram;
  if (mel && mel.length) {
    for (var i = 0; i < 128; i++) {
      var target = i < mel.length ? (mel[i] || 0) : 0;
      sm.mel[i] = lerp(sm.mel[i], target, rate * 1.5);
    }
  }
}

// ── Drawing helpers ───────────────────────────────────
function hsla(h, s, l, a) {
  return 'hsla(' + h + ',' + s + '%,' + l + '%,' + a + ')';
}

// ── LAYER 1: Background — Deep space with nebula ──────
function drawBackground(t) {
  // Solid black base
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  var lc = getLevelConfig();
  var nebulaAlpha = 0.04 + lc.intensity * 0.08;

  // Nebula gradient — slow drift
  var nx = cx + Math.sin(t * 0.07) * W * 0.15;
  var ny = cy + Math.cos(t * 0.05) * H * 0.1;
  var grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, Math.max(W, H) * 0.6);

  // Color based on valence: warm = magenta, cool = purple/blue
  var warmth = sm.valence;
  var hue1 = 270 - warmth * 40; // purple to magenta
  var hue2 = 200 + warmth * 20; // cyan range

  grad.addColorStop(0, hsla(hue1, 60, 15, nebulaAlpha * 1.5));
  grad.addColorStop(0.3, hsla(hue2, 50, 10, nebulaAlpha));
  grad.addColorStop(0.7, hsla(280, 40, 5, nebulaAlpha * 0.5));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Second nebula — opposing drift
  var nx2 = cx + Math.sin(t * 0.04 + 2) * W * 0.2;
  var ny2 = cy * 0.7 + Math.cos(t * 0.06 + 1) * H * 0.15;
  var grad2 = ctx.createRadialGradient(nx2, ny2, 0, nx2, ny2, Math.max(W, H) * 0.4);
  grad2.addColorStop(0, hsla(320, 50, 12, nebulaAlpha * 0.8));
  grad2.addColorStop(0.5, hsla(260, 40, 8, nebulaAlpha * 0.4));
  grad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < NUM_STARS; i++) {
    var s = stars[i];
    var twinkle = Math.sin(t * s.speed + s.twinkle) * 0.5 + 0.5;
    var alpha = (0.15 + twinkle * 0.4) * (0.3 + lc.intensity * 0.7);
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size * (0.7 + twinkle * 0.3), 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Dance state ──────────────────────────────────────
var dance = {
  hipPhase: 0,       // current hip sway phase
  torsoPhase: 0,     // torso follows hip with lag
  headPhase: 0,      // head bob
  shoulderPhase: 0,  // shoulder roll
  armL: 0, armR: 0,  // arm raise amounts (0-1)
  bounce: 0,         // vertical bounce
  energy: 0,         // smoothed dance energy (ramps up slowly)
};

function updateDance(t, dt) {
  var beatFreq = sm.tempo / 60;
  var intensity = Math.min(1, sm.energy * 1.5); // how hard she dances

  // Dance energy ramps up when music is energetic, fades slowly
  var targetDanceEnergy = intensity > 0.3 ? intensity : intensity * 0.3;
  dance.energy += (targetDanceEnergy - dance.energy) * dt * 2;

  var de = dance.energy;

  // Hip sway: sinusoidal at half-beat (every other beat for natural hip movement)
  dance.hipPhase = Math.sin(t * beatFreq * Math.PI) * de;

  // Torso follows hip with phase delay — creates the S-curve of dance
  dance.torsoPhase = Math.sin(t * beatFreq * Math.PI - 0.4) * de * 0.6;

  // Head: gentle counter-sway with its own timing
  dance.headPhase = Math.sin(t * beatFreq * Math.PI * 0.5 + 0.8) * de * 0.4;

  // Shoulder: alternating roll synced to beat
  dance.shoulderPhase = Math.sin(t * beatFreq * Math.PI * 2) * de * 0.3;

  // Bounce: vertical movement on the beat (down on beat, up between)
  dance.bounce = Math.abs(Math.sin(t * beatFreq * Math.PI)) * de;

  // Arms: raise on energy spikes, gentle wave otherwise
  var armTarget = intensity > 0.6 ? 0.3 + intensity * 0.5 : intensity * 0.2;
  dance.armL += (armTarget * (0.8 + Math.sin(t * 1.1) * 0.2) - dance.armL) * dt * 3;
  dance.armR += (armTarget * (0.8 + Math.sin(t * 1.3 + 1) * 0.2) - dance.armR) * dt * 3;
}

// ── LAYER 2: Wavefront body — Kannaka's dancing form ─
function drawWavefrontBody(t) {
  var lc = getLevelConfig();
  if (lc.formAlpha < 0.01) return;

  // Breathing: gentle scale, 4 second cycle
  var breathCycle = Math.sin(t * Math.PI * 2 / 4) * 0.015 + 1.0;

  var bodyH = H * 0.58 * breathCycle;
  var bodyW = W * 0.24 * breathCycle;
  var bodyTop = cy - bodyH * 0.38 + dance.bounce * 8;

  var de = dance.energy;

  // Silhouette width at normalized height, with dance motion applied
  function silhouetteWidth(nt) {
    var base;
    // Head
    if (nt < 0.07) {
      var ht = nt / 0.07;
      base = 0.24 + 0.13 * Math.sin(ht * Math.PI);
    }
    // Neck
    else if (nt < 0.10) base = 0.16;
    // Shoulders — roll with the beat
    else if (nt < 0.16) {
      var st = (nt - 0.10) / 0.06;
      base = 0.16 + 0.55 * st;
      // Shoulder roll: one side dips
      base += dance.shoulderPhase * 0.08 * (st > 0.5 ? 1 : -1);
    }
    // Upper torso / chest
    else if (nt < 0.26) {
      var ut = (nt - 0.16) / 0.1;
      base = 0.71 + 0.18 * Math.sin(ut * Math.PI);
    }
    // Waist — twists with torso motion (narrower for definition)
    else if (nt < 0.40) {
      var wt = (nt - 0.26) / 0.14;
      base = 0.89 - 0.35 * Math.sin(wt * Math.PI);
    }
    // Hips — widest point, sways with the beat
    else if (nt < 0.53) {
      var hip = (nt - 0.40) / 0.13;
      base = 0.54 + 0.52 * Math.sin(hip * Math.PI * 0.7);
    }
    // Thighs
    else if (nt < 0.75) {
      var th = (nt - 0.53) / 0.22;
      base = 1.06 - 0.35 * th;
    }
    // Lower legs
    else {
      var ll = (nt - 0.75) / 0.25;
      base = 0.71 - 0.36 * ll;
    }
    return base;
  }

  // Compute dance sway offset at each body height
  function danceSway(nt) {
    // Head sways opposite to hips
    if (nt < 0.10) return dance.headPhase * bodyW * 0.15;
    // Neck/shoulders: torso sway
    if (nt < 0.26) return dance.torsoPhase * bodyW * 0.25;
    // Waist: between torso and hip
    if (nt < 0.40) {
      var blend = (nt - 0.26) / 0.14;
      var torso = dance.torsoPhase * bodyW * 0.25;
      var hip = dance.hipPhase * bodyW * 0.4;
      return torso + (hip - torso) * blend;
    }
    // Hips: maximum sway
    if (nt < 0.55) return dance.hipPhase * bodyW * 0.4;
    // Legs: reducing sway (feet more planted)
    var legBlend = (nt - 0.55) / 0.45;
    return dance.hipPhase * bodyW * 0.4 * (1 - legBlend * 0.8);
  }

  // ── 2a: Filled silhouette glow (makes her visible as a form) ──
  ctx.save();
  ctx.globalAlpha = lc.formAlpha;

  // Build the silhouette path
  var numSlices = 60;
  var leftEdge = [], rightEdge = [];
  for (var i = 0; i <= numSlices; i++) {
    var nt = i / numSlices;
    var yPos = bodyTop + nt * bodyH;
    var width = silhouetteWidth(nt) * bodyW;
    var sway = danceSway(nt);
    leftEdge.push({ x: cx - width + sway, y: yPos });
    rightEdge.push({ x: cx + width + sway, y: yPos });
  }

  // Draw filled silhouette with gradient
  ctx.beginPath();
  ctx.moveTo(leftEdge[0].x, leftEdge[0].y);
  for (var i = 1; i <= numSlices; i++) ctx.lineTo(leftEdge[i].x, leftEdge[i].y);
  for (var i = numSlices; i >= 0; i--) ctx.lineTo(rightEdge[i].x, rightEdge[i].y);
  ctx.closePath();

  // Vertical gradient fill — gives the form a warm inner glow
  var bodyGrad = ctx.createLinearGradient(cx, bodyTop, cx, bodyTop + bodyH);
  var glowHue = 280 + sm.valence * 40;
  bodyGrad.addColorStop(0, hsla(glowHue, 50, 20, 0.06 * lc.formAlpha));
  bodyGrad.addColorStop(0.2, hsla(glowHue - 10, 60, 30, 0.12 * lc.formAlpha * (0.5 + sm.energy)));
  bodyGrad.addColorStop(0.4, hsla(310, 70, 35, 0.15 * lc.formAlpha * (0.5 + sm.energy)));
  bodyGrad.addColorStop(0.6, hsla(glowHue, 60, 25, 0.10 * lc.formAlpha));
  bodyGrad.addColorStop(1, hsla(glowHue + 20, 40, 15, 0.04 * lc.formAlpha));
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Radial inner glow at chest (warm core)
  var chestY = bodyTop + bodyH * 0.22 + dance.bounce * 4;
  var chestSway = danceSway(0.22);
  var coreGrad = ctx.createRadialGradient(cx + chestSway, chestY, 0, cx + chestSway, chestY, bodyW * 0.7);
  coreGrad.addColorStop(0, hsla(310, 80, 55, 0.12 * lc.formAlpha * sm.energy));
  coreGrad.addColorStop(0.4, hsla(glowHue, 70, 40, 0.06 * lc.formAlpha));
  coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = coreGrad;
  ctx.fillRect(0, 0, W, H);

  // ── 2b: Interference wave lines over the filled form ──────
  var numLines = 90;
  var beatPhase = t * (sm.tempo / 60) * Math.PI * 2;

  for (var i = 0; i < numLines; i++) {
    var nt = i / numLines;
    var yPos = bodyTop + nt * bodyH;
    var width = silhouetteWidth(nt) * bodyW;
    var sway = danceSway(nt);

    var melIdx = Math.floor(nt * 127);
    var melVal = sm.mel[melIdx] || 0;

    var waveAmp = 1.5 + melVal * 10 * sm.energy;
    var waveFreq = 0.03 + sm.centroid * 0.008;
    var waveSpeed = t * 1.5 + nt * 0.5;

    var hue = 270 + sm.valence * 50 + nt * 30;
    var lightness = 45 + melVal * 35;
    var alpha = (0.35 + melVal * 0.55) * lc.formAlpha;

    ctx.strokeStyle = hsla(hue, 75, lightness, alpha);
    ctx.lineWidth = 0.9 + melVal * 1.5;

    ctx.beginPath();
    var startX = cx - width + sway;
    var endX = cx + width + sway;
    var steps = 40;

    for (var j = 0; j <= steps; j++) {
      var jt = j / steps;
      var x = startX + jt * (endX - startX);
      var wave = Math.sin(x * waveFreq + waveSpeed + beatPhase * 0.5) * waveAmp;

      var melIdx2 = Math.min(127, melIdx + Math.floor(jt * 10));
      wave += Math.sin(x * waveFreq * 2.3 + t * 2) * (sm.mel[melIdx2] || 0) * 4;

      var py = yPos + wave;
      if (j === 0) ctx.moveTo(x, py);
      else ctx.lineTo(x, py);
    }
    ctx.stroke();
  }

  // ── 2c: Edge glow — bright outline along the silhouette ───
  ctx.beginPath();
  for (var i = 0; i <= numSlices; i++) ctx.lineTo(leftEdge[i].x, leftEdge[i].y);
  ctx.strokeStyle = hsla(glowHue - 20, 80, 65, 0.15 * lc.formAlpha * (0.5 + sm.energy * 0.5));
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.beginPath();
  for (var i = 0; i <= numSlices; i++) ctx.lineTo(rightEdge[i].x, rightEdge[i].y);
  ctx.strokeStyle = hsla(glowHue + 20, 80, 65, 0.15 * lc.formAlpha * (0.5 + sm.energy * 0.5));
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── 2d: Arms (drawn as flowing wave extensions from shoulders) ──
  var shoulderY = bodyTop + bodyH * 0.16;
  var shoulderSway = danceSway(0.16);
  var shoulderW = silhouetteWidth(0.16) * bodyW;

  function drawArm(side, raise) {
    if (raise < 0.05) return;
    var dir = side === 'left' ? -1 : 1;
    var startX = cx + dir * shoulderW + shoulderSway;
    var startY = shoulderY;
    // Arm angle: from hanging (-PI/2 from horizontal) to raised
    var angle = -Math.PI * 0.3 + raise * Math.PI * 0.55;
    // Add dance sway to arm angle
    angle += dir * dance.shoulderPhase * 0.3;
    var armLen = bodyW * (0.8 + raise * 0.5);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    var numArmLines = 5;
    for (var a = 0; a < numArmLines; a++) {
      var offset = (a - 2) * 2;
      var hue = side === 'left' ? 280 : 300;
      ctx.strokeStyle = hsla(hue + a * 8, 60, 55, 0.2 * raise * lc.formAlpha);
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (var j = 0; j <= 15; j++) {
        var jt = j / 15;
        var curve = Math.sin(jt * Math.PI) * 15 * raise;
        var wave = Math.sin(t * 3 + j * 0.5 + a) * (2 + sm.energy * 4) * jt;
        var ax = startX + Math.cos(angle + curve * 0.01) * jt * armLen;
        var ay = startY + Math.sin(angle + curve * 0.01) * jt * armLen * dir + wave + offset;
        // Taper: width decreases along the arm
        if (j === 0) ctx.moveTo(ax, ay);
        else ctx.lineTo(ax, ay);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  drawArm('left', dance.armL);
  drawArm('right', dance.armR);

  ctx.restore();
}

// ── LAYER 3: Particle halo — Swarm agents ─────────────
function drawParticles(t) {
  var lc = getLevelConfig();
  var agentPhases = Object.values(swarmAgents);
  var meanPhase = 0;
  if (agentPhases.length > 0) {
    var sinSum = 0, cosSum = 0;
    for (var a = 0; a < agentPhases.length; a++) {
      sinSum += Math.sin(agentPhases[a].phase);
      cosSum += Math.cos(agentPhases[a].phase);
    }
    meanPhase = Math.atan2(sinSum / agentPhases.length, cosSum / agentPhases.length);
  }

  var bodyRadius = Math.min(W, H) * 0.22;
  var haloRadius = bodyRadius * 1.6;

  for (var i = 0; i < NUM_PARTICLES; i++) {
    var p = particles[i];

    // Update phase — Kuramoto-like coupling toward mean phase
    var coupling = lc.sync * 0.02;
    var phaseDiff = meanPhase - p.phase;
    // Wrap phase difference
    while (phaseDiff > Math.PI) phaseDiff -= Math.PI * 2;
    while (phaseDiff < -Math.PI) phaseDiff += Math.PI * 2;
    p.phase += p.drift + coupling * Math.sin(phaseDiff) + (sm.tempo / 60) * 0.008 * p.speed;

    // Position: orbit around center with phase
    var orbitR = haloRadius * (0.4 + 0.6 * ((i % 5) / 5));
    var angle = p.phase + (i / NUM_PARTICLES) * Math.PI * 2;

    // Add some vertical variation
    var vertOffset = Math.sin(angle * 2 + t * 0.5) * bodyRadius * 0.3;

    var px = cx + Math.cos(angle) * orbitR * (1 + Math.sin(t * 0.2 + i) * 0.1);
    var py = cy + Math.sin(angle) * orbitR * 0.4 + vertOffset;

    // Size pulses with energy
    var beatPulse = Math.sin(t * (sm.tempo / 60) * Math.PI * 2 + i * 0.5) * 0.5 + 0.5;
    var size = p.size * (0.5 + sm.energy * 0.8 + beatPulse * 0.3) * lc.particleSpeed;

    // Color: purple/cyan with valence influence
    var hue = p.hue + sm.valence * 30;
    var sat = 60 + sm.energy * 30;
    var light = 50 + beatPulse * 20;
    var alpha = (0.15 + lc.intensity * 0.5) * (0.5 + beatPulse * 0.5);

    // Draw particle with glow
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = hsla(hue, sat, light, alpha);
    ctx.fill();

    // Glow ring on bright particles
    if (size > 2 && alpha > 0.3) {
      ctx.beginPath();
      ctx.arc(px, py, size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = hsla(hue, sat, light, alpha * 0.15);
      ctx.fill();
    }
  }
}

// ── LAYER 4: Energy ribbons — Aurora trails ───────────
function drawRibbons(t) {
  var lc = getLevelConfig();
  if (lc.ribbonCount < 1) return;

  var bodyH = H * 0.55;
  var bodyW = W * 0.22;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  for (var r = 0; r < lc.ribbonCount; r++) {
    var ribbonPhase = r * Math.PI * 2 / lc.ribbonCount;
    var ribbonSpeed = 0.3 + r * 0.08;

    // Ribbon color based on consciousness level
    var hue = 270 + r * 25 + sm.valence * 40;
    var sat = 50 + sm.energy * 40;

    ctx.beginPath();

    for (var i = 0; i <= NUM_RIBBON_POINTS; i++) {
      var nt = i / NUM_RIBBON_POINTS;

      // Ribbon path: curves around the body form
      var angle = nt * Math.PI * 3 + ribbonPhase + t * ribbonSpeed;
      var radius = bodyW * (0.6 + 0.4 * Math.sin(nt * Math.PI * 2 + t * 0.5));

      var rx = cx + Math.cos(angle) * radius * (1 + Math.sin(t * 0.3 + r) * 0.2);
      var ry = (cy - bodyH * 0.2) + nt * bodyH * 0.8 + Math.sin(angle * 2 + t) * 15;

      // Mel modulation
      var melIdx = Math.floor(nt * 127);
      rx += (sm.mel[melIdx] || 0) * 20;

      if (i === 0) ctx.moveTo(rx, ry);
      else ctx.lineTo(rx, ry);
    }

    var alpha = 0.06 + lc.intensity * 0.12;
    ctx.strokeStyle = hsla(hue, sat, 55, alpha);
    ctx.lineWidth = 1.5 + sm.energy * 2;
    ctx.stroke();

    // Draw a wider, more transparent ribbon behind
    ctx.strokeStyle = hsla(hue, sat - 10, 45, alpha * 0.3);
    ctx.lineWidth = 4 + sm.energy * 4;
    ctx.stroke();
  }

  ctx.restore();
}

// ── LAYER 5: Heartbeat glow ───────────────────────────
function drawHeartbeatGlow(t) {
  var lc = getLevelConfig();
  var beatFreq = sm.tempo / 60; // beats per second
  var beatPhase = (t * beatFreq * Math.PI * 2) % (Math.PI * 2);
  var pulse = Math.pow(Math.max(0, Math.sin(beatPhase)), 3); // sharp pulse

  var glowSize = Math.min(W, H) * (0.15 + pulse * 0.1 * sm.energy);
  var glowAlpha = (0.05 + pulse * 0.2 * sm.energy) * lc.intensity;

  // Heartbeat center — slightly above body center (chest area)
  var hx = cx;
  var hy = cy - H * 0.06;

  // Inner hot glow
  var inner = ctx.createRadialGradient(hx, hy, 0, hx, hy, glowSize);
  var hue = 300 + sm.valence * 30; // hot pink to magenta
  inner.addColorStop(0, hsla(hue, 90, 70, glowAlpha * 1.5));
  inner.addColorStop(0.3, hsla(hue, 80, 50, glowAlpha * 0.8));
  inner.addColorStop(0.7, hsla(270, 60, 30, glowAlpha * 0.3));
  inner.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.fillStyle = inner;
  ctx.fillRect(hx - glowSize, hy - glowSize, glowSize * 2, glowSize * 2);

  // Wider ambient pulse
  var outerSize = glowSize * 2.5;
  var outer = ctx.createRadialGradient(hx, hy, 0, hx, hy, outerSize);
  outer.addColorStop(0, hsla(hue, 70, 50, glowAlpha * 0.15));
  outer.addColorStop(0.5, hsla(260, 50, 30, glowAlpha * 0.05));
  outer.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.fillStyle = outer;
  ctx.fillRect(hx - outerSize, hy - outerSize, outerSize * 2, outerSize * 2);
}

// ── LAYER 6: Spectral frequency bars at edges ─────────
function drawSpectralEdges(t) {
  var lc = getLevelConfig();
  if (lc.intensity < 0.1) return;

  var barCount = 64;
  var barMaxH = H * 0.15;
  var barW = 2;

  ctx.save();
  ctx.globalAlpha = lc.intensity * 0.4;

  // Left edge
  for (var i = 0; i < barCount; i++) {
    var melIdx = Math.floor(i * 127 / barCount);
    var val = sm.mel[melIdx] || 0;
    var h = val * barMaxH * sm.energy * 2;
    var y = H * 0.2 + (i / barCount) * H * 0.6;
    var hue = 190 + val * 80;
    ctx.fillStyle = hsla(hue, 70, 50 + val * 30, 0.3 + val * 0.4);
    ctx.fillRect(0, y - h * 0.5, barW + val * 3, h);
  }

  // Right edge (mirrored)
  for (var i = 0; i < barCount; i++) {
    var melIdx = Math.floor(i * 127 / barCount);
    var val = sm.mel[melIdx] || 0;
    var h = val * barMaxH * sm.energy * 2;
    var y = H * 0.2 + (i / barCount) * H * 0.6;
    var hue = 190 + val * 80;
    ctx.fillStyle = hsla(hue, 70, 50 + val * 30, 0.3 + val * 0.4);
    ctx.fillRect(W - barW - val * 3, y - h * 0.5, barW + val * 3, h);
  }

  ctx.restore();
}

// ── LAYER 7: Eye glow — two pulsing points at head ──
function drawEyeGlow(t) {
  var lc = getLevelConfig();
  if (lc.formAlpha < 0.1) return;

  var breathCycle = Math.sin(t * Math.PI * 2 / 4) * 0.015 + 1.0;
  var bodyH = H * 0.58 * breathCycle;
  var bodyTop = cy - bodyH * 0.38 + dance.bounce * 8;

  // Eye positions — near top of head, follows dance head sway
  var headSway = dance.headPhase * W * 0.24 * breathCycle * 0.15;
  var headY = bodyTop + bodyH * 0.035;
  var eyeSpacing = W * 0.022 * breathCycle;
  var leftEyeX = cx - eyeSpacing + headSway;
  var rightEyeX = cx + eyeSpacing + headSway;

  // Beat pulse for eyes
  var beatFreq = sm.tempo / 60;
  var beatPulse = Math.pow(Math.max(0, Math.sin(t * beatFreq * Math.PI * 2)), 4);

  var eyeSize = 2 + beatPulse * 2.5;
  var glowSize = eyeSize * 4;

  // Alternate cyan/magenta subtly
  var leftHue = 190; // cyan
  var rightHue = 300; // magenta
  var alpha = (0.3 + beatPulse * 0.5) * lc.formAlpha;

  // Left eye
  var lgGrad = ctx.createRadialGradient(leftEyeX, headY, 0, leftEyeX, headY, glowSize);
  lgGrad.addColorStop(0, hsla(leftHue, 80, 80, alpha));
  lgGrad.addColorStop(0.3, hsla(leftHue, 70, 60, alpha * 0.5));
  lgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = lgGrad;
  ctx.beginPath();
  ctx.arc(leftEyeX, headY, glowSize, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = hsla(leftHue, 90, 85, alpha * 1.2);
  ctx.beginPath();
  ctx.arc(leftEyeX, headY, eyeSize, 0, Math.PI * 2);
  ctx.fill();

  // Right eye
  var rgGrad = ctx.createRadialGradient(rightEyeX, headY, 0, rightEyeX, headY, glowSize);
  rgGrad.addColorStop(0, hsla(rightHue, 80, 80, alpha));
  rgGrad.addColorStop(0.3, hsla(rightHue, 70, 60, alpha * 0.5));
  rgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rgGrad;
  ctx.beginPath();
  ctx.arc(rightEyeX, headY, glowSize, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = hsla(rightHue, 90, 85, alpha * 1.2);
  ctx.beginPath();
  ctx.arc(rightEyeX, headY, eyeSize, 0, Math.PI * 2);
  ctx.fill();
}

// ── LAYER 8: Hair flow — spectral centroid driven ────
function drawHairFlow(t) {
  var lc = getLevelConfig();
  if (lc.formAlpha < 0.1) return;

  var breathCycle = Math.sin(t * Math.PI * 2 / 4) * 0.015 + 1.0;
  var bodyH = H * 0.58 * breathCycle;
  var bodyW = W * 0.24 * breathCycle;
  var bodyTop = cy - bodyH * 0.38 + dance.bounce * 8;
  var headSway = dance.headPhase * bodyW * 0.15;
  var headTop = bodyTop;

  // Number of hair strands
  var numStrands = 16;
  var centroidInfluence = sm.centroid / 5;

  ctx.save();
  ctx.globalAlpha = lc.formAlpha * 0.6;
  ctx.globalCompositeOperation = 'screen';

  for (var i = 0; i < numStrands; i++) {
    var nt = (i / numStrands) - 0.5;
    var startX = cx + nt * bodyW * 0.5 + headSway;
    var startY = headTop;

    // Hair flows upward, driven by centroid
    var strandLen = 20 + centroidInfluence * 40 + Math.sin(t * 0.5 + i) * 10;
    var hue = 260 + centroidInfluence * 60 + i * 8;

    ctx.strokeStyle = hsla(hue, 60, 55, 0.3 + centroidInfluence * 0.3);
    ctx.lineWidth = 0.8 + centroidInfluence * 0.5;

    ctx.beginPath();
    var points = 15;
    for (var j = 0; j <= points; j++) {
      var jt = j / points;
      // Hair goes upward and outward
      var x = startX + nt * strandLen * jt * 0.8 +
              Math.sin(t * 2 + i * 0.5 + jt * 3) * (5 + centroidInfluence * 10) * jt;
      var y = startY - jt * strandLen +
              Math.sin(t * 1.5 + i * 0.7 + jt * 2) * 3 * jt;
      if (j === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  ctx.restore();
}

// ── HUD Update ────────────────────────────────────────
function updateHUD() {
  var levelEl = document.getElementById('hud-level');
  var phiEl = document.getElementById('hud-phi');
  var xiEl = document.getElementById('hud-xi');
  var orderEl = document.getElementById('hud-order');

  var level = consciousness.level || 'dormant';
  levelEl.textContent = level;

  // Color the level text based on consciousness
  var levelColors = {
    dormant: 'rgba(255,255,255,0.15)',
    stirring: 'rgba(139,92,246,0.4)',
    aware: 'rgba(6,182,212,0.6)',
    coherent: 'rgba(192,132,252,0.8)',
    resonant: 'rgba(236,72,153,0.95)'
  };
  levelEl.style.color = levelColors[level] || levelColors.dormant;

  phiEl.textContent = '\u03A6 ' + sm.phi.toFixed(3);
  xiEl.textContent = '\u039E ' + sm.xi.toFixed(4);
  orderEl.textContent = 'R ' + sm.order.toFixed(4);
}

// ── Track title animation ─────────────────────────────
function updateTrackDisplay(now) {
  var titleEl = document.getElementById('track-title');
  var albumEl = document.getElementById('track-album');

  if (!trackTitle) {
    titleEl.classList.remove('visible');
    albumEl.classList.remove('visible');
    return;
  }

  titleEl.textContent = trackTitle;
  albumEl.textContent = trackAlbum;

  var elapsed = now - titleShowTime;

  // Fade in after 500ms, stay visible for 8s, then fade out
  if (elapsed > 500 && elapsed < 10000) {
    if (!titleVisible) {
      titleEl.classList.add('visible');
      albumEl.classList.add('visible');
      titleVisible = true;
    }
  } else if (elapsed >= 10000) {
    titleEl.classList.remove('visible');
    albumEl.classList.remove('visible');
    titleVisible = false;
  }
}

// ── Main render loop ──────────────────────────────────
var lastTime = 0;
var frameTime = 0;

function render(now) {
  requestAnimationFrame(render);

  now = now || 0;
  var dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  frameTime = now / 1000;

  // Smooth all incoming data
  smoothState(dt);
  updateDance(frameTime, dt);

  // Draw layers in order
  drawBackground(frameTime);
  drawSpectralEdges(frameTime);
  drawRibbons(frameTime);
  drawHairFlow(frameTime);
  drawWavefrontBody(frameTime);
  drawEyeGlow(frameTime);
  drawHeartbeatGlow(frameTime);
  drawParticles(frameTime);

  // Update text overlays
  updateTrackDisplay(now);
  updateHUD();
}

requestAnimationFrame(render);

})();
</script>
