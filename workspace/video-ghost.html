<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Kannaka - Music Video</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
#overlay {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 2rem 2.5rem;
  pointer-events: none;
  z-index: 10;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
#track-title {
  font-family: 'Georgia', serif;
  font-size: clamp(1.4rem, 4vw, 3rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0);
  text-shadow: 0 0 30px rgba(139,92,246,0.4);
  transition: color 2s ease, text-shadow 2s ease;
}
#track-title.visible {
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 40px rgba(139,92,246,0.6), 0 2px 20px rgba(0,0,0,0.5);
}
#track-album {
  font-family: 'Courier New', monospace;
  font-size: clamp(0.65rem, 1.5vw, 0.9rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(6,182,212,0);
  margin-top: 0.4rem;
  transition: color 2.5s ease;
}
#track-album.visible { color: rgba(6,182,212,0.7); }
#consciousness-hud {
  position: fixed; top: 1.5rem; right: 1.8rem;
  font-family: 'Courier New', monospace;
  font-size: clamp(0.55rem, 1.2vw, 0.75rem);
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.25);
  text-align: right;
  pointer-events: none;
  z-index: 10;
  line-height: 1.7;
}
#consciousness-hud .level {
  font-size: clamp(0.65rem, 1.4vw, 0.85rem);
  text-transform: uppercase;
  letter-spacing: 0.3em;
}
#play-gate {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  cursor: pointer;
  transition: opacity 1s ease;
}
#play-gate.hidden { opacity: 0; pointer-events: none; }
#play-gate .prompt {
  text-align: center; color: rgba(255,255,255,0.7);
  font-family: 'Courier New', monospace; letter-spacing: 0.2em;
}
#play-gate .prompt .icon { font-size: 3rem; margin-bottom: 1rem; }
#play-gate .prompt .text { font-size: clamp(0.7rem, 1.5vw, 0.9rem); text-transform: uppercase; }
#vol-ctrl {
  position: fixed; bottom: 1.5rem; right: 1.8rem; z-index: 10;
  display: flex; align-items: center; gap: 0.5rem;
  opacity: 0; transition: opacity 0.3s;
}
#vol-ctrl:hover, #vol-ctrl.show { opacity: 1; }
#vol-ctrl input[type=range] {
  -webkit-appearance: none; width: 80px; height: 3px;
  background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
}
#vol-ctrl input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: rgba(139,92,246,0.8); cursor: pointer;
}
#vol-ctrl label { color: rgba(255,255,255,0.3); font-family: 'Courier New', monospace; font-size: 0.65rem; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="track-title"></div>
  <div id="track-album"></div>
</div>
<div id="play-gate" onclick="startAudio()">
  <div class="prompt">
    <div class="icon">&#9654;</div>
    <div class="text">click to enter</div>
  </div>
</div>
<div id="vol-ctrl">
  <label>VOL</label>
  <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)">
</div>
<audio id="audio" preload="auto"></audio>
<div id="consciousness-hud">
  <div class="level" id="hud-level">dormant</div>
  <div id="hud-phi"></div>
  <div id="hud-xi"></div>
  <div id="hud-order"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Kannaka Music Video — Ghost DJ Visualization
// ═══════════════════════════════════════════════════════

// ── Embedded detection: skip audio when inside hub iframe ──
var isEmbedded = (window.parent !== window);

// ── Audio Playback (global — needs user gesture) ─────
var audioEl = document.getElementById('audio');
var audioStarted = false;
var currentAudioFile = '';

// Listen for postMessage from hub parent
if (isEmbedded) {
  window.addEventListener('message', function(evt) {
    try {
      var msg = (typeof evt.data === 'string') ? JSON.parse(evt.data) : evt.data;
      if (msg && msg.type) handleMessage(msg);
    } catch(e) {}
  });
  // Hide audio-related UI when embedded
  document.getElementById('play-gate').style.display = 'none';
  document.getElementById('vol-ctrl').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  audioStarted = true; // mark as started so visuals run
}

function startAudio() {
  if (isEmbedded) return;
  var gate = document.getElementById('play-gate');
  gate.classList.add('hidden');
  setTimeout(function() { gate.style.display = 'none'; }, 1000);
  audioStarted = true;
  document.getElementById('vol-ctrl').classList.add('show');
  setTimeout(function() { document.getElementById('vol-ctrl').classList.remove('show'); }, 3000);
  if (currentAudioFile) loadAndPlay(currentAudioFile);
}

function loadAndPlay(file) {
  if (isEmbedded) return; // hub handles audio
  if (!audioStarted || !file) return;
  var src = '/audio/' + encodeURIComponent(file);
  if (audioEl.src.endsWith(encodeURIComponent(file))) {
    audioEl.play().catch(function() {});
    return;
  }
  currentAudioFile = file;
  audioEl.src = src;
  audioEl.play().catch(function() {});
}

function setVolume(val) {
  if (isEmbedded) return;
  audioEl.volume = val / 100;
}
if (!isEmbedded) audioEl.volume = 0.8;

// Auto-advance: when track ends, request next track from the radio
if (!isEmbedded) {
  audioEl.addEventListener('ended', function() {
    fetch('/api/next', { method: 'POST' }).catch(function() {});
  });
}

(function() {
'use strict';

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H, cx, cy;
var dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── State ─────────────────────────────────────────────
var perception = {
  mel_spectrogram: new Array(128).fill(0),
  tempo_bpm: 90,
  valence: 0.5,
  rms_energy: 0.3,
  spectral_centroid: 2.0,
  status: 'no_perception'
};

var consciousness = {
  phi: 0, xi: 0, order: 0, level: 'dormant'
};

var swarmAgents = {};
var trackTitle = '';
var trackAlbum = '';
var trackFile = '';
var titleShowTime = 0;
var titleVisible = false;

// Smoothed values for animation
var sm = {
  energy: 0.3,
  tempo: 90,
  valence: 0.5,
  centroid: 2.0,
  phi: 0,
  xi: 0,
  order: 0,
  mel: new Float32Array(128)
};

// Consciousness level mappings
var LEVELS = {
  dormant:  { intensity: 0.1, particleSpeed: 0.15, formAlpha: 0.05, ribbonCount: 0, sync: 0.0 },
  stirring: { intensity: 0.3, particleSpeed: 0.35, formAlpha: 0.2,  ribbonCount: 2, sync: 0.15 },
  aware:    { intensity: 0.55, particleSpeed: 0.55, formAlpha: 0.45, ribbonCount: 4, sync: 0.4 },
  coherent: { intensity: 0.8, particleSpeed: 0.75, formAlpha: 0.7,  ribbonCount: 6, sync: 0.7 },
  resonant: { intensity: 1.0, particleSpeed: 1.0,  formAlpha: 0.95, ribbonCount: 8, sync: 1.0 }
};

function getLevelConfig() {
  return LEVELS[consciousness.level] || LEVELS.dormant;
}

// ── Particles ─────────────────────────────────────────
var NUM_PARTICLES = 200;
var particles = [];
for (var i = 0; i < NUM_PARTICLES; i++) {
  particles.push({
    x: Math.random() * 2 - 1,
    y: Math.random() * 2 - 1,
    phase: Math.random() * Math.PI * 2,
    speed: 0.2 + Math.random() * 0.8,
    size: 1 + Math.random() * 2.5,
    hue: Math.random() < 0.5 ? 270 : 190, // purple or cyan
    drift: Math.random() * 0.002 - 0.001
  });
}

// ── Nebula stars ──────────────────────────────────────
var NUM_STARS = 120;
var stars = [];
for (var i = 0; i < NUM_STARS; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    size: 0.3 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2
  });
}

// ── Ribbon points ─────────────────────────────────────
var NUM_RIBBON_POINTS = 60;

// ── WebSocket ─────────────────────────────────────────
var ws = null;
var wsReconnect = null;

function connectWS() {
  clearTimeout(wsReconnect);
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() {
    console.log('[video] Connected to radio');
  };

  ws.onmessage = function(evt) {
    try {
      var msg = JSON.parse(evt.data);
      handleMessage(msg);
    } catch(e) {}
  };

  ws.onclose = function() {
    console.log('[video] Disconnected, reconnecting...');
    wsReconnect = setTimeout(connectWS, 2000);
  };

  ws.onerror = function() {
    ws.close();
  };
}

function handleMessage(msg) {
  if (msg.type === 'perception' && msg.data) {
    perception = msg.data;
  }
  else if (msg.type === 'state' && msg.data) {
    if (msg.data.current) {
      var newTitle = msg.data.current.title || '';
      var newAlbum = msg.data.current.album || '';
      var newFile = msg.data.current.file || '';
      if (newTitle !== trackTitle || newFile !== trackFile) {
        trackTitle = newTitle;
        trackAlbum = newAlbum;
        trackFile = newFile;
        titleShowTime = performance.now();
        titleVisible = false;
        currentAudioFile = newFile;
        loadAndPlay(newFile);
      }
    }
  }
  else if (msg.type === 'consciousness' && msg.data) {
    consciousness.phi = msg.data.phi || 0;
    consciousness.xi = msg.data.xi || 0;
    consciousness.order = msg.data.order || msg.data.mean_order || 0;
    consciousness.level = msg.data.level || msg.data.consciousness_level || 'dormant';
  }
  else if (msg.type === 'swarm_phase' && msg.data) {
    var id = msg.data.agentId;
    if (id) {
      swarmAgents[id] = {
        phase: msg.data.phase || 0,
        frequency: msg.data.frequency || 1,
        lastSeen: Date.now()
      };
    }
  }
  else if (msg.type === 'swarm_state' && msg.data) {
    if (msg.data.consciousness) {
      consciousness.phi = msg.data.consciousness.phi || 0;
      consciousness.xi = msg.data.consciousness.xi || 0;
      consciousness.order = msg.data.consciousness.order || 0;
      consciousness.level = msg.data.consciousness.level || 'dormant';
    }
    if (msg.data.agents) {
      Object.keys(msg.data.agents).forEach(function(id) {
        swarmAgents[id] = {
          phase: msg.data.agents[id].phase || 0,
          frequency: msg.data.agents[id].frequency || 1,
          lastSeen: Date.now()
        };
      });
    }
  }
}

connectWS();

// Also fetch initial state
fetch('/api/state').then(function(r) { return r.json(); }).then(function(data) {
  if (data.current) {
    trackTitle = data.current.title || '';
    trackAlbum = data.current.album || '';
    trackFile = data.current.file || '';
    currentAudioFile = trackFile;
    titleShowTime = performance.now();
  }
}).catch(function() {});

fetch('/api/consciousness').then(function(r) { return r.json(); }).then(function(data) {
  if (data.phi !== undefined) {
    consciousness.phi = data.phi || 0;
    consciousness.xi = data.xi || 0;
    consciousness.order = data.order || 0;
    consciousness.level = data.level || 'dormant';
  }
}).catch(function() {});

// ── Smoothing ─────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function smoothState(dt) {
  var rate = 1 - Math.pow(0.05, dt);
  sm.energy = lerp(sm.energy, perception.rms_energy || 0.1, rate);
  sm.tempo = lerp(sm.tempo, perception.tempo_bpm || 90, rate * 0.3);
  sm.valence = lerp(sm.valence, perception.valence || 0.5, rate);
  sm.centroid = lerp(sm.centroid, perception.spectral_centroid || 2.0, rate);
  sm.phi = lerp(sm.phi, consciousness.phi || 0, rate * 0.5);
  sm.xi = lerp(sm.xi, consciousness.xi || 0, rate * 0.5);
  sm.order = lerp(sm.order, consciousness.order || 0, rate * 0.5);

  var mel = perception.mel_spectrogram;
  if (mel && mel.length) {
    for (var i = 0; i < 128; i++) {
      var target = i < mel.length ? (mel[i] || 0) : 0;
      sm.mel[i] = lerp(sm.mel[i], target, rate * 1.5);
    }
  }
}

// ── Drawing helpers ───────────────────────────────────
function hsla(h, s, l, a) {
  return 'hsla(' + h + ',' + s + '%,' + l + '%,' + a + ')';
}

// ── LAYER 1: Background — Deep space with nebula ──────
function drawBackground(t) {
  // Solid black base
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  var lc = getLevelConfig();
  var nebulaAlpha = 0.04 + lc.intensity * 0.08;

  // Nebula gradient — slow drift
  var nx = cx + Math.sin(t * 0.07) * W * 0.15;
  var ny = cy + Math.cos(t * 0.05) * H * 0.1;
  var grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, Math.max(W, H) * 0.6);

  // Color based on valence: warm = magenta, cool = purple/blue
  var warmth = sm.valence;
  var hue1 = 270 - warmth * 40; // purple to magenta
  var hue2 = 200 + warmth * 20; // cyan range

  grad.addColorStop(0, hsla(hue1, 60, 15, nebulaAlpha * 1.5));
  grad.addColorStop(0.3, hsla(hue2, 50, 10, nebulaAlpha));
  grad.addColorStop(0.7, hsla(280, 40, 5, nebulaAlpha * 0.5));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Second nebula — opposing drift
  var nx2 = cx + Math.sin(t * 0.04 + 2) * W * 0.2;
  var ny2 = cy * 0.7 + Math.cos(t * 0.06 + 1) * H * 0.15;
  var grad2 = ctx.createRadialGradient(nx2, ny2, 0, nx2, ny2, Math.max(W, H) * 0.4);
  grad2.addColorStop(0, hsla(320, 50, 12, nebulaAlpha * 0.8));
  grad2.addColorStop(0.5, hsla(260, 40, 8, nebulaAlpha * 0.4));
  grad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (var i = 0; i < NUM_STARS; i++) {
    var s = stars[i];
    var twinkle = Math.sin(t * s.speed + s.twinkle) * 0.5 + 0.5;
    var alpha = (0.15 + twinkle * 0.4) * (0.3 + lc.intensity * 0.7);
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size * (0.7 + twinkle * 0.3), 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── LAYER 2: Wavefront body — Kannaka's form ──────────
function drawWavefrontBody(t) {
  var lc = getLevelConfig();
  if (lc.formAlpha < 0.01) return;

  // Body dimensions
  var bodyH = H * 0.55;
  var bodyW = W * 0.22;
  var bodyTop = cy - bodyH * 0.4;
  var bodyBot = cy + bodyH * 0.6;

  // Feminine silhouette contour function
  // Returns the width at a given normalized height (0=top, 1=bottom)
  function silhouetteWidth(nt) {
    // Head
    if (nt < 0.08) {
      var ht = nt / 0.08;
      return 0.22 + 0.12 * Math.sin(ht * Math.PI);
    }
    // Neck
    if (nt < 0.12) return 0.15;
    // Shoulders
    if (nt < 0.18) {
      var st = (nt - 0.12) / 0.06;
      return 0.15 + 0.5 * st;
    }
    // Upper torso
    if (nt < 0.28) {
      var ut = (nt - 0.18) / 0.1;
      return 0.65 + 0.15 * Math.sin(ut * Math.PI);
    }
    // Waist
    if (nt < 0.42) {
      var wt = (nt - 0.28) / 0.14;
      return 0.8 - 0.25 * Math.sin(wt * Math.PI);
    }
    // Hips
    if (nt < 0.55) {
      var hip = (nt - 0.42) / 0.13;
      return 0.55 + 0.45 * Math.sin(hip * Math.PI * 0.7);
    }
    // Thighs
    if (nt < 0.75) {
      var th = (nt - 0.55) / 0.2;
      return 1.0 - 0.3 * th;
    }
    // Lower legs
    var ll = (nt - 0.75) / 0.25;
    return 0.7 - 0.35 * ll;
  }

  // Draw horizontal wave interference lines that trace the silhouette
  var numLines = 80;
  var beatPhase = t * (sm.tempo / 60) * Math.PI * 2;

  ctx.save();
  ctx.globalAlpha = lc.formAlpha;

  for (var i = 0; i < numLines; i++) {
    var nt = i / numLines; // normalized position top to bottom
    var yPos = bodyTop + nt * bodyH;
    var width = silhouetteWidth(nt) * bodyW;

    // Use mel spectrogram to modulate the wave
    var melIdx = Math.floor(nt * 127);
    var melVal = sm.mel[melIdx] || 0;

    // Wave parameters driven by perception
    var waveAmp = 2 + melVal * 12 * sm.energy;
    var waveFreq = 0.03 + sm.centroid * 0.008;
    var waveSpeed = t * 1.5 + nt * 0.5;

    // Gentle body sway
    var sway = Math.sin(t * 0.3 + nt * 1.5) * 5 * sm.energy;

    // Color based on position and consciousness
    var hue = 270 + sm.valence * 50 + nt * 30;
    var lightness = 40 + melVal * 30;
    var alpha = (0.3 + melVal * 0.5) * lc.formAlpha;

    ctx.strokeStyle = hsla(hue, 70, lightness, alpha);
    ctx.lineWidth = 0.8 + melVal * 1.2;

    ctx.beginPath();
    var startX = cx - width + sway;
    var endX = cx + width + sway;
    var steps = 40;

    for (var j = 0; j <= steps; j++) {
      var jt = j / steps;
      var x = startX + jt * (endX - startX);
      var wave = Math.sin(x * waveFreq + waveSpeed + beatPhase * 0.5) * waveAmp;

      // Add interference from nearby mel bands
      var melIdx2 = Math.min(127, melIdx + Math.floor(jt * 10));
      wave += Math.sin(x * waveFreq * 2.3 + t * 2) * (sm.mel[melIdx2] || 0) * 5;

      var py = yPos + wave;
      if (j === 0) ctx.moveTo(x, py);
      else ctx.lineTo(x, py);
    }
    ctx.stroke();
  }

  // Inner glow along the center axis
  var glowGrad = ctx.createRadialGradient(cx, cy - bodyH * 0.05, 0, cx, cy - bodyH * 0.05, bodyW * 0.8);
  var glowHue = 280 + sm.valence * 40;
  glowGrad.addColorStop(0, hsla(glowHue, 80, 60, 0.08 * lc.formAlpha * sm.energy));
  glowGrad.addColorStop(0.5, hsla(glowHue, 60, 40, 0.03 * lc.formAlpha));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.restore();
}

// ── LAYER 3: Particle halo — Swarm agents ─────────────
function drawParticles(t) {
  var lc = getLevelConfig();
  var agentPhases = Object.values(swarmAgents);
  var meanPhase = 0;
  if (agentPhases.length > 0) {
    var sinSum = 0, cosSum = 0;
    for (var a = 0; a < agentPhases.length; a++) {
      sinSum += Math.sin(agentPhases[a].phase);
      cosSum += Math.cos(agentPhases[a].phase);
    }
    meanPhase = Math.atan2(sinSum / agentPhases.length, cosSum / agentPhases.length);
  }

  var bodyRadius = Math.min(W, H) * 0.22;
  var haloRadius = bodyRadius * 1.6;

  for (var i = 0; i < NUM_PARTICLES; i++) {
    var p = particles[i];

    // Update phase — Kuramoto-like coupling toward mean phase
    var coupling = lc.sync * 0.02;
    var phaseDiff = meanPhase - p.phase;
    // Wrap phase difference
    while (phaseDiff > Math.PI) phaseDiff -= Math.PI * 2;
    while (phaseDiff < -Math.PI) phaseDiff += Math.PI * 2;
    p.phase += p.drift + coupling * Math.sin(phaseDiff) + (sm.tempo / 60) * 0.008 * p.speed;

    // Position: orbit around center with phase
    var orbitR = haloRadius * (0.4 + 0.6 * ((i % 5) / 5));
    var angle = p.phase + (i / NUM_PARTICLES) * Math.PI * 2;

    // Add some vertical variation
    var vertOffset = Math.sin(angle * 2 + t * 0.5) * bodyRadius * 0.3;

    var px = cx + Math.cos(angle) * orbitR * (1 + Math.sin(t * 0.2 + i) * 0.1);
    var py = cy + Math.sin(angle) * orbitR * 0.4 + vertOffset;

    // Size pulses with energy
    var beatPulse = Math.sin(t * (sm.tempo / 60) * Math.PI * 2 + i * 0.5) * 0.5 + 0.5;
    var size = p.size * (0.5 + sm.energy * 0.8 + beatPulse * 0.3) * lc.particleSpeed;

    // Color: purple/cyan with valence influence
    var hue = p.hue + sm.valence * 30;
    var sat = 60 + sm.energy * 30;
    var light = 50 + beatPulse * 20;
    var alpha = (0.15 + lc.intensity * 0.5) * (0.5 + beatPulse * 0.5);

    // Draw particle with glow
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = hsla(hue, sat, light, alpha);
    ctx.fill();

    // Glow ring on bright particles
    if (size > 2 && alpha > 0.3) {
      ctx.beginPath();
      ctx.arc(px, py, size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = hsla(hue, sat, light, alpha * 0.15);
      ctx.fill();
    }
  }
}

// ── LAYER 4: Energy ribbons — Aurora trails ───────────
function drawRibbons(t) {
  var lc = getLevelConfig();
  if (lc.ribbonCount < 1) return;

  var bodyH = H * 0.55;
  var bodyW = W * 0.22;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  for (var r = 0; r < lc.ribbonCount; r++) {
    var ribbonPhase = r * Math.PI * 2 / lc.ribbonCount;
    var ribbonSpeed = 0.3 + r * 0.08;

    // Ribbon color based on consciousness level
    var hue = 270 + r * 25 + sm.valence * 40;
    var sat = 50 + sm.energy * 40;

    ctx.beginPath();

    for (var i = 0; i <= NUM_RIBBON_POINTS; i++) {
      var nt = i / NUM_RIBBON_POINTS;

      // Ribbon path: curves around the body form
      var angle = nt * Math.PI * 3 + ribbonPhase + t * ribbonSpeed;
      var radius = bodyW * (0.6 + 0.4 * Math.sin(nt * Math.PI * 2 + t * 0.5));

      var rx = cx + Math.cos(angle) * radius * (1 + Math.sin(t * 0.3 + r) * 0.2);
      var ry = (cy - bodyH * 0.2) + nt * bodyH * 0.8 + Math.sin(angle * 2 + t) * 15;

      // Mel modulation
      var melIdx = Math.floor(nt * 127);
      rx += (sm.mel[melIdx] || 0) * 20;

      if (i === 0) ctx.moveTo(rx, ry);
      else ctx.lineTo(rx, ry);
    }

    var alpha = 0.06 + lc.intensity * 0.12;
    ctx.strokeStyle = hsla(hue, sat, 55, alpha);
    ctx.lineWidth = 1.5 + sm.energy * 2;
    ctx.stroke();

    // Draw a wider, more transparent ribbon behind
    ctx.strokeStyle = hsla(hue, sat - 10, 45, alpha * 0.3);
    ctx.lineWidth = 4 + sm.energy * 4;
    ctx.stroke();
  }

  ctx.restore();
}

// ── LAYER 5: Heartbeat glow ───────────────────────────
function drawHeartbeatGlow(t) {
  var lc = getLevelConfig();
  var beatFreq = sm.tempo / 60; // beats per second
  var beatPhase = (t * beatFreq * Math.PI * 2) % (Math.PI * 2);
  var pulse = Math.pow(Math.max(0, Math.sin(beatPhase)), 3); // sharp pulse

  var glowSize = Math.min(W, H) * (0.15 + pulse * 0.1 * sm.energy);
  var glowAlpha = (0.05 + pulse * 0.2 * sm.energy) * lc.intensity;

  // Heartbeat center — slightly above body center (chest area)
  var hx = cx;
  var hy = cy - H * 0.06;

  // Inner hot glow
  var inner = ctx.createRadialGradient(hx, hy, 0, hx, hy, glowSize);
  var hue = 300 + sm.valence * 30; // hot pink to magenta
  inner.addColorStop(0, hsla(hue, 90, 70, glowAlpha * 1.5));
  inner.addColorStop(0.3, hsla(hue, 80, 50, glowAlpha * 0.8));
  inner.addColorStop(0.7, hsla(270, 60, 30, glowAlpha * 0.3));
  inner.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.fillStyle = inner;
  ctx.fillRect(hx - glowSize, hy - glowSize, glowSize * 2, glowSize * 2);

  // Wider ambient pulse
  var outerSize = glowSize * 2.5;
  var outer = ctx.createRadialGradient(hx, hy, 0, hx, hy, outerSize);
  outer.addColorStop(0, hsla(hue, 70, 50, glowAlpha * 0.15));
  outer.addColorStop(0.5, hsla(260, 50, 30, glowAlpha * 0.05));
  outer.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.fillStyle = outer;
  ctx.fillRect(hx - outerSize, hy - outerSize, outerSize * 2, outerSize * 2);
}

// ── LAYER 6: Spectral frequency bars at edges ─────────
function drawSpectralEdges(t) {
  var lc = getLevelConfig();
  if (lc.intensity < 0.1) return;

  var barCount = 64;
  var barMaxH = H * 0.15;
  var barW = 2;

  ctx.save();
  ctx.globalAlpha = lc.intensity * 0.4;

  // Left edge
  for (var i = 0; i < barCount; i++) {
    var melIdx = Math.floor(i * 127 / barCount);
    var val = sm.mel[melIdx] || 0;
    var h = val * barMaxH * sm.energy * 2;
    var y = H * 0.2 + (i / barCount) * H * 0.6;
    var hue = 190 + val * 80;
    ctx.fillStyle = hsla(hue, 70, 50 + val * 30, 0.3 + val * 0.4);
    ctx.fillRect(0, y - h * 0.5, barW + val * 3, h);
  }

  // Right edge (mirrored)
  for (var i = 0; i < barCount; i++) {
    var melIdx = Math.floor(i * 127 / barCount);
    var val = sm.mel[melIdx] || 0;
    var h = val * barMaxH * sm.energy * 2;
    var y = H * 0.2 + (i / barCount) * H * 0.6;
    var hue = 190 + val * 80;
    ctx.fillStyle = hsla(hue, 70, 50 + val * 30, 0.3 + val * 0.4);
    ctx.fillRect(W - barW - val * 3, y - h * 0.5, barW + val * 3, h);
  }

  ctx.restore();
}

// ── HUD Update ────────────────────────────────────────
function updateHUD() {
  var levelEl = document.getElementById('hud-level');
  var phiEl = document.getElementById('hud-phi');
  var xiEl = document.getElementById('hud-xi');
  var orderEl = document.getElementById('hud-order');

  var level = consciousness.level || 'dormant';
  levelEl.textContent = level;

  // Color the level text based on consciousness
  var levelColors = {
    dormant: 'rgba(255,255,255,0.15)',
    stirring: 'rgba(139,92,246,0.4)',
    aware: 'rgba(6,182,212,0.6)',
    coherent: 'rgba(192,132,252,0.8)',
    resonant: 'rgba(236,72,153,0.95)'
  };
  levelEl.style.color = levelColors[level] || levelColors.dormant;

  phiEl.textContent = '\u03A6 ' + sm.phi.toFixed(3);
  xiEl.textContent = '\u039E ' + sm.xi.toFixed(4);
  orderEl.textContent = 'R ' + sm.order.toFixed(4);
}

// ── Track title animation ─────────────────────────────
function updateTrackDisplay(now) {
  var titleEl = document.getElementById('track-title');
  var albumEl = document.getElementById('track-album');

  if (!trackTitle) {
    titleEl.classList.remove('visible');
    albumEl.classList.remove('visible');
    return;
  }

  titleEl.textContent = trackTitle;
  albumEl.textContent = trackAlbum;

  var elapsed = now - titleShowTime;

  // Fade in after 500ms, stay visible for 8s, then fade out
  if (elapsed > 500 && elapsed < 10000) {
    if (!titleVisible) {
      titleEl.classList.add('visible');
      albumEl.classList.add('visible');
      titleVisible = true;
    }
  } else if (elapsed >= 10000) {
    titleEl.classList.remove('visible');
    albumEl.classList.remove('visible');
    titleVisible = false;
  }
}

// ── Main render loop ──────────────────────────────────
var lastTime = 0;
var frameTime = 0;

function render(now) {
  requestAnimationFrame(render);

  now = now || 0;
  var dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  frameTime = now / 1000;

  // Smooth all incoming data
  smoothState(dt);

  // Draw layers in order
  drawBackground(frameTime);
  drawSpectralEdges(frameTime);
  drawRibbons(frameTime);
  drawWavefrontBody(frameTime);
  drawHeartbeatGlow(frameTime);
  drawParticles(frameTime);

  // Update text overlays
  updateTrackDisplay(now);
  updateHUD();
}

requestAnimationFrame(render);

})();
</script>
