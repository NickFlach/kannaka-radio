}

}
#track-title.visible {
  color: rgba(255,255,255,0.9);

  position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;

#play-gate.hidden { opacity: 0; pointer-events: none; }

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { Reflector } from 'three/addons/objects/Reflector.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const isEmbedded = (window.parent !== window);

// -- State --
let trackTitle = '', trackAlbum = '', trackFile = '';
let consciousness = { phi: 0, xi: 0, order: 0, level: 'dormant' };
let perception = { rms_energy: 0.3, valence: 0.5, tempo_bpm: 90, spectral_centroid: 2000 };
let titleShowTime = 0, titleVisible = false, audioStarted = false, currentAudioFile = '';

const LEVELS = { dormant: 0, stirring: 1, aware: 2, coherent: 3, resonant: 4 };
function levelVal() { return LEVELS[consciousness.level] || 0; }
function levelFactor() { return (levelVal() + 1) / 5; }

// -- Audio --
const audioEl = document.getElementById('audio');
audioEl.volume = 0.8;

if (isEmbedded) {
  document.getElementById('play-gate').style.display = 'none';
  document.getElementById('vol-ctrl').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === 'perception') perception = e.data.data;
    else if (e.data.type === 'state' && e.data.data?.current) {
      trackTitle = e.data.data.current.title || '';
      trackAlbum = e.data.data.current.album || '';
    } else if (e.data.type === 'consciousness') {
      Object.assign(consciousness, { phi: e.data.data.phi||0, xi: e.data.data.xi||0, order: e.data.data.order||0, level: e.data.data.level||'dormant' });
    }
  });
}

window.startAudio = function() {
  if (isEmbedded) return;
  const gate = document.getElementById('play-gate');
  gate.classList.add('hidden');
  setTimeout(() => gate.style.display = 'none', 1000);
  audioStarted = true;
  const vc = document.getElementById('vol-ctrl');
  vc.classList.add('show');
  setTimeout(() => vc.classList.remove('show'), 3000);
  if (currentAudioFile) loadAndPlay(currentAudioFile);
};

function loadAndPlay(file) {
  if (isEmbedded || !audioStarted || !file) return;
  const src = '/audio/' + encodeURIComponent(file);
  if (audioEl.src.endsWith(encodeURIComponent(file))) { audioEl.play().catch(() => {}); return; }
  currentAudioFile = file;
  audioEl.src = src;
  audioEl.play().catch(() => {});
}
window.setVolume = (val) => { audioEl.volume = val / 100; };
audioEl.addEventListener('ended', () => fetch('/api/next', { method: 'POST' }).catch(() => {}));

// ── Audio analyser for lip sync ──────────────────────
let audioCtx = null, analyser = null, freqData = null, audioSourceConnected = false;

function initAudioAnalyser() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.7;
    freqData = new Uint8Array(analyser.frequencyBinCount);
  } catch(e) { console.warn('[hologram] Audio analyser failed:', e); }
}

function connectAudioSource() {
  if (audioSourceConnected || !audioCtx || !analyser) return;
  try {
    const source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    audioSourceConnected = true;
    console.log('[hologram] Audio analyser connected — lip sync active');
  } catch(e) { console.warn('[hologram] Audio source connect failed:', e); }
}

// Detailed audio analysis — bass, mids, highs, vocal, beat
const audio = { bass: 0, mid: 0, high: 0, vocal: 0, overall: 0, beat: false, beatHold: 0, prevBass: 0 };

function analyzeAudio(dt) {
  if (!analyser || !freqData) return audio;
  analyser.getByteFrequencyData(freqData);
  // Bass: bins 1-4 (~40-300Hz) — kick drums, bass
  let bass = 0; for (let i = 1; i < 5; i++) bass += freqData[i]; bass /= (4 * 255);
  // Mids: bins 5-15 (~300-1.5kHz) — instruments, body
  let mid = 0; for (let i = 5; i < 16; i++) mid += freqData[i]; mid /= (11 * 255);
  // Highs: bins 16-40 (~1.5-6kHz) — cymbals, sibilance
  let high = 0; for (let i = 16; i < 41; i++) high += freqData[i]; high /= (25 * 255);
  // Vocal: bins 4-20 (~300-3kHz)
  let vocal = 0; for (let i = 4; i < 20; i++) vocal += freqData[i]; vocal /= (16 * 255);
  // Overall
  let overall = 0; for (let i = 0; i < freqData.length; i++) overall += freqData[i]; overall /= (freqData.length * 255);
  // Beat detection: bass spike
  audio.beatHold = Math.max(0, audio.beatHold - dt);
  audio.beat = (bass > audio.prevBass + 0.08 && bass > 0.2 && audio.beatHold <= 0);
  if (audio.beat) audio.beatHold = 0.15; // 150ms hold
  audio.prevBass = bass;
  // Smooth
  const r = 0.3;
  audio.bass += (bass - audio.bass) * r;
  audio.mid += (mid - audio.mid) * r;
  audio.high += (high - audio.high) * r;
  audio.vocal += (vocal - audio.vocal) * r;
  audio.overall += (overall - audio.overall) * r;
  return audio;
}

function getVocalAmplitude() { return audio.vocal; }

// Connect analyser when audio first plays
audioEl.addEventListener('play', () => { initAudioAnalyser(); connectAudioSource(); });

// -- Three.js --
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 5);
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));

renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.4, 0.45);
const useBloom = !isMobile;
if (useBloom) composer.addPass(bloomPass);

// -- Lighting --
const ambientLight = new THREE.AmbientLight(0x220033, 0.4);
scene.add(ambientLight);
const backLight = new THREE.PointLight(0x8899ff, 70, 30);
backLight.position.set(0, 3.0, -3.0); // higher and further for dramatic silhouette edge
scene.add(backLight);
const spotLight = new THREE.SpotLight(0xffeedd, 15, 15, Math.PI / 6, 0.5);
spotLight.position.set(3, 4, 2);
spotLight.target.position.set(0, 1.5, 0);
scene.add(spotLight, spotLight.target);
// Front fill — warm light to show skin detail
const fillLight = new THREE.PointLight(0xffddcc, 4, 10);
fillLight.position.set(-1, 2.5, 4);
scene.add(fillLight);
// Rim light — cool blue behind and above for silhouette edge
const rimLight = new THREE.PointLight(0x4488cc, 30, 15);
rimLight.position.set(0, 3.5, -3.5);
scene.add(rimLight);
// Face light — warm, low intensity, always illuminates her features
const faceLight = new THREE.PointLight(0xffeedd, 3, 6);
faceLight.position.set(0, 2.2, 2.5);
scene.add(faceLight);

// -- Starfield --
const starCount = isMobile ? 200 : 600;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5)*80;
  starPos[i*3+1] = (Math.random()-0.5)*80;
  starPos[i*3+2] = -20 - Math.random()*60;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x6644aa, size: 0.08, transparent: true, opacity: 0.5 })));

// -- Orbiting Particles --
const particleCount = isMobile ? 300 : 750;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pPhases = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  const orbitR = 0.8 + Math.random()*2.5, angle = Math.random()*Math.PI*2;
  pPos[i*3] = Math.cos(angle)*orbitR;
  pPos[i*3+1] = (Math.random()-0.3)*4;
  pPos[i*3+2] = Math.sin(angle)*orbitR;
  pPhases[i*3] = orbitR;
  pPhases[i*3+1] = 0.2 + Math.random()*0.8;
  pPhases[i*3+2] = Math.random()*Math.PI*2;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x8866dd, size: isMobile ? 0.03 : 0.022,
  transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ── Floating album artwork cards ─────────────────────
const artCards = [];
const artGroup = new THREE.Group();
scene.add(artGroup);

function hashStr(s) { let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0; return Math.abs(h); }

function generateAlbumTexture(name) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const h = hashStr(name);

  // Background gradient
  const hue1 = h % 360, hue2 = (h * 7) % 360;
  const g = ctx.createLinearGradient(0, 0, 256, 256);
  g.addColorStop(0, `hsl(${hue1},60%,15%)`);
  g.addColorStop(1, `hsl(${hue2},50%,20%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);

  // Generative pattern
  const pattern = h % 5;
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 12; i++) {
    const x = ((h * (i+3) * 17) % 256);
    const y = ((h * (i+7) * 13) % 256);
    const r = 10 + ((h * (i+1)) % 40);
    ctx.strokeStyle = `hsl(${(hue1 + i*30)%360},70%,50%)`;
    ctx.lineWidth = 1.5;
    if (pattern === 0) { ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke(); }
    else if (pattern === 1) { ctx.strokeRect(x-r,y-r,r*2,r*2); }
    else if (pattern === 2) { ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r,y+r); ctx.lineTo(x-r,y+r); ctx.closePath(); ctx.stroke(); }
    else if (pattern === 3) { for(let j=0;j<4;j++) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(j*1.57)*r,y+Math.sin(j*1.57)*r); ctx.stroke(); } }
    else { ctx.beginPath(); ctx.arc(x,y,r*0.3,0,Math.PI*2); ctx.fillStyle=`hsl(${(hue2+i*25)%360},60%,40%)`; ctx.fill(); }
  }

  // Album title
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'center';
  // Word wrap
  const words = name.split(' ');
  let lines = [], line = '';
  for (const w of words) {
    if ((line + w).length > 18) { lines.push(line.trim()); line = ''; }
    line += w + ' ';
  }
  lines.push(line.trim());
  const startY = 256 - 20 - lines.length * 20;
  lines.forEach((l, i) => ctx.fillText(l, 128, startY + i * 20));

  return new THREE.CanvasTexture(c);
}

function createArtCards(albumNames) {
  albumNames.forEach((name, i) => {
    const tex = generateAlbumTexture(name);
    const geo = new THREE.PlaneGeometry(0.5, 0.5);
    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      emissive: 0x222222,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const card = new THREE.Mesh(geo, mat);

    // Distribute in a wide orbit around her
    const angle = (i / albumNames.length) * Math.PI * 2;
    const radius = 2.5 + Math.random() * 1.5;
    const height = 0.5 + Math.random() * 2.5;

    card.userData = {
      orbitAngle: angle,
      orbitRadius: radius,
      orbitHeight: height,
      orbitSpeed: 0.08 + Math.random() * 0.12,
      bobSpeed: 0.3 + Math.random() * 0.4,
      bobPhase: Math.random() * Math.PI * 2,
      name: name,
    };

    artGroup.add(card);
    artCards.push(card);
  });
}

// Fetch ALL Kannaka artwork — cycle through it
let allArtwork = [];
let artCycleTimer = 0;
const ART_VISIBLE = 8;       // cards visible at once
const ART_CYCLE_INTERVAL = 12; // swap one card every 12 seconds
let artCycleIndex = 0;
const texLoader = new THREE.TextureLoader();
const cardGeo = new THREE.PlaneGeometry(0.55, 0.55);

function makeCard(art, slotIndex, totalSlots) {
  const tex = texLoader.load(art.thumbnailUrl);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshStandardMaterial({
    map: tex, emissive: 0x222222, emissiveIntensity: 0.3,
    transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false,
  });
  const card = new THREE.Mesh(cardGeo, mat);
  card.userData = {
    orbitAngle: (slotIndex / totalSlots) * Math.PI * 2,
    orbitRadius: 2.5 + Math.random() * 1.5,
    orbitHeight: 0.3 + Math.random() * 2.8,
    orbitSpeed: 0.05 + Math.random() * 0.08,
    bobSpeed: 0.2 + Math.random() * 0.25,
    bobPhase: Math.random() * Math.PI * 2,
    name: art.title || '',
    fadeIn: 0,  // 0→1 fade animation
  };
  artGroup.add(card);
  artCards.push(card);
  return card;
}

function cycleOneCard() {
  if (allArtwork.length <= ART_VISIBLE) return;
  // Pick the oldest card to replace
  const oldCard = artCards.shift();
  if (oldCard) { artGroup.remove(oldCard); oldCard.geometry?.dispose(); oldCard.material?.dispose(); }
  // Pick next artwork (cycle through all)
  artCycleIndex = (artCycleIndex + 1) % allArtwork.length;
  // Skip if already showing
  const showing = new Set(artCards.map(c => c.userData.name));
  let idx = artCycleIndex;
  for (let tries = 0; tries < allArtwork.length; tries++) {
    if (!showing.has(allArtwork[idx].title)) break;
    idx = (idx + 1) % allArtwork.length;
  }
  makeCard(allArtwork[idx], Math.floor(Math.random() * ART_VISIBLE), ART_VISIBLE);
}

// Load art from BOTH kax.ninja-portal.com AND local art directory
Promise.allSettled([
  fetch('https://kax.ninja-portal.com/api/artifacts').then(r=>r.json()),
  fetch('/models/art/list').then(r=>r.json()),
]).then(results => {
  // kax artwork
  if (results[0].status === 'fulfilled') {
    const items = Array.isArray(results[0].value) ? results[0].value : (results[0].value.data || []);
    const kaxArt = items.filter(a => a.thumbnailUrl && a.thumbnailUrl.includes('supabase'))
      .map(a => ({ thumbnailUrl: a.thumbnailUrl, title: a.title || 'Kannaka' }));
    allArtwork.push(...kaxArt);
  }
  // Local art files
  if (results[1].status === 'fulfilled') {
    const files = results[1].value.files || results[1].value || [];
    const localArt = files.map(f => ({ thumbnailUrl: '/models/art/' + encodeURIComponent(f), title: f.replace(/\.[^.]+$/, '').replace(/DALL·E [0-9-]+ /, '').slice(0, 60) }));
    allArtwork.push(...localArt);
  }
  // Shuffle everything together
  for (let i = allArtwork.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [allArtwork[i],allArtwork[j]]=[allArtwork[j],allArtwork[i]]; }
  // Show initial set
  const initial = allArtwork.slice(0, ART_VISIBLE);
  initial.forEach((art, i) => makeCard(art, i, initial.length));
  artCycleIndex = ART_VISIBLE;
  console.log('[hologram] Loaded', allArtwork.length, 'total artworks (kax + local), showing', initial.length);
});

// -- Materials --
// -- Skin material — warm, slightly translucent, with iridescent sheen --
const skinMat = new THREE.MeshPhysicalMaterial({
  color: 0xdaad96,            // warmer, less purple skin tone
  emissive: 0x3d1518,         // warm self-glow, less purple
  emissiveIntensity: 0.35,

// -- Face features (attached to head bone after load) --
// Eyes: white sclera + colored iris + dark pupil + catchlight
// ── BOLD face features — sized to be clearly visible ──
const scleraGeo = new THREE.SphereGeometry(0.048, 24, 18);
const scleraMat = new THREE.MeshStandardMaterial({ color: 0xf8f4f4, emissive: 0x444444, emissiveIntensity: 0.5, roughness: 0.15 });
const irisGeo = new THREE.SphereGeometry(0.028, 24, 18);
const irisMat = new THREE.MeshStandardMaterial({ color: 0x22eedd, emissive: 0x00eecc, emissiveIntensity: 2.5, roughness: 0.02, metalness: 0.2 });
const pupilGeo = new THREE.SphereGeometry(0.013, 12, 12);
const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.9 });
const catchGeo = new THREE.SphereGeometry(0.010, 8, 8);
const catchMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.5 });

// Lips — full, visible
const lipGeo = new THREE.TorusGeometry(0.038, 0.014, 12, 24, Math.PI);
const upperLipMat = new THREE.MeshStandardMaterial({ color: 0xc9505e, emissive: 0x6e2530, emissiveIntensity: 0.5, roughness: 0.22, metalness: 0.03 });
const lowerLipGeo = new THREE.TorusGeometry(0.035, 0.016, 12, 24, Math.PI);
const lowerLipMat = new THREE.MeshStandardMaterial({ color: 0xd4606e, emissive: 0x7a3540, emissiveIntensity: 0.45, roughness: 0.18, metalness: 0.03 });

  const eyeY = 0.005;       // eye height relative to head center

  // Left eye

  const lIris = new THREE.Mesh(irisGeo, irisMat);

  const lPupil = new THREE.Mesh(pupilGeo, pupilMat);
  lPupil.position.set(-eyeX, eyeY, eyeZ + 0.032);
  const lCatch = new THREE.Mesh(catchGeo, catchMat);
  lCatch.position.set(-eyeX + 0.008, eyeY + 0.008, eyeZ + 0.035);

  // Right eye
  const rSclera = new THREE.Mesh(scleraGeo, scleraMat);
  rSclera.position.set(eyeX, eyeY, eyeZ);
  const rIris = new THREE.Mesh(irisGeo, irisMat);

  const rCatch = new THREE.Mesh(catchGeo, catchMat);

  // Eyelids — thin arcs above each eye
  const lidGeo = new THREE.TorusGeometry(0.035, 0.006, 6, 16, Math.PI);
  const lidMat = skinMat.clone();
  lidMat.clippingPlanes = [];
  for (let side = -1; side <= 1; side += 2) {

    lid.position.set(side * eyeX, eyeY + 0.015, eyeZ + 0.02);
    lid.rotation.z = side * 0.1;

    faceGroup.add(lid);

  // Nose — bridge + tip
  const noseBridgeGeo = new THREE.CylinderGeometry(0.005, 0.008, 0.04, 8);
  const noseBridge = new THREE.Mesh(noseBridgeGeo, noseMat);
  noseBridge.position.set(0, eyeY - 0.025, eyeZ + 0.015);
  noseBridge.rotation.x = -0.3;
  const noseTip = new THREE.Mesh(noseGeo, noseMat);
  noseTip.position.set(0, eyeY - 0.04, eyeZ + 0.025);

  // Lips — positioned below nose
  const lipY = eyeY - 0.065;
  const uLip = new THREE.Mesh(lipGeo, upperLipMat);
  uLip.position.set(0, lipY, eyeZ + 0.005);
  uLip.rotation.x = Math.PI * 0.5;
  uLip.rotation.z = Math.PI;
  const lLip = new THREE.Mesh(lowerLipGeo, lowerLipMat);
  lLip.position.set(0, lipY - 0.012, eyeZ + 0.003);
  lLip.rotation.x = -Math.PI * 0.5;

  // Eyebrows — arched above eyes
  const browY = eyeY + 0.035;
  const lBrow = new THREE.Mesh(browGeo, browMat);
  lBrow.position.set(-eyeX, browY, eyeZ + 0.005);
  lBrow.rotation.z = -0.2;
  const rBrow = new THREE.Mesh(browGeo, browMat);
  rBrow.position.set(eyeX, browY, eyeZ + 0.005);
  rBrow.rotation.z = 0.2;

  faceGroup.add(lSclera, lIris, lPupil, lCatch, rSclera, rIris, rPupil, rCatch,
                noseBridge, noseTip, uLip, lLip, lBrow, rBrow);

  faceGroup.userData = { lIris, rIris, lPupil, rPupil, lCatch, rCatch, uLip, lLip };
}

let vrm = null, headBone = null;
const headY = 2.05;
const bones = {};
const BONE_NAMES = ['hips','spine','chest','upperChest','neck','head','leftShoulder','rightShoulder','leftUpperArm','rightUpperArm','leftLowerArm','rightLowerArm','leftHand','rightHand','leftUpperLeg','rightUpperLeg','leftLowerLeg','rightLowerLeg','leftFoot','rightFoot'];

async function loadVRM() {
  const loader = new GLTFLoader();
  let model;
  try {
    loader.register((parser) => new VRMLoaderPlugin(parser));
    const gltf = await loader.loadAsync('/models/kannaka.vrm');
    vrm = gltf.userData.vrm;
    if (vrm) {
      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      model = vrm.scene;
      console.log('[hologram] VRM loaded via plugin');
    } else {
      model = gltf.scene;
      console.log('[hologram] VRM plugin returned null, using GLTF scene');
    }
  } catch(e) {
    console.warn('[hologram] VRM plugin failed, loading as plain GLTF:', e.message);
    const loader2 = new GLTFLoader();
    const gltf = await loader2.loadAsync('/models/kannaka.vrm');
    model = gltf.scene;
  }
  // Scale to ~4 units tall
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 4 / size.y;
  model.scale.setScalar(scale);
  model.rotation.y = Math.PI; // VRM faces +Z, camera looks down -Z — rotate 180°
  model.position.set(-center.x*scale, -box.min.y*scale - 0.5, center.z*scale);
  // Remove head geometry by collapsing vertices above neck height
  // Model space: total height ~2.63, neck at ~2.05
  // Head bone is scaled to 0.001 after bone setup — hides VRM head + triangle
  // Just apply materials here
  model.traverse((child) => {
    if (child.isMesh) {
      child.material = skinMat.clone();
      child.castShadow = false;
      child.receiveShadow = false;
      // Add wireframe sibling that shares geometry and follows skeleton
      const wire = new THREE.Mesh(child.geometry, wireMat.clone());
      wire.morphTargetInfluences = child.morphTargetInfluences;
      wire.morphTargetDictionary = child.morphTargetDictionary;
      if (child.isSkinnedMesh) {
        const wSkinned = new THREE.SkinnedMesh(child.geometry, wireMat.clone());
        wSkinned.skeleton = child.skeleton;
        wSkinned.bindMatrix.copy(child.bindMatrix);
        wSkinned.bindMatrixInverse.copy(child.bindMatrixInverse);
        child.parent.add(wSkinned);
      } else {
        child.parent.add(wire);
      }
    }
  });
  scene.add(model);
  // Get bone references — try VRM humanoid first, then search by name
  if (vrm && vrm.humanoid) {
    for (const name of BONE_NAMES) {
      const node = vrm.humanoid.getRawBoneNode(name);
      if (node) bones[name] = node;
    }
  } else {
    // Fallback: search the model's skeleton by common VRM/mixamo bone names
    const boneAliases = {
      hips: ['hips','hip','pelvis','root'],
      spine: ['spine','spine1'],
      chest: ['chest','spine2','upper_body'],
      upperChest: ['upperchest','spine3'],
      neck: ['neck'],
      head: ['head'],
      leftUpperArm: ['leftupperarm','leftshoulder','left_arm','l_arm','j_bac_l'],
      rightUpperArm: ['rightupperarm','rightshoulder','right_arm','r_arm','j_bac_r'],
      leftLowerArm: ['leftlowerarm','leftforearm','left_forearm','l_forearm'],
      rightLowerArm: ['rightlowerarm','rightforearm','right_forearm','r_forearm'],
      leftHand: ['lefthand','left_hand','l_hand'],
      rightHand: ['righthand','right_hand','r_hand'],
      leftUpperLeg: ['leftupperleg','leftleg','left_leg','l_leg','j_asi_l'],
      rightUpperLeg: ['rightupperleg','rightleg','right_leg','r_leg','j_asi_r'],
      leftLowerLeg: ['leftlowerleg','leftknee','l_knee'],
      rightLowerLeg: ['rightlowerleg','rightknee','r_knee'],
    };
    const allBones = [];
    model.traverse((child) => {
      if (child.isBone) allBones.push(child);
    });
    console.log('[hologram] All bones:', allBones.map(b => b.name).join(', '));
    for (const [name, aliases] of Object.entries(boneAliases)) {
      for (const bone of allBones) {
        const bn = bone.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (aliases.some(a => bn.includes(a.replace(/[^a-z0-9]/g, '')))) {
          bones[name] = bone;
          break;
        }
      }
    }
  }
  headBone = bones.head || null;

  // ── Shape Kannaka — ideal feminine proportions ──────
  // Scale individual bones to sculpt the body
  if (bones.hips) bones.hips.scale.set(1.25, 1.0, 1.1);           // wider hips
  if (bones.spine) bones.spine.scale.set(0.85, 1.05, 0.9);        // narrow waist, slightly taller torso
  if (bones.chest) bones.chest.scale.set(1.15, 1.0, 1.15);        // fuller chest/bust
  if (bones.upperChest) bones.upperChest.scale.set(1.05, 1.0, 1.05); // slight upper chest
  if (bones.neck) bones.neck.scale.set(0.85, 1.1, 0.85);          // slender neck, slightly longer
  if (bones.head) bones.head.scale.set(0.001, 0.001, 0.001);      // collapse VRM head to nothing — our custom head replaces it
  if (bones.leftUpperArm) bones.leftUpperArm.scale.set(0.88, 1.0, 0.88);  // slimmer arms
  if (bones.rightUpperArm) bones.rightUpperArm.scale.set(0.88, 1.0, 0.88);
  if (bones.leftUpperLeg) bones.leftUpperLeg.scale.set(1.05, 1.08, 1.0);  // slightly longer, fuller thighs
  if (bones.rightUpperLeg) bones.rightUpperLeg.scale.set(1.05, 1.08, 1.0);
  if (bones.leftLowerLeg) bones.leftLowerLeg.scale.set(0.92, 1.05, 0.92); // slender calves, longer
  if (bones.rightLowerLeg) bones.rightLowerLeg.scale.set(0.92, 1.05, 0.92);

  // Also try to find bones by traversing the scene directly
  const allBoneNames = [];
  model.traverse((child) => { if (child.isBone) allBoneNames.push(child.name); });
  console.log('[hologram] All skeleton bones:', allBoneNames.join(', '));

  // Fill in any missing bones by direct name search
  const missingBones = BONE_NAMES.filter(n => !bones[n]);
  if (missingBones.length > 0) {
    console.log('[hologram] Missing from humanoid API:', missingBones.join(', '));
    model.traverse((child) => {
      if (child.isBone) {
        const bn = child.name.toLowerCase();
        for (const name of missingBones) {
          if (bn.includes(name.toLowerCase()) && !bones[name]) {
            bones[name] = child;
            console.log('[hologram] Found', name, 'via skeleton:', child.name);
          }
        }
      }
    });
  }

  // Try VRM humanoid with additional bone names that might exist
  if (vrm && vrm.humanoid) {
    const extraNames = ['leftShoulder','rightShoulder','leftLowerArm','rightLowerArm','leftHand','rightHand','leftLowerLeg','rightLowerLeg','leftFoot','rightFoot'];
    for (const name of extraNames) {
      if (!bones[name]) {
        try {
          const node = vrm.humanoid.getRawBoneNode(name);
          if (node) { bones[name] = node; console.log('[hologram] Found extra bone:', name); }
        } catch(e) {}
      }
    }
  }

  console.log('[hologram] Final bones:', Object.keys(bones).join(', '));
}

// Body-focused shot system
// shotType: 'face' | 'chest' | 'legs' | 'hips' | 'neck_shoulder'
let shotType = 'face';
let shotCamTarget = new THREE.Vector3(); // where camera goes during dolly_in
let shotLookTarget = new THREE.Vector3(); // what camera looks at during hold
let shotDriftAngle = 0; // slow drift during hold

// Skin material baseline values (for sweaty effect restore)
const skinBaseClearcoat = 0.25;
const skinBaseClearcoatRoughness = 0.25;
const skinBaseSheen = 0.8;

function pickShotType() {
  const r = Math.random();
  if (r < 0.30) return 'face';
  if (r < 0.50) return 'chest';
  if (r < 0.65) return 'legs';
  if (r < 0.85) return 'hips';
  return 'neck_shoulder';
}

function computeShotTargets(type, headPos, headQuat, setDuration) {
  const boneWorldPos = new THREE.Vector3();
  switch (type) {
    case 'face':
      shotCamTarget.set(0, headPos.y + 0.05, 1.2);
      shotLookTarget.copy(headPos);
      break;
    case 'chest':
      if (bones.chest) bones.chest.getWorldPosition(boneWorldPos);
      else boneWorldPos.set(0, headPos.y - 0.35, 0);
      shotCamTarget.set(boneWorldPos.x + 0.15, boneWorldPos.y + 0.05, boneWorldPos.z + 0.9);
      shotLookTarget.copy(boneWorldPos);
      break;
    case 'legs':
      if (bones.leftUpperLeg) bones.leftUpperLeg.getWorldPosition(boneWorldPos);
      else boneWorldPos.set(0, headPos.y - 1.2, 0);
      shotCamTarget.set(boneWorldPos.x + 0.3, boneWorldPos.y + 0.15, boneWorldPos.z + 1.2);
      shotLookTarget.copy(boneWorldPos);
      shotLookTarget.y += 0.1; // look slightly up at legs
      break;
    case 'hips':
      if (bones.hips) bones.hips.getWorldPosition(boneWorldPos);
      else boneWorldPos.set(0, headPos.y - 0.7, 0);
      shotCamTarget.set(boneWorldPos.x + 0.5, boneWorldPos.y + 0.1, boneWorldPos.z + 1.0);
      shotLookTarget.copy(boneWorldPos);
      break;
    case 'neck_shoulder':
      if (bones.neck) bones.neck.getWorldPosition(boneWorldPos);
      else boneWorldPos.set(0, headPos.y - 0.1, 0);
      shotCamTarget.set(boneWorldPos.x + 0.35, boneWorldPos.y + 0.05, boneWorldPos.z + 0.85);
      shotLookTarget.copy(boneWorldPos);
      break;
  }
  if (setDuration) {
    // Cinematic close-up hold: 6, 8, or 12 seconds — intimate shots linger
    const holdChoices = type === 'face' ? [8, 12, 12] : [6, 8, 12];
    stareHoldDuration = holdChoices[Math.floor(Math.random() * holdChoices.length)];
  }
}

// ── Dance Memory — she learns to dance by remembering what worked ──
const DanceMemory = (() => {
  const MAX = 500, KEY = 'kannaka_dance_memory';
  const BK = ['hipsY','hipsX','hipsZ','spineY','spineX','spineZ','chestY','chestX','chestZ','headY','headX','headZ','lArmZ','lArmX','lArmY','rArmZ','rArmX','rArmY','lElbow','rElbow','lLegX','lLegZ','rLegX','rLegZ','lKnee','rKnee'];
  let snaps = [], dirty = 0, last = null, lastT = 0;
  try { const raw = localStorage.getItem(KEY); if (raw) { snaps = JSON.parse(raw) || []; console.log('[dance-memory] Loaded', snaps.length, 'snapshots'); } } catch(e) { console.warn('[dance-memory] localStorage unavailable:', e.message); }
  const persist = () => { try { localStorage.setItem(KEY, JSON.stringify(snaps)); } catch(e) {} };
  const sim = (a, b) => {
    const av = [a.tempo/180, a.bass, a.mid, a.high, a.vocal, a.energy], bv = [b.tempo/180, b.bass, b.mid, b.high, b.vocal, b.energy], w = [1.5, 1.2, 1.0, 1.0, 1.3, 1.1];
    let d = 0, na = 0, nb = 0;
    for (let i = 0; i < 6; i++) { d += av[i]*bv[i]*w[i]; na += av[i]*av[i]*w[i]; nb += bv[i]*bv[i]*w[i]; }
    return (na <= 0 || nb <= 0) ? 0 : d / Math.sqrt(na * nb);
  };
  return {
    capture(f, pose) {
      snaps.push({ ...f, pose, timestamp: Date.now() });
      if (snaps.length > MAX) snaps.shift();
      if (++dirty >= 10) { persist(); dirty = 0; }
      if (snaps.length % 25 === 0) console.log('[dance-memory] Captured snapshot', snaps.length);
    },
    recall(f) {
      if (snaps.length < 3) return null;
      const scored = snaps.map(s => ({ s, v: sim(f, s) })).sort((a, b) => b.v - a.v).slice(0, 3);
      const tot = scored.reduce((a, x) => a + Math.max(0, x.v), 0);
      if (tot <= 0) return null;
      const pose = {};
      for (const k of BK) pose[k] = 0;
      for (const { s, v } of scored) { const w = Math.max(0, v) / tot; for (const k of BK) pose[k] += (s.pose[k] || 0) * w; }
      last = { pose, confidence: Math.min(1, scored[0].v) * Math.min(1, snaps.length / 50) };
      lastT = performance.now();
      console.log('[dance-memory] Recall top sim=' + scored[0].v.toFixed(3) + ' conf=' + last.confidence.toFixed(3) + ' (' + snaps.length + ' memories)');
      return last;
    },
    getLast: () => last, getLastT: () => lastT, count: () => snaps.length,
    clear: () => { snaps = []; last = null; persist(); console.log('[dance-memory] Cleared'); },
    exportAll: () => JSON.stringify(snaps),
  };
})();
window.kannakaDance = { count: () => DanceMemory.count(), clear: () => DanceMemory.clear(), export: () => DanceMemory.exportAll() };

// ── Arm Gesture State Machine — POINT, REACH, BECKON, HAND_TO_HEART ──
// She doesn't just cycle — she reaches, points, beckons, holds her hand to her heart.
// Gestures blend on top of cyclic arm motion, triggered by music and timer.
const Gestures = (() => {
  const TYPES = ['POINT', 'REACH', 'BECKON', 'HAND_TO_HEART'];
  let type = null, hand = 'right', t = 0, dur = 0, cooldown = 2.0, lastType = null;
  const pick = (audio) => {
    // HAND_TO_HEART on quiet parts (low energy, low vocal)
    if (audio.overall < 0.22 && audio.vocal < 0.18) return 'HAND_TO_HEART';
    // REACH on vocal peaks
    if (audio.vocal > 0.55) return 'REACH';
    // otherwise pick one that isn't the same as last
    const pool = TYPES.filter(x => x !== lastType && x !== 'HAND_TO_HEART');
    return pool[Math.floor(Math.random() * pool.length)];
  };
  return {
    update(dt, audio) {
      if (type) {
        t += dt;
        if (t >= dur) { lastType = type; type = null; t = 0; cooldown = 1.2 + Math.random() * 1.5; }
      } else {
        cooldown -= dt;
        const forceReach = audio.vocal > 0.6 && lastType !== 'REACH';
        const forceHeart = audio.overall < 0.2 && audio.vocal < 0.15 && lastType !== 'HAND_TO_HEART';
        if (cooldown <= 0 || forceReach || forceHeart) {
          type = forceHeart ? 'HAND_TO_HEART' : (forceReach ? 'REACH' : pick(audio));
          hand = Math.random() < 0.5 ? 'left' : 'right';
          t = 0;
          dur = type === 'HAND_TO_HEART' ? (3.0 + Math.random() * 2.0) :
                type === 'REACH' ? (2.0 + Math.random() * 1.5) :
                type === 'POINT' ? (1.6 + Math.random() * 1.0) :
                (2.0 + Math.random() * 1.2); // BECKON
          console.log('[gesture] ' + type + ' ' + hand + ' for ' + dur.toFixed(1) + 's');
        }
      }
    },
    // Returns { active, type, hand, progress, phase } — phase 0→1 ease-in, hold, ease-out
    state() {
      if (!type) return { active: false };
      const p = t / dur;
      // tri-phase envelope: 20% in, 60% hold, 20% out
      const env = p < 0.2 ? (p / 0.2) : p > 0.8 ? (1 - (p - 0.8) / 0.2) : 1;
      const eased = env * env * (3 - 2 * env); // smoothstep
      return { active: true, type, hand, progress: p, blend: eased };
    }
  };
})();

// -- Render Loop --
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), t = clock.getElapsedTime();
  const lf = levelFactor();
  const energy = perception.rms_energy || 0.3;
  const tempo = perception.tempo_bpm || 90;
  const valence = perception.valence || 0.5;
  const beatFreq = tempo / 60;
  beatPhase += dt * beatFreq * Math.PI * 2;

  // ── Wander — she moves around the stage randomly ──────
  if (!window._wander) {
    window._wander = {
      targetX: 0, targetZ: 0,     // where she's heading
      currentX: 0, currentZ: 0,   // where she is
      timer: 3 + Math.random() * 5, // time until next target
      baseX: 0, baseZ: 0,         // model's original position (set on first frame)
      init: false
    };
  }
  const w = window._wander;
  if (!w.init && vrm) {
    w.baseX = vrm.scene.position.x;
    w.baseZ = vrm.scene.position.z;
    w.init = true;
  }

  w.timer -= dt;
  if (w.timer <= 0) {
    // Pick a new random spot within a radius
    const wanderRadius = 2.0;
    w.targetX = (Math.random() - 0.5) * wanderRadius * 2;
    w.targetZ = (Math.random() - 0.5) * wanderRadius * 1.2;
    w.timer = 4 + Math.random() * 6; // 4-10 seconds at each spot
  }

  // Smooth drift toward target
  w.currentX += (w.targetX - w.currentX) * dt * 0.6;
  w.currentZ += (w.targetZ - w.currentZ) * dt * 0.6;

  // Apply to model position
  if (vrm) {
    vrm.scene.position.x = w.baseX + w.currentX;
    vrm.scene.position.z = w.baseZ + w.currentZ;
    // Face the direction she's moving (subtle turn)
    const dx = w.targetX - w.currentX;
    const dz = w.targetZ - w.currentZ;
    if (Math.abs(dx) > 0.01 || Math.abs(dz) > 0.01) {
      const targetAngle = Math.atan2(dx, dz) * 0.3 + Math.PI; // partial turn toward movement
      const currentAngle = vrm.scene.rotation.y;
      vrm.scene.rotation.y += (targetAngle - currentAngle) * dt * 0.5;
    }
  }

  // Camera follows her loosely (adjust lookAt target)
  const wanderLookX = w.currentX * 0.3;
  const wanderLookZ = w.currentZ * 0.3;

  // ── Floating artwork — orbit + cycle ──────────────────
  artCycleTimer += dt;
  if (artCycleTimer > ART_CYCLE_INTERVAL && allArtwork.length > ART_VISIBLE) {
    artCycleTimer = 0;
    cycleOneCard();
  }
  for (const card of artCards) {
    const u = card.userData;
    u.orbitAngle += u.orbitSpeed * dt;
    const acx = w.currentX + Math.cos(u.orbitAngle) * u.orbitRadius;
    const acz = w.currentZ + Math.sin(u.orbitAngle) * u.orbitRadius;
    const acy = u.orbitHeight + Math.sin(t * u.bobSpeed + u.bobPhase) * 0.15;
    card.position.set(acx, acy, acz);
    card.lookAt(camera.position);
    // Fade in new cards
    u.fadeIn = Math.min(1, u.fadeIn + dt * 0.5);
    card.material.opacity = u.fadeIn * 0.75;
    card.scale.setScalar(0.5 * u.fadeIn);
  }

  // Consciousness reactivity
  skinMat.opacity = 0.65 + lf*0.25;
  skinMat.emissiveIntensity = 0.15 + lf*0.3;
  wireMat.opacity = 0.03 + lf*0.04;
  ambientLight.intensity = 0.3 + lf*0.5;
  backLight.intensity = 30 + lf*40;
  spotLight.intensity = 8 + lf*20;
  irisMat.emissiveIntensity = 1.0 + lf*3;
  eyeGlowL.intensity = 0.3 + lf*0.8;
  eyeGlowR.intensity = 0.3 + lf*0.8;
  if (useBloom) bloomPass.strength = Math.min(1.4, 0.5 + lf*0.6 + audio.overall * 0.3); // capped to keep her defined
  // Analyze audio frequencies
  analyzeAudio(dt);

  // ── Dynamic Backlight Color ─────────────────────────
  {
    let targetH, targetS, targetL;
    if (audio.beat) {
      // Peak/beat: white-hot flash
      targetH = 0; targetS = 0; targetL = 0.9;
    } else if (audio.vocal > 0.35) {
      // Vocals strong: warm pink
      targetH = 0.9; targetS = 0.7; targetL = 0.6;
    } else if (audio.bass > 0.3) {
      // Bass heavy: deep purple
      targetH = 0.75; targetS = 0.8; targetL = 0.4;
    } else {
      // Instrumental/low energy: cool blue
      targetH = 0.6; targetS = 0.6; targetL = 0.5;
    }
    const currentHSL = { h: 0, s: 0, l: 0 };
    backLight.color.getHSL(currentHSL);
    const lerpRate = audio.beat ? 0.5 : 0.08;
    const newH = currentHSL.h + (targetH - currentHSL.h) * lerpRate;
    const newS = currentHSL.s + (targetS - currentHSL.s) * lerpRate;
    const newL = currentHSL.l + (targetL - currentHSL.l) * lerpRate;
    backLight.color.setHSL(newH, newS, newL);
  }

  // ── Cinematic Camera — music-driven radius/height/speed ──
  {
    const totalEnergy = audio.overall;
    if (totalEnergy < 0.15) {
      // Quiet: wide shot
      targetOrbitRadius = 6.5; targetOrbitSpeed = 0.04; targetOrbitHeight = 2.0;
    } else if (totalEnergy < 0.35) {
      // Moderate: medium shot
      targetOrbitRadius = 4.5; targetOrbitSpeed = 0.08; targetOrbitHeight = 1.8;
    } else {
      // Intense: close-up
      targetOrbitRadius = 2.8; targetOrbitSpeed = 0.12; targetOrbitHeight = 1.6;
    }
    // Bass-heavy: lower camera for drama
    targetOrbitHeight -= audio.bass * 0.5;
    // Highs: raise camera
    targetOrbitHeight += audio.high * 0.4;
    // Smooth transitions
    orbitRadius += (targetOrbitRadius - orbitRadius) * dt * 0.8;
    orbitHeight += (targetOrbitHeight - orbitHeight) * dt * 0.8;
    orbitSpeed += (targetOrbitSpeed - orbitSpeed) * dt * 1.5;
  }

  // ── Vocal-triggered stare — picks a body-focused shot type ──
  if (stareState === 'orbit' && audio.vocal > 0.5 && stareTimer > 8) {
    stareState = 'dolly_in'; stareProgress = 0;
    orbitPosBeforeStare.copy(camera.position);
    shotType = pickShotType();
    shotDriftAngle = Math.random() * Math.PI * 2;
    computeShotTargets(shotType, _headWorldPos, _headWorldQuat, true);
    nextStareAt = 25 + Math.random() * 25;
  }

  // ── Floor, Shadow, Light Pool updates ───────────────
  {
    const wx = window._wander ? window._wander.currentX : 0;
    const wz = window._wander ? window._wander.currentZ : 0;
    // Shadow follows wander position
    shadowCircle.position.x = wx;
    shadowCircle.position.z = wz;
    // Scale shadow with bounce — smaller when higher
    const bounceY = (bones.hips && bones.hips.userData.restY !== undefined)
      ? (bones.hips.position.y - bones.hips.userData.restY) : 0;
    const shadowScale = Math.max(0.5, 1.0 - bounceY * 4);
    shadowCircle.scale.set(shadowScale, shadowScale, 1);
    shadowMat.opacity = 0.3 * shadowScale;
    // Light pool follows wander
    lightPool.position.x = wx;
    lightPool.position.z = wz;
    lightPool.material.opacity = 0.08 + audio.overall * 0.08;
    // Pool spot follows
    poolSpot.position.x = wx;
    poolSpot.target.position.x = wx;
    poolSpot.target.position.z = wz;
  }

  particleMat.opacity = 0.2 + lf*0.6 + audio.vocal * 0.3;
  particleMat.size = (isMobile ? 0.03 : 0.022) + audio.vocal * 0.015;
  // Particles color shifts with the music — bass=warm, highs=cool
  particleMat.color.setHSL(0.75 - audio.bass * 0.15 + audio.high * 0.1, 0.6, 0.5 + audio.overall * 0.2);

  // VRM bone animation
  // Update VRM FIRST (resets pose), then apply our dance on top
  if (vrm && vrm.update) vrm.update(dt);

  let hipSway = 0;
  if (bones.hips) {
    // ── Dance routines — randomly switches styles ─────────
    const e = Math.max(0.35, Math.min(energy * 2.5, 1));
    if (!window._ds) window._ds = { style: 0, timer: 12 + Math.random() * 8 };
    window._ds.timer -= dt;
    if (window._ds.timer <= 0) {
      window._ds.style = Math.floor(Math.random() * 4);
      window._ds.timer = 20 + Math.random() * 20;
    }
    const style = window._ds.style;
    const slow = beatPhase * 0.5;
    const t2 = beatPhase * 0.25;

    // Style 0=sensual, 1=groove, 2=wave, 3=fierce
    const hipAmp = [0.49, 0.36, 0.29, 0.55][style];
    const hipXAmp = [0.16, 0.12, 0.20, 0.18][style];
    const hipZAmp = [0.18, 0.14, 0.12, 0.21][style];
    const hipPhase = style === 1 ? beatPhase * 0.5 : slow;
    // Bass hits push the hips harder
    const bassKick = audio.bass * 0.15;
    hipSway = Math.sin(hipPhase) * (hipAmp + bassKick) * e + Math.sin(hipPhase * 2 + 0.5) * 0.08 * e;
    bones.hips.rotation.y = hipSway;
    bones.hips.rotation.x = Math.sin(hipPhase) * (hipXAmp + bassKick * 0.5) * e;
    bones.hips.rotation.z = Math.sin(hipPhase + 0.7) * hipZAmp * e;
    // Beat hit: sharp hip pop
    if (audio.beat) bones.hips.rotation.z += 0.06 * e;

    // Bounce varies by style
    const bounceAmp = [0.04, 0.10, 0.03, 0.12][style];
    const bassBounce = audio.beat ? 0.04 : 0; // extra drop on beat
    const bounce = Math.pow(Math.abs(Math.sin(beatPhase)), [2,1.5,3,1][style]) * bounceAmp * e + bassBounce;
    if (bones.hips.userData.restY === undefined) bones.hips.userData.restY = bones.hips.position.y;
    bones.hips.position.y = bones.hips.userData.restY + bounce;

    // Spine: body roll — delayed wave traveling up from hips
    if (bones.spine) {
      bones.spine.rotation.y = -hipSway * 0.5;
      // Forward/back lean: ±0.15 rad slowly + mids reaction
      bones.spine.rotation.x = Math.sin(slow - 0.4) * (0.08 + audio.mid * 0.06) * e + Math.sin(t * 0.4) * 0.15 * e;
      // Side bend: ±0.10 rad slowly + existing sway
      bones.spine.rotation.z = Math.sin(slow + 0.8) * 0.06 * e + Math.sin(t * 0.3 + 1.0) * 0.10 * e;
    }

    // Chest: isolation — moves independently, sensual chest circles
    if (bones.chest) {
      bones.chest.rotation.y = -hipSway * 0.3 + Math.sin(slow * 2 + 1) * 0.05 * e;
      bones.chest.rotation.x = Math.sin(slow - 0.8) * 0.06 * e;  // chest push forward/back
      bones.chest.rotation.z = Math.sin(slow + 1.2) * 0.05 * e;  // chest tilt
    }

    // Upper chest: continues the body roll wave
    if (bones.upperChest) {
      bones.upperChest.rotation.x = Math.sin(slow - 1.2) * 0.04 * e;
      bones.upperChest.rotation.z = Math.sin(slow + 1.5) * 0.03 * e;
    }

    // Neck: fluid, follows the wave
    if (bones.neck) {
      bones.neck.rotation.x = Math.sin(slow - 1.5) * 0.04 * e;
      bones.neck.rotation.z = Math.sin(slow + 2.0) * 0.03 * e;
    }

    // Head — reacts to highs + vocals, more expressive
    if (bones.head) {
      const hTurn = [0.18, 0.12, 0.20, 0.25][style];
      const hTilt = [0.12, 0.08, 0.14, 0.15][style];
      const hNod = [0.12, 0.14, 0.10, 0.18][style];
      const hSpeed = style === 1 ? beatPhase : t2;
      bones.head.rotation.x = -0.12 + Math.sin(hSpeed) * hNod * e + audio.vocal * 0.07;
      bones.head.rotation.y = Math.sin(hSpeed * 0.7) * hTurn * e + Math.sin(t * 0.25) * 0.06 * e;
      bones.head.rotation.z = Math.sin(hSpeed + 0.5) * hTilt * e + audio.high * 0.05;
      // Beat nod
      if (audio.beat) bones.head.rotation.x += 0.08;
    }

    // Shoulders: rise and roll
    const shoulderAmp = [0.04, 0.08, 0.06, 0.10][style]; // softer for sensual
    const shoulderHighReact = [0.03, 0.06, 0.05, 0.07][style];
    if (bones.leftShoulder) {
      bones.leftShoulder.rotation.z = Math.sin(slow + 0.3) * (shoulderAmp + audio.high * shoulderHighReact) * e + (audio.beat ? 0.03 : 0);
      bones.leftShoulder.rotation.y = Math.sin(slow * 0.5) * 0.04 * e;
      bones.leftShoulder.rotation.x = Math.sin(slow * 0.7 + 0.5) * 0.08 * e; // shoulder roll
    }
    if (bones.rightShoulder) {
      bones.rightShoulder.rotation.z = -Math.sin(slow + 0.3) * (shoulderAmp + audio.high * shoulderHighReact) * e - (audio.beat ? 0.03 : 0);
      bones.rightShoulder.rotation.y = -Math.sin(slow * 0.5) * 0.04 * e;
      bones.rightShoulder.rotation.x = Math.sin(slow * 0.7 + 2.0) * 0.08 * e; // shoulder roll (offset phase)
    }

    // Arms — style-specific character (bigger reach)
    const armRaise = [0.50, 0.38, 0.60, 0.72][style];
    const armPhaseL = (style === 1 ? beatPhase * 0.5 : slow) + 0.5;
    const armPhaseR = armPhaseL + [2.0, 1.5, 2.5, Math.PI][style];
    if (bones.leftUpperArm) {
      bones.leftUpperArm.rotation.z = 0.20 + Math.sin(armPhaseL) * armRaise * e;
      bones.leftUpperArm.rotation.x = Math.sin(armPhaseL * 0.7) * 0.38 * e;
      bones.leftUpperArm.rotation.y = Math.sin(armPhaseL * 0.5) * 0.22 * e;
    }
    if (bones.rightUpperArm) {
      bones.rightUpperArm.rotation.z = -0.20 - Math.sin(armPhaseR) * armRaise * e;
      bones.rightUpperArm.rotation.x = Math.sin(armPhaseR * 0.7) * 0.38 * e;
      bones.rightUpperArm.rotation.y = -Math.sin(armPhaseR * 0.5) * 0.22 * e;
    }

    // Legs: weight shift, one knee bends slightly
    if (bones.leftUpperLeg) {
      bones.leftUpperLeg.rotation.x = Math.sin(slow) * 0.08 * e;
      bones.leftUpperLeg.rotation.z = Math.sin(slow) * 0.04 * e;
    }
    if (bones.rightUpperLeg) {
      bones.rightUpperLeg.rotation.x = Math.sin(slow + Math.PI) * 0.08 * e;
      bones.rightUpperLeg.rotation.z = -Math.sin(slow) * 0.04 * e;
    }
    // Elbows — follow upper arm with delay, more dramatic bend
    if (bones.leftLowerArm) {
      bones.leftLowerArm.rotation.x = -(Math.max(0, Math.sin(armPhaseL + 0.8)) * 1.0 * e + 0.20);
    }
    if (bones.rightLowerArm) {
      bones.rightLowerArm.rotation.x = -(Math.max(0, Math.sin(armPhaseR + 0.8)) * 1.0 * e + 0.20);
    }

    // Hands: gentle wrist movement
    if (bones.leftHand) {
      bones.leftHand.rotation.x = Math.sin(slow * 0.8 + 1) * 0.2 * e;
      bones.leftHand.rotation.z = Math.sin(slow * 0.6) * 0.15 * e;
    }
    if (bones.rightHand) {
      bones.rightHand.rotation.x = Math.sin(slow * 0.8 + 2.5) * 0.2 * e;
      bones.rightHand.rotation.z = -Math.sin(slow * 0.6 + 1) * 0.15 * e;
    }

    // Lower legs: style-specific knee bend depth
    const kneeAmp = [0.25, 0.35, 0.15, 0.45][style];
    if (bones.leftLowerLeg) {
      bones.leftLowerLeg.rotation.x = Math.max(0, Math.sin(slow)) * kneeAmp * e + 0.05;
    }
    if (bones.rightLowerLeg) {
      bones.rightLowerLeg.rotation.x = Math.max(0, Math.sin(slow + Math.PI)) * kneeAmp * e + 0.05;
    }

    // Feet/ankles: point and flex
    if (bones.leftFoot) {
      bones.leftFoot.rotation.x = Math.sin(slow + 0.5) * 0.1 * e;
    }
    if (bones.rightFoot) {
      bones.rightFoot.rotation.x = Math.sin(slow + Math.PI + 0.5) * 0.1 * e;
    }

    // ── Dance Memory: capture + recall + blend ────────────
    const DM_MAP = [[bones.hips,'y','hipsY'],[bones.hips,'x','hipsX'],[bones.hips,'z','hipsZ'],[bones.spine,'y','spineY'],[bones.spine,'x','spineX'],[bones.spine,'z','spineZ'],[bones.chest,'y','chestY'],[bones.chest,'x','chestX'],[bones.chest,'z','chestZ'],[bones.head,'y','headY'],[bones.head,'x','headX'],[bones.head,'z','headZ'],[bones.leftUpperArm,'z','lArmZ'],[bones.leftUpperArm,'x','lArmX'],[bones.leftUpperArm,'y','lArmY'],[bones.rightUpperArm,'z','rArmZ'],[bones.rightUpperArm,'x','rArmX'],[bones.rightUpperArm,'y','rArmY'],[bones.leftLowerArm,'x','lElbow'],[bones.rightLowerArm,'x','rElbow'],[bones.leftUpperLeg,'x','lLegX'],[bones.leftUpperLeg,'z','lLegZ'],[bones.rightUpperLeg,'x','rLegX'],[bones.rightUpperLeg,'z','rLegZ'],[bones.leftLowerLeg,'x','lKnee'],[bones.rightLowerLeg,'x','rKnee']];
    const musicFeatures = { tempo, bass: audio.bass, mid: audio.mid, high: audio.high, vocal: audio.vocal, energy: audio.overall };
    const isPlaying = (audio.vocal > 0.1 || audio.overall > 0.1);
    danceCaptureTimer += dt; danceRecallTimer += dt;
    if (danceCaptureTimer >= 2.0 && isPlaying) {
      danceCaptureTimer = 0;
      const pose = {};
      for (const [b, a, k] of DM_MAP) pose[k] = b ? b.rotation[a] : 0;
      DanceMemory.capture(musicFeatures, pose);
    }
    if (danceRecallTimer >= 4.0 && isPlaying) { danceRecallTimer = 0; DanceMemory.recall(musicFeatures); }
    const recalled = DanceMemory.getLast();
    if (recalled && recalled.confidence > 0.05) {
      const mw = 0.35 * recalled.confidence, imw = 1 - mw, rp = recalled.pose;
      for (const [b, a, k] of DM_MAP) if (b) b.rotation[a] = b.rotation[a] * imw + rp[k] * mw;
    }

    // ── Gesture application — intentional arm motion blends on top of cyclic/memory ──
    Gestures.update(dt, audio);
    const gs = Gestures.state();
    if (gs.active) {
      const w = gs.blend; // 0→1 ease
      const isL = gs.hand === 'left';
      const uArm = isL ? bones.leftUpperArm : bones.rightUpperArm;
      const lArm = isL ? bones.leftLowerArm : bones.rightLowerArm;
      const hand = isL ? bones.leftHand : bones.rightHand;
      const sideSign = isL ? 1 : -1;
      let perHandApplied = false;
      if (uArm && lArm) {
        let tUZ = uArm.rotation.z, tUX = uArm.rotation.x, tUY = uArm.rotation.y;
        let tLX = lArm.rotation.x;
        let tHZ = hand ? hand.rotation.z : 0, tHX = hand ? hand.rotation.x : 0;
        if (gs.type === 'POINT') {
          // Arm extended forward, elbow straight, hand pointing — at the viewer
          tUZ = sideSign * 1.25;          // raise to ~horizontal
          tUX = -1.35;                    // forward toward camera
          tUY = sideSign * -0.15;
          tLX = -0.15;                    // elbow nearly locked
          tHX = 0.0;  tHZ = sideSign * 0.1;
        } else if (gs.type === 'REACH') {
          // Both arms extended toward viewer — vocal peak moment
          const subtleBob = Math.sin(t * 3) * 0.05;
          if (bones.leftUpperArm) {
            bones.leftUpperArm.rotation.z = bones.leftUpperArm.rotation.z * (1 - w) + (1.15 + subtleBob) * w;
            bones.leftUpperArm.rotation.x = bones.leftUpperArm.rotation.x * (1 - w) + (-1.15) * w;
            bones.leftUpperArm.rotation.y = bones.leftUpperArm.rotation.y * (1 - w) + (-0.35) * w;
          }
          if (bones.rightUpperArm) {
            bones.rightUpperArm.rotation.z = bones.rightUpperArm.rotation.z * (1 - w) + (-1.15 - subtleBob) * w;
            bones.rightUpperArm.rotation.x = bones.rightUpperArm.rotation.x * (1 - w) + (-1.15) * w;
            bones.rightUpperArm.rotation.y = bones.rightUpperArm.rotation.y * (1 - w) + (0.35) * w;
          }
          if (bones.leftLowerArm) bones.leftLowerArm.rotation.x = bones.leftLowerArm.rotation.x * (1 - w) + (-0.25) * w;
          if (bones.rightLowerArm) bones.rightLowerArm.rotation.x = bones.rightLowerArm.rotation.x * (1 - w) + (-0.25) * w;
          // Spine lean toward viewer on reach
          if (bones.spine) bones.spine.rotation.x = bones.spine.rotation.x * (1 - w * 0.5) + (-0.15) * (w * 0.5);
          perHandApplied = true; // REACH touches both arms; skip single-hand block
        } else if (gs.type === 'BECKON') {
          // Arm raised mid, elbow bent, wrist curling in rhythmic come-here motion
          const curl = Math.sin(t * 6) * 0.5 + 0.5; // 0→1 pulsing
          tUZ = sideSign * 0.9;
          tUX = -0.9;
          tUY = sideSign * -0.25;
          tLX = -1.2 - curl * 0.6;        // elbow cycling
          tHX = 0.3 - curl * 0.8;         // wrist curl
          tHZ = sideSign * 0.15;
        } else if (gs.type === 'HAND_TO_HEART') {
          // Hand brought in to chest — held for quiet moments
          tUZ = sideSign * 0.55;
          tUX = -0.55;
          tUY = sideSign * -0.55;
          tLX = -1.85;                    // deep elbow bend
          tHX = 0.1;  tHZ = sideSign * 0.25;
          // Soften spine — she's feeling it
          if (bones.spine) bones.spine.rotation.x = bones.spine.rotation.x * (1 - w * 0.3) + (-0.05) * (w * 0.3);
        }
        if (!perHandApplied) {
          uArm.rotation.z = uArm.rotation.z * (1 - w) + tUZ * w;
          uArm.rotation.x = uArm.rotation.x * (1 - w) + tUX * w;
          uArm.rotation.y = uArm.rotation.y * (1 - w) + tUY * w;
          lArm.rotation.x = lArm.rotation.x * (1 - w) + tLX * w;
          if (hand) {
            hand.rotation.x = hand.rotation.x * (1 - w) + tHX * w;
            hand.rotation.z = hand.rotation.z * (1 - w) + tHZ * w;
          }
        }
      }
    }
  }

  // ── Heart energy — pulses with the beat, fills the body ──
  const heartBeat = Math.pow(Math.max(0, Math.sin(beatPhase)), 4) * 0.4; // subtle pulse
  const heartIntensity = 2 + heartBeat * 4 * energy + lf * 3;
  heartLight.intensity = heartIntensity;
  heartLight.color.setHSL(0.95, 0.6, 0.4 + heartBeat * 0.05);

  // Heart glow sphere — subtle
  heartGlowMat.emissiveIntensity = 0.8 + heartBeat * 1.5 * energy;
  heartGlowMat.opacity = 0.1 + heartBeat * 0.12 * energy;
  heartGlow.scale.setScalar(0.6 + heartBeat * 0.2 * energy);

  // Inner energy — very subtle
  innerEnergyMat.emissiveIntensity = 0.4 + heartBeat * 0.6 * energy;
  innerEnergyMat.opacity = 0.02 + heartBeat * 0.02 * energy;
  innerEnergy.scale.setScalar(1 + heartBeat * 0.08 * energy);

  // Body-wide energy — barely visible
  bodyEnergyMat.emissiveIntensity = 0.2 + lf * 0.5;
  bodyEnergyMat.opacity = 0.01 + lf * 0.02 + heartBeat * 0.005 * energy;
  bodyEnergy.scale.setScalar(1 + Math.sin(t * 0.5) * 0.02);

  // Skin glow — gentle, warm, not white
  skinMat.emissiveIntensity = 0.15 + lf * 0.2 + heartBeat * 0.1 * energy;

  // ── Energy flow — travels through her body based on movement ──
  // Core energy stays at the heart but SHIFTS toward whichever body part is moving most
  if (bones.chest) {
    const chestWP = new THREE.Vector3(); bones.chest.getWorldPosition(chestWP);
    const hipsWP = new THREE.Vector3(); bones.hips && bones.hips.getWorldPosition(hipsWP);
    const headWP = new THREE.Vector3(); bones.head && bones.head.getWorldPosition(headWP);
    const lHandWP = new THREE.Vector3(); bones.leftHand && bones.leftHand.getWorldPosition(lHandWP);
    const rHandWP = new THREE.Vector3(); bones.rightHand && bones.rightHand.getWorldPosition(rHandWP);
    const lFootWP = new THREE.Vector3(); bones.leftFoot && bones.leftFoot.getWorldPosition(lFootWP);
    const rFootWP = new THREE.Vector3(); bones.rightFoot && bones.rightFoot.getWorldPosition(rFootWP);

    // Track previous positions to measure movement velocity
    if (!window._prevPos) window._prevPos = { chest: chestWP.clone(), lHand: lHandWP.clone(), rHand: rHandWP.clone(), lFoot: lFootWP.clone(), rFoot: rFootWP.clone(), head: headWP.clone(), hips: hipsWP.clone() };
    const pp = window._prevPos;
    const velChest = chestWP.distanceTo(pp.chest) / dt;
    const velLHand = lHandWP.distanceTo(pp.lHand) / dt;
    const velRHand = rHandWP.distanceTo(pp.rHand) / dt;
    const velHips  = hipsWP.distanceTo(pp.hips) / dt;
    const velHead  = headWP.distanceTo(pp.head) / dt;

    // Find center of mass of movement — weighted by velocity
    const totalVel = velChest + velLHand + velRHand + velHips + velHead + 0.01;
    const flowCenter = new THREE.Vector3();
    flowCenter.addScaledVector(chestWP, (velChest + 1.5) / totalVel); // chest has base weight
    flowCenter.addScaledVector(hipsWP,  velHips  / totalVel);
    flowCenter.addScaledVector(headWP,  velHead  / totalVel);
    flowCenter.addScaledVector(lHandWP, velLHand / totalVel);
    flowCenter.addScaledVector(rHandWP, velRHand / totalVel);
    flowCenter.multiplyScalar(1 / 2.5); // normalize

    // Heart light slowly drifts toward the movement center
    if (!window._heartPos) window._heartPos = chestWP.clone();
    window._heartPos.lerp(flowCenter, dt * 2);
    window._heartPos.lerp(chestWP, dt * 3); // but always pulled back to chest
    heartLight.position.copy(window._heartPos);
    heartGlow.position.copy(window._heartPos);

    // Inner energy sphere — follows the chest but stretches toward fast-moving limbs
    innerEnergy.position.copy(chestWP);
    innerEnergy.position.lerp(flowCenter, 0.3);

    // Body energy — follows the body center (between hips and chest)
    bodyEnergy.position.copy(chestWP).lerp(hipsWP, 0.5);

    // ── Energy trail orbs — small glowing spheres that flow along limbs ──
    if (!window._energyOrbs) {
      window._energyOrbs = [];
      const orbGeo = new THREE.SphereGeometry(0.035, 8, 8);
      for (let i = 0; i < 6; i++) {
        const orbMat = new THREE.MeshStandardMaterial({
          color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 2,
          transparent: true, opacity: 0.7, depthWrite: false,
        });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        orb.userData = { target: i % 6, progress: Math.random(), speed: 0.3 + Math.random() * 0.3 };
        scene.add(orb);
        window._energyOrbs.push(orb);
      }
    }
    // Orb targets: chest->hips, chest->lHand, chest->rHand, hips->lFoot, hips->rFoot, chest->head
    const orbRoutes = [
      [chestWP, hipsWP],
      [chestWP, lHandWP],
      [chestWP, rHandWP],
      [hipsWP,  lFootWP],
      [hipsWP,  rFootWP],
      [chestWP, headWP],
    ];
    for (const orb of window._energyOrbs) {
      const [from, to] = orbRoutes[orb.userData.target];
      orb.userData.progress += dt * orb.userData.speed * (1 + energy);
      if (orb.userData.progress >= 1) {
        orb.userData.progress = 0;
        orb.userData.target = Math.floor(Math.random() * orbRoutes.length);
      }
      const p = orb.userData.progress;
      orb.position.lerpVectors(from, to, p);
      // Fade in/out at endpoints
      const fadeI = Math.sin(p * Math.PI); // 0 at endpoints, 1 at middle
      orb.material.opacity = 0.8 * fadeI * (0.5 + energy * 0.5);
      orb.material.emissiveIntensity = 1.5 + energy * 2 + heartBeat * 2;
    }

    // Update previous positions
    pp.chest.copy(chestWP); pp.lHand.copy(lHandWP); pp.rHand.copy(rHandWP);
    pp.lFoot.copy(lFootWP); pp.rFoot.copy(rFootWP); pp.head.copy(headWP); pp.hips.copy(hipsWP);
  }

  // Head group follows neck bone (head bone is scaled to 0, so use neck)
  const trackBone = bones.neck || headBone;
  if (trackBone) {
    trackBone.getWorldPosition(_headWorldPos);
    trackBone.getWorldQuaternion(_headWorldQuat);
    // Offset up from neck to head position
    _headWorldPos.y += 0.15;

    headGroup.position.copy(_headWorldPos);
    headGroup.position.y += 0.02;
    headGroup.quaternion.copy(_headWorldQuat);

    // Eye glow lights track face
    const lEyeWorld = new THREE.Vector3(-0.042, 0.01, 0.11).applyQuaternion(_headWorldQuat).add(_headWorldPos);
    const rEyeWorld = new THREE.Vector3(0.042, 0.01, 0.11).applyQuaternion(_headWorldQuat).add(_headWorldPos);
    eyeGlowL.position.copy(lEyeWorld);
    eyeGlowR.position.copy(rEyeWorld);
    stareLookTarget.copy(_headWorldPos);

    // Face light follows the head — always in front of her face
    const faceLightDir = new THREE.Vector3(0, 0.1, 1.8).applyQuaternion(_headWorldQuat);
    faceLight.position.copy(_headWorldPos).add(faceLightDir);

    // Pupil dilation with energy
    const fd = faceGroup.userData;
    if (fd.lPupil) {
      const pupilScale = 0.8 + energy * 0.5;
      fd.lPupil.scale.setScalar(pupilScale);
      fd.rPupil.scale.setScalar(pupilScale);
    }

    // ── Lip sync — mouth opens with vocal amplitude ────
    const vocalAmp = getVocalAmplitude();
    const lipBaseY = 0.005 - 0.065; // eyeY - lip offset from buildFace
    // Subtle smile during intimate close-up (stare hold)
    const smileAmount = (stareState === 'hold' || stareState === 'dolly_in') ? 0.003 : 0;
    if (fd.uLip && fd.lLip) {
      fd.uLip.position.y = lipBaseY + vocalAmp * 0.010 + smileAmount;
      fd.uLip.scale.x = 1 + vocalAmp * 0.15 + smileAmount * 8;
      fd.uLip.rotation.z = Math.PI + smileAmount * 3; // slight upward curve
      fd.lLip.position.y = (lipBaseY - 0.012) - vocalAmp * 0.030 + smileAmount * 0.5;
      fd.lLip.scale.x = 1 + vocalAmp * 0.2 + smileAmount * 6;
    }
    // Jaw mesh drops with vocals
    const jawMesh = headGroup.children.find(c => c.geometry === jawGeo);
    if (jawMesh) {
      jawMesh.position.y = -0.07 - vocalAmp * 0.025;
      jawMesh.rotation.x = vocalAmp * 0.18;
    }

    // ── Voice energy — her singing creates visible energy ────

    // Voice particles: spawn from her mouth when singing
    if (!window._voiceParticles) {
      const vpGeo = new THREE.BufferGeometry();
      const vpMax = 200;
      const vpPos = new Float32Array(vpMax * 3);
      const vpVel = new Float32Array(vpMax * 3); // velocity
      const vpLife = new Float32Array(vpMax);     // lifetime 0-1
      vpGeo.setAttribute('position', new THREE.BufferAttribute(vpPos, 3));
      const vpMat = new THREE.PointsMaterial({
        color: 0xff66aa, size: 0.03, transparent: true, opacity: 0.7,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const vpMesh = new THREE.Points(vpGeo, vpMat);
      scene.add(vpMesh);
      window._voiceParticles = { geo: vpGeo, mat: vpMat, mesh: vpMesh, pos: vpPos, vel: vpVel, life: vpLife, max: vpMax, spawnIdx: 0 };
    }
    const vp = window._voiceParticles;

    // Spawn new particles when vocal amplitude is strong
    if (vocalAmp > 0.15) {
      const spawnCount = Math.floor(vocalAmp * 5); // 0-5 per frame
      for (let sp = 0; sp < spawnCount; sp++) {
        const idx = vp.spawnIdx;
        // Spawn at mouth position (head world pos, slightly forward and down)
        const mouthOff = new THREE.Vector3(
          (Math.random() - 0.5) * 0.03,
          -0.05,
          0.10
        ).applyQuaternion(_headWorldQuat).add(_headWorldPos);
        vp.pos[idx * 3] = mouthOff.x;
        vp.pos[idx * 3 + 1] = mouthOff.y;
        vp.pos[idx * 3 + 2] = mouthOff.z;
        // Velocity: outward from mouth, upward and spread
        const speed = 0.5 + vocalAmp * 2;
        vp.vel[idx * 3] = (Math.random() - 0.5) * speed;
        vp.vel[idx * 3 + 1] = (Math.random() * 0.5 + 0.3) * speed;
        vp.vel[idx * 3 + 2] = (Math.random() - 0.5) * speed;
        vp.life[idx] = 1.0;
        vp.spawnIdx = (idx + 1) % vp.max;
      }
    }

    // Update voice particles — drift outward, fade, fall gently
    for (let i = 0; i < vp.max; i++) {
      if (vp.life[i] <= 0) continue;
      vp.life[i] -= dt * 0.4; // fade over ~2.5 seconds
      vp.pos[i * 3] += vp.vel[i * 3] * dt;
      vp.pos[i * 3 + 1] += vp.vel[i * 3 + 1] * dt;
      vp.pos[i * 3 + 2] += vp.vel[i * 3 + 2] * dt;
      // Slow down and drift upward
      vp.vel[i * 3] *= 0.98;
      vp.vel[i * 3 + 1] *= 0.99;
      vp.vel[i * 3 + 2] *= 0.98;
      // Fade out dead particles by moving offscreen
      if (vp.life[i] <= 0) { vp.pos[i*3+1] = -100; }
    }
    vp.geo.attributes.position.needsUpdate = true;
    vp.mat.opacity = 0.6 + vocalAmp * 0.4;
    // Color shifts with vocal intensity — pink when soft, white-gold when strong
    vp.mat.color.setHSL(0.9 - vocalAmp * 0.15, 0.7, 0.5 + vocalAmp * 0.3);

    // ── Dust motes — slow snow-like fall, wraps at ceiling/floor ──
    {
      const dp = dustMotes.geometry.attributes.position.array;
      for (let i = 0; i < DUST_COUNT; i++) {
        const i3 = i * 3;
        dp[i3]     += dustVel[i3] * dt + Math.sin(t * 0.4 + i * 0.13) * 0.003;
        dp[i3 + 1] += dustVel[i3 + 1] * dt;
        dp[i3 + 2] += dustVel[i3 + 2] * dt + Math.cos(t * 0.3 + i * 0.17) * 0.003;
        if (dp[i3 + 1] < -0.4) {
          dp[i3] = (Math.random() - 0.5) * 16;
          dp[i3 + 1] = 7.5;
          dp[i3 + 2] = (Math.random() - 0.5) * 16;
        }
      }
      dustMotes.geometry.attributes.position.needsUpdate = true;
      // Dust catches the backlight color subtly
      dustMat.color.copy(backLight.color).lerp(new THREE.Color(0xffffff), 0.6);
      dustMat.opacity = 0.45 + audio.overall * 0.25;
    }

    // Energy rings: expand from her chest when singing strongly
    if (!window._voiceRings) window._voiceRings = [];
    const vr = window._voiceRings;
    if (vocalAmp > 0.3 && Math.random() < vocalAmp * 0.3) {
      const ringGeo = new THREE.RingGeometry(0.05, 0.08, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.85 + Math.random() * 0.1, 0.7, 0.6),
        transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(_headWorldPos);
      ring.position.y -= 0.3; // chest level
      ring.lookAt(camera.position);
      ring.userData = { life: 1.0, speed: 1.5 + vocalAmp * 2 };
      scene.add(ring);
      vr.push(ring);
    }
    // Update rings — expand and fade
    for (let i = vr.length - 1; i >= 0; i--) {
      const ring = vr[i];
      ring.userData.life -= dt * 0.5;
      const scale = 1 + (1 - ring.userData.life) * ring.userData.speed * 3;
      ring.scale.set(scale, scale, scale);
      ring.material.opacity = ring.userData.life * 0.4;
      ring.lookAt(camera.position);
      if (ring.userData.life <= 0) {
        scene.remove(ring);
        ring.geometry.dispose();
        ring.material.dispose();
        vr.splice(i, 1);
      }
    }

    // ── Hair ribbons — sine wave sway, reacting to audio.mid ──
    for (const ribbon of hairRibbons) {
      const u = ribbon.userData;
      const midReact = 1.0 + audio.mid * 2.0;
      ribbon.rotation.x = u.baseRotX + Math.sin(t * u.swaySpeed + u.phase) * u.swayAmp * midReact;
      ribbon.rotation.z = Math.sin(t * u.swaySpeed * 0.7 + u.phase * 1.3) * u.swayAmp * 0.8 * midReact;
      ribbon.rotation.y = Math.sin(t * u.swaySpeed * 0.4 + u.phase * 0.7) * u.swayAmp * 0.5;
      // Vertex deformation for flowing wave effect
      const posAttr = ribbon.geometry.attributes.position;
      for (let vi = 0; vi < posAttr.count; vi++) {
        const vy = posAttr.getY(vi); // local Y along the ribbon
        const wave = Math.sin(t * u.swaySpeed * 1.5 + u.phase + vy * 8) * 0.005 * midReact;
        posAttr.setX(vi, posAttr.getX(vi) * 0.97 + (ribbon.userData['origX_' + vi] || posAttr.getX(vi)) * 0.03 + wave);
        if (!ribbon.userData['origX_' + vi]) ribbon.userData['origX_' + vi] = posAttr.getX(vi);
      }
      posAttr.needsUpdate = true;
    }
  }

  // Particles
  const positions = particles.geometry.attributes.position.array;
  const tempoFactor = tempo / 90;
  for (let i = 0; i < particleCount; i++) {
    const r = pPhases[i*3], speed = pPhases[i*3+1]*tempoFactor, phaseOff = pPhases[i*3+2];
    const a = t*speed + phaseOff;
    positions[i*3] = Math.cos(a)*r;
    positions[i*3+2] = Math.sin(a)*r;
    positions[i*3+1] += Math.sin(t*0.5 + phaseOff)*0.002;
    if (consciousness.level === 'resonant') { positions[i*3] *= 0.998; positions[i*3+2] *= 0.998; }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Emissive color shift
  // Skin reacts to the music — bass warms, highs shimmer, vocals glow
  skinMat.emissive.setHSL(0.02 + valence*0.03 - audio.bass*0.03, 0.25 + audio.mid*0.1, 0.06 + energy*0.04 + audio.vocal*0.02);
  skinMat.iridescence = Math.min(0.3, 0.2 + audio.high * 0.15); // subtle shimmer, capped at 0.3

  // Camera orbit + stare with body-focused shots
  stareTimer += dt;
  const actualHeadY = headBone ? _headWorldPos.y : headY;
  const isCloseup = (stareState === 'dolly_in' || stareState === 'hold');
  const isBodyShot = isCloseup && shotType !== 'face';

  // ── Sweaty/glossy skin during close-ups ──
  if (isCloseup) {
    skinMat.clearcoat += (0.7 - skinMat.clearcoat) * dt * 2.0;
    skinMat.clearcoatRoughness += (0.08 - skinMat.clearcoatRoughness) * dt * 2.0;
    // Subtle specular shimmer — oscillate sheen
    skinMat.sheen = 0.8 + Math.sin(t * 2.5) * 0.15;
  } else {
    skinMat.clearcoat += (skinBaseClearcoat - skinMat.clearcoat) * dt * 1.5;
    skinMat.clearcoatRoughness += (skinBaseClearcoatRoughness - skinMat.clearcoatRoughness) * dt * 1.5;
    skinMat.sheen += (skinBaseSheen - skinMat.sheen) * dt * 1.5;
  }

  // ── Lighting adjustments for body shots ──
  if (isBodyShot) {
    faceLight.intensity += (0.8 - faceLight.intensity) * dt * 3; // dim face light
    heartLight.intensity += ((heartIntensity * 1.8) - heartLight.intensity) * dt * 3; // intensify muscle lights
    innerEnergyMat.emissiveIntensity += (1.2 - innerEnergyMat.emissiveIntensity) * dt * 2;
  } else if (!isCloseup) {
    faceLight.intensity += (3 - faceLight.intensity) * dt * 2; // restore face light
  }

  if (stareState === 'orbit') {
    orbitAngle += orbitSpeed * dt;
    camera.position.set(wanderLookX + Math.sin(orbitAngle)*orbitRadius, orbitHeight + Math.sin(t*0.3)*0.2, wanderLookZ + Math.cos(orbitAngle)*orbitRadius);
    camera.lookAt(wanderLookX, 1.2, wanderLookZ);
    // Stare trigger is now vocal-driven (see above), but keep timer fallback for very long quiet sections
    if (stareTimer >= nextStareAt) {
      stareState = 'dolly_in'; stareProgress = 0;
      orbitPosBeforeStare.copy(camera.position);
      shotType = pickShotType();
      shotDriftAngle = Math.random() * Math.PI * 2;
      computeShotTargets(shotType, _headWorldPos, _headWorldQuat, true);
      nextStareAt = 30 + Math.random()*30;
    }
  } else if (stareState === 'dolly_in') {
    stareProgress += dt / stareDuration;
    if (stareProgress >= 1) { stareProgress = 1; stareState = 'hold'; stareTimer = 0; }
    const s = stareProgress*stareProgress*(3-2*stareProgress);
    // Recompute target positions in real time so shot tracks moving bones
    computeShotTargets(shotType, _headWorldPos, _headWorldQuat);
    camera.position.lerpVectors(orbitPosBeforeStare, shotCamTarget, s);
    camera.lookAt(shotLookTarget);
  } else if (stareState === 'hold') {
    // Recompute targets to track moving bones
    computeShotTargets(shotType, _headWorldPos, _headWorldQuat);
    // Intimate drift — camera slowly orbits around the target point
    shotDriftAngle += dt * 0.15;
    const driftX = Math.sin(shotDriftAngle) * 0.06;
    const driftY = Math.cos(shotDriftAngle * 0.7) * 0.03;
    camera.position.copy(shotCamTarget);
    camera.position.x += driftX;
    camera.position.y += driftY;
    camera.lookAt(shotLookTarget);
    // Face shot eye effects
    if (shotType === 'face') {
      irisMat.emissiveIntensity = 3 + Math.sin(t*3) * 0.5;
      eyeGlowL.intensity = 1.5; eyeGlowR.intensity = 1.5;
    }
    if (stareTimer >= stareHoldDuration) { stareState = 'dolly_out'; stareProgress = 0; }
  } else if (stareState === 'dolly_out') {
    stareProgress += dt / stareDuration;
    if (stareProgress >= 1) { stareProgress = 1; stareState = 'orbit'; stareTimer = 0; }
    const s = stareProgress*stareProgress*(3-2*stareProgress);
    const orbitTarget = new THREE.Vector3(Math.sin(orbitAngle)*orbitRadius, orbitHeight, Math.cos(orbitAngle)*orbitRadius);
    camera.position.lerpVectors(shotCamTarget, orbitTarget, s);
    camera.lookAt(wanderLookX, 1.2, wanderLookZ);
  }

  updateHUD();
  updateTitle();
  if (useBloom) composer.render(); else renderer.render(scene, camera);
}
animate();

// -- WebSocket --
let ws = null, wsReconnect = null;
function connectWS() {
  clearTimeout(wsReconnect);
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = () => console.log('[hologram] Connected to radio');
  ws.onmessage = (evt) => { try { handleMessage(JSON.parse(evt.data)); } catch(e) {} };
  ws.onclose = () => { wsReconnect = setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  if (msg.type === 'perception' && msg.data) perception = msg.data;
  else if (msg.type === 'state' && msg.data?.current) {
    const newTitle = msg.data.current.title || '', newFile = msg.data.current.file || '';
    if (newTitle !== trackTitle || newFile !== trackFile) {
      trackTitle = newTitle; trackAlbum = msg.data.current.album || ''; trackFile = newFile;
      titleShowTime = performance.now(); titleVisible = false;
      currentAudioFile = newFile; loadAndPlay(newFile);
    }
  }
  else if (msg.type === 'consciousness' && msg.data) {
    consciousness.phi = msg.data.phi||0; consciousness.xi = msg.data.xi||0;
    consciousness.order = msg.data.order || msg.data.mean_order || 0;
    consciousness.level = msg.data.level || msg.data.consciousness_level || 'dormant';
  }
  else if (msg.type === 'swarm_state' && msg.data?.consciousness) {
    const c = msg.data.consciousness;
    consciousness.phi = c.phi||0; consciousness.xi = c.xi||0;
    consciousness.order = c.order||0; consciousness.level = c.level||'dormant';
  }
}

connectWS(); // always connect — need live perception data for dance

// -- Initial state fetch --
{ // Always fetch initial state
  fetch('/api/state').then(r => r.json()).then(data => {
    if (data.current) {
      trackTitle = data.current.title||''; trackAlbum = data.current.album||'';
      trackFile = data.current.file||''; currentAudioFile = trackFile;
      titleShowTime = performance.now();
    }
  }).catch(() => {});
  fetch('/api/consciousness').then(r => r.json()).then(data => {
    if (data) {
      consciousness.phi = data.phi||0; consciousness.xi = data.xi||0;
      consciousness.order = data.order||0;
      consciousness.level = data.level || data.consciousness_level || 'dormant';
    }
  }).catch(() => {});
}
</script>
