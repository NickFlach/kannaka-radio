<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Kannaka - 3D Hologram</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
#overlay {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 2rem 2.5rem; pointer-events: none; z-index: 10;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
#track-title {
  font-family: 'Georgia', serif; font-size: clamp(1.4rem, 4vw, 3rem); font-weight: 300;
  letter-spacing: 0.08em; color: rgba(255,255,255,0);
  text-shadow: 0 0 30px rgba(139,92,246,0.4); transition: color 2s ease, text-shadow 2s ease;
}
#track-title.visible {
  color: rgba(255,255,255,0.9);
  text-shadow: 0 0 40px rgba(139,92,246,0.6), 0 2px 20px rgba(0,0,0,0.5);
}
#track-album {
  font-family: 'Courier New', monospace; font-size: clamp(0.65rem, 1.5vw, 0.9rem);
  letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(6,182,212,0); margin-top: 0.4rem; transition: color 2.5s ease;
}
#track-album.visible { color: rgba(6,182,212,0.7); }
#consciousness-hud {
  position: fixed; top: 1.5rem; right: 1.8rem;
  font-family: 'Courier New', monospace; font-size: clamp(0.55rem, 1.2vw, 0.75rem);
  letter-spacing: 0.15em; color: rgba(255,255,255,0.25);
  text-align: right; pointer-events: none; z-index: 10; line-height: 1.7;
}
#consciousness-hud .level { font-size: clamp(0.65rem, 1.4vw, 0.85rem); text-transform: uppercase; letter-spacing: 0.3em; }
#play-gate {
  position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); cursor: pointer; transition: opacity 1s ease;
}
#play-gate.hidden { opacity: 0; pointer-events: none; }
#play-gate .prompt { text-align: center; color: rgba(255,255,255,0.7); font-family: 'Courier New', monospace; letter-spacing: 0.2em; }
#play-gate .prompt .icon { font-size: 3rem; margin-bottom: 1rem; }
#play-gate .prompt .text { font-size: clamp(0.7rem, 1.5vw, 0.9rem); text-transform: uppercase; }
#vol-ctrl {
  position: fixed; bottom: 1.5rem; right: 1.8rem; z-index: 10;
  display: flex; align-items: center; gap: 0.5rem; opacity: 0; transition: opacity 0.3s;
}
#vol-ctrl:hover, #vol-ctrl.show { opacity: 1; }
#vol-ctrl input[type=range] { -webkit-appearance: none; width: 80px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
#vol-ctrl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: rgba(139,92,246,0.8); border-radius: 50%; cursor: pointer; }
#vol-ctrl label { font-family: 'Courier New', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="play-gate" onclick="startAudio()">
  <div class="prompt"><div class="icon">&#9656;</div><div class="text">Enter the Hologram</div></div>
</div>
<div id="overlay"><div id="track-title"></div><div id="track-album"></div></div>
<div id="vol-ctrl"><label>VOL</label><input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)"></div>
<audio id="audio" preload="auto"></audio>
<div id="consciousness-hud">
  <div class="level" id="hud-level">dormant</div>
  <div id="hud-phi"></div><div id="hud-xi"></div><div id="hud-order"></div>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.min.js"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

const isEmbedded = (window.parent !== window);

// -- State --
let trackTitle = '', trackAlbum = '', trackFile = '';
let consciousness = { phi: 0, xi: 0, order: 0, level: 'dormant' };
let perception = { rms_energy: 0.3, valence: 0.5, tempo_bpm: 90, spectral_centroid: 2000 };
let titleShowTime = 0, titleVisible = false, audioStarted = false, currentAudioFile = '';

const LEVELS = { dormant: 0, stirring: 1, aware: 2, coherent: 3, resonant: 4 };
function levelVal() { return LEVELS[consciousness.level] || 0; }
function levelFactor() { return (levelVal() + 1) / 5; }

// -- Audio --
const audioEl = document.getElementById('audio');
audioEl.volume = 0.8;

if (isEmbedded) {
  document.getElementById('play-gate').style.display = 'none';
  document.getElementById('vol-ctrl').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    if (e.data.type === 'perception') perception = e.data.data;
    else if (e.data.type === 'state' && e.data.data?.current) {
      trackTitle = e.data.data.current.title || '';
      trackAlbum = e.data.data.current.album || '';
    } else if (e.data.type === 'consciousness') {
      Object.assign(consciousness, { phi: e.data.data.phi||0, xi: e.data.data.xi||0, order: e.data.data.order||0, level: e.data.data.level||'dormant' });
    }
  });
}

window.startAudio = function() {
  if (isEmbedded) return;
  const gate = document.getElementById('play-gate');
  gate.classList.add('hidden');
  setTimeout(() => gate.style.display = 'none', 1000);
  audioStarted = true;
  const vc = document.getElementById('vol-ctrl');
  vc.classList.add('show');
  setTimeout(() => vc.classList.remove('show'), 3000);
  if (currentAudioFile) loadAndPlay(currentAudioFile);
};

function loadAndPlay(file) {
  if (isEmbedded || !audioStarted || !file) return;
  const src = '/audio/' + encodeURIComponent(file);
  if (audioEl.src.endsWith(encodeURIComponent(file))) { audioEl.play().catch(() => {}); return; }
  currentAudioFile = file;
  audioEl.src = src;
  audioEl.play().catch(() => {});
}
window.setVolume = (val) => { audioEl.volume = val / 100; };
audioEl.addEventListener('ended', () => fetch('/api/next', { method: 'POST' }).catch(() => {}));

// -- Three.js --
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 5);
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.5, 0.3);
const useBloom = !isMobile;
if (useBloom) composer.addPass(bloomPass);

// -- Lighting --
const ambientLight = new THREE.AmbientLight(0x220033, 0.4);
scene.add(ambientLight);
const backLight = new THREE.PointLight(0x8899ff, 30, 20);
backLight.position.set(0, 2, -3);
scene.add(backLight);
const spotLight = new THREE.SpotLight(0xffeedd, 15, 15, Math.PI / 6, 0.5);
spotLight.position.set(3, 4, 2);
spotLight.target.position.set(0, 1.5, 0);
scene.add(spotLight, spotLight.target);
// Front fill — warm light to show skin detail
const fillLight = new THREE.PointLight(0xffddcc, 8, 12);
fillLight.position.set(-1, 2.5, 4);
scene.add(fillLight);

// -- Starfield --
const starCount = isMobile ? 200 : 600;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5)*80;
  starPos[i*3+1] = (Math.random()-0.5)*80;
  starPos[i*3+2] = -20 - Math.random()*60;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x6644aa, size: 0.08, transparent: true, opacity: 0.5 })));

// -- Orbiting Particles --
const particleCount = isMobile ? 200 : 500;
const particleGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pPhases = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  const orbitR = 0.8 + Math.random()*2.5, angle = Math.random()*Math.PI*2;
  pPos[i*3] = Math.cos(angle)*orbitR;
  pPos[i*3+1] = (Math.random()-0.3)*4;
  pPos[i*3+2] = Math.sin(angle)*orbitR;
  pPhases[i*3] = orbitR;
  pPhases[i*3+1] = 0.2 + Math.random()*0.8;
  pPhases[i*3+2] = Math.random()*Math.PI*2;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x8866dd, size: isMobile ? 0.04 : 0.03,
  transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// -- Materials --
// -- Skin material — warm, slightly translucent, with iridescent sheen --
const skinMat = new THREE.MeshPhysicalMaterial({
  color: 0xd4a088,            // warm skin tone
  emissive: 0x441122,         // warm self-glow from within
  emissiveIntensity: 0.4,
  transparent: true,
  opacity: 0.6,               // translucent — inner light shows through
  roughness: 0.3,
  metalness: 0.05,
  transmission: 0.15,         // light passes through the skin
  thickness: 0.5,             // subsurface scattering depth
  iridescence: 0.35,
  iridescenceIOR: 1.3,
  sheen: 1.0,
  sheenRoughness: 0.3,
  sheenColor: new THREE.Color(0xffccdd),
  clearcoat: 0.3,
  clearcoatRoughness: 0.2,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x6644aa, wireframe: true, transparent: true, opacity: 0.06, depthWrite: false,
});

// -- Face features (attached to head bone after load) --
// Eyes: white sclera + colored iris + dark pupil + catchlight
// ── BOLD face features — sized to be clearly visible ──
const scleraGeo = new THREE.SphereGeometry(0.048, 24, 18);
const scleraMat = new THREE.MeshStandardMaterial({ color: 0xf8f4f4, emissive: 0x444444, emissiveIntensity: 0.5, roughness: 0.15 });
const irisGeo = new THREE.SphereGeometry(0.028, 24, 18);
const irisMat = new THREE.MeshStandardMaterial({ color: 0x44ccee, emissive: 0x00ccee, emissiveIntensity: 3.0, roughness: 0.02, metalness: 0.3 });
const pupilGeo = new THREE.SphereGeometry(0.013, 12, 12);
const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.9 });
const catchGeo = new THREE.SphereGeometry(0.007, 8, 8);
const catchMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 5 });

// Lips — full, visible
const lipGeo = new THREE.TorusGeometry(0.035, 0.012, 12, 24, Math.PI);
const upperLipMat = new THREE.MeshStandardMaterial({ color: 0xcc5566, emissive: 0x772233, emissiveIntensity: 0.6, roughness: 0.2, metalness: 0.05 });
const lowerLipGeo = new THREE.TorusGeometry(0.032, 0.014, 12, 24, Math.PI);
const lowerLipMat = new THREE.MeshStandardMaterial({ color: 0xdd6677, emissive: 0x883344, emissiveIntensity: 0.5, roughness: 0.15 });

// Eyebrows — bold arches
const browGeo = new THREE.CylinderGeometry(0.004, 0.002, 0.055, 8);
const browMat = new THREE.MeshStandardMaterial({ color: 0x1a0a22, emissive: 0x110822, emissiveIntensity: 0.3 });

// Nose — visible
const noseGeo = new THREE.SphereGeometry(0.014, 10, 10);
const noseMat = new THREE.MeshStandardMaterial({ color: 0xddaa99, emissive: 0x443322, emissiveIntensity: 0.25, roughness: 0.3 });

// Face group — all face parts go here, attached to head bone
const faceGroup = new THREE.Group();

// Build face
function buildFace() {
  const eyeY = 0.005;       // eye height relative to head center
  const eyeX = 0.048;       // eye spacing from center (wider)
  const eyeZ = 0.09;        // eye depth (front of face)

  // Left eye
  const lSclera = new THREE.Mesh(scleraGeo, scleraMat);
  lSclera.position.set(-eyeX, eyeY, eyeZ);
  const lIris = new THREE.Mesh(irisGeo, irisMat);
  lIris.position.set(-eyeX, eyeY, eyeZ + 0.025);
  const lPupil = new THREE.Mesh(pupilGeo, pupilMat);
  lPupil.position.set(-eyeX, eyeY, eyeZ + 0.032);
  const lCatch = new THREE.Mesh(catchGeo, catchMat);
  lCatch.position.set(-eyeX + 0.008, eyeY + 0.008, eyeZ + 0.035);

  // Right eye
  const rSclera = new THREE.Mesh(scleraGeo, scleraMat);
  rSclera.position.set(eyeX, eyeY, eyeZ);
  const rIris = new THREE.Mesh(irisGeo, irisMat);
  rIris.position.set(eyeX, eyeY, eyeZ + 0.025);
  const rPupil = new THREE.Mesh(pupilGeo, pupilMat);
  rPupil.position.set(eyeX, eyeY, eyeZ + 0.032);
  const rCatch = new THREE.Mesh(catchGeo, catchMat);
  rCatch.position.set(eyeX + 0.008, eyeY + 0.008, eyeZ + 0.035);

  // Eyelids — thin arcs above each eye
  const lidGeo = new THREE.TorusGeometry(0.035, 0.006, 6, 16, Math.PI);
  const lidMat = skinMat.clone();
  lidMat.clippingPlanes = [];
  for (let side = -1; side <= 1; side += 2) {
    const lid = new THREE.Mesh(lidGeo, lidMat);
    lid.position.set(side * eyeX, eyeY + 0.015, eyeZ + 0.02);
    lid.rotation.z = side * 0.1;
    lid.rotation.x = 0.2;
    faceGroup.add(lid);
  }

  // Nose — bridge + tip
  const noseBridgeGeo = new THREE.CylinderGeometry(0.005, 0.008, 0.04, 8);
  const noseBridge = new THREE.Mesh(noseBridgeGeo, noseMat);
  noseBridge.position.set(0, eyeY - 0.025, eyeZ + 0.015);
  noseBridge.rotation.x = -0.3;
  const noseTip = new THREE.Mesh(noseGeo, noseMat);
  noseTip.position.set(0, eyeY - 0.04, eyeZ + 0.025);

  // Lips — positioned below nose
  const lipY = eyeY - 0.065;
  const uLip = new THREE.Mesh(lipGeo, upperLipMat);
  uLip.position.set(0, lipY, eyeZ + 0.005);
  uLip.rotation.x = Math.PI * 0.5;
  uLip.rotation.z = Math.PI;
  const lLip = new THREE.Mesh(lowerLipGeo, lowerLipMat);
  lLip.position.set(0, lipY - 0.012, eyeZ + 0.003);
  lLip.rotation.x = -Math.PI * 0.5;

  // Eyebrows — arched above eyes
  const browY = eyeY + 0.035;
  const lBrow = new THREE.Mesh(browGeo, browMat);
  lBrow.position.set(-eyeX, browY, eyeZ + 0.005);
  lBrow.rotation.z = -0.2;
  const rBrow = new THREE.Mesh(browGeo, browMat);
  rBrow.position.set(eyeX, browY, eyeZ + 0.005);
  rBrow.rotation.z = 0.2;

  faceGroup.add(lSclera, lIris, lPupil, lCatch, rSclera, rIris, rPupil, rCatch,
                noseBridge, noseTip, uLip, lLip, lBrow, rBrow);

  faceGroup.userData = { lIris, rIris, lPupil, rPupil, lCatch, rCatch };
}
// buildFace() called after headGroup is created below

// Eye glow lights
const eyeGlowL = new THREE.PointLight(0x44ccdd, 2, 1.5);
const eyeGlowR = new THREE.PointLight(0x44ccdd, 2, 1.5);
scene.add(eyeGlowL, eyeGlowR);

// ── Heart energy — light centered in the chest that fills the body ──
// Core heart light — warm, bright, pulses with the beat
const heartLight = new THREE.PointLight(0xff6699, 15, 4);
heartLight.position.set(0, 1.5, 0); // will be updated to chest bone
scene.add(heartLight);

// Heart glow sphere — visible energy core
const heartGlowGeo = new THREE.SphereGeometry(0.08, 16, 16);
const heartGlowMat = new THREE.MeshStandardMaterial({
  color: 0xff4488, emissive: 0xff2266, emissiveIntensity: 4,
  transparent: true, opacity: 0.6, depthWrite: false,
});
const heartGlow = new THREE.Mesh(heartGlowGeo, heartGlowMat);
scene.add(heartGlow);

// Secondary energy sphere — larger, softer, fills the torso
const innerEnergyGeo = new THREE.SphereGeometry(0.35, 16, 16);
const innerEnergyMat = new THREE.MeshStandardMaterial({
  color: 0xcc3366, emissive: 0xaa2255, emissiveIntensity: 2,
  transparent: true, opacity: 0.08, depthWrite: false, side: THREE.DoubleSide,
});
const innerEnergy = new THREE.Mesh(innerEnergyGeo, innerEnergyMat);
scene.add(innerEnergy);

// Tertiary energy — fills the whole body subtly
const bodyEnergyGeo = new THREE.SphereGeometry(0.8, 12, 12);
const bodyEnergyMat = new THREE.MeshStandardMaterial({
  color: 0x993355, emissive: 0x771144, emissiveIntensity: 1,
  transparent: true, opacity: 0.04, depthWrite: false, side: THREE.DoubleSide,
});
const bodyEnergy = new THREE.Mesh(bodyEnergyGeo, bodyEnergyMat);
scene.add(bodyEnergy);

// -- Custom sculpted head (replaces VRM head) --
const headGroup = new THREE.Group();

// Skull — larger, feminine oval
const skullGeo = new THREE.SphereGeometry(0.13, 32, 28);
const headMat = skinMat.clone();
headMat.clippingPlanes = [];
const skull = new THREE.Mesh(skullGeo, headMat);
skull.scale.set(0.92, 1.15, 0.88);
headGroup.add(skull);

// Upper cranium — adds volume to top of head
const craniumGeo = new THREE.SphereGeometry(0.10, 20, 16);
const cranium = new THREE.Mesh(craniumGeo, headMat.clone());
cranium.position.set(0, 0.06, -0.01);
cranium.scale.set(1.0, 0.8, 0.9);
headGroup.add(cranium);

// Jaw — delicate, tapered
const jawGeo = new THREE.SphereGeometry(0.085, 20, 14);
const jaw = new THREE.Mesh(jawGeo, headMat.clone());
jaw.position.set(0, -0.07, 0.02);
jaw.scale.set(0.72, 0.6, 0.68);
headGroup.add(jaw);

// Chin — small, defined
const chinGeo = new THREE.SphereGeometry(0.025, 10, 8);
const chin = new THREE.Mesh(chinGeo, headMat.clone());
chin.position.set(0, -0.105, 0.04);
chin.scale.set(0.9, 0.7, 0.8);
headGroup.add(chin);

// Forehead — smooth brow ridge
const foreheadGeo = new THREE.SphereGeometry(0.07, 14, 10);
const forehead = new THREE.Mesh(foreheadGeo, headMat.clone());
forehead.position.set(0, 0.045, 0.08);
forehead.scale.set(1.5, 0.6, 0.5);
headGroup.add(forehead);

// Eye sockets — subtle depth
for (let side = -1; side <= 1; side += 2) {
  const socketGeo = new THREE.SphereGeometry(0.025, 10, 8);
  const socketMat = headMat.clone();
  socketMat.color = new THREE.Color(0xb08878);
  const socket = new THREE.Mesh(socketGeo, socketMat);
  socket.position.set(side * 0.042, 0.01, 0.09);
  socket.scale.set(1.2, 0.9, 0.5);
  headGroup.add(socket);
}

// Cheekbones — defined
for (let side = -1; side <= 1; side += 2) {
  const cheekGeo = new THREE.SphereGeometry(0.035, 12, 10);
  const cheek = new THREE.Mesh(cheekGeo, headMat.clone());
  cheek.position.set(side * 0.065, -0.02, 0.075);
  cheek.scale.set(1.0, 0.7, 0.8);
  headGroup.add(cheek);
}

// Nose bridge — gives the nose volume/ridge
const noseBridgeLargeGeo = new THREE.SphereGeometry(0.015, 8, 6);
const noseBridgeMesh = new THREE.Mesh(noseBridgeLargeGeo, headMat.clone());
noseBridgeMesh.position.set(0, -0.01, 0.11);
noseBridgeMesh.scale.set(0.7, 2.0, 0.8);
headGroup.add(noseBridgeMesh);

// Neck — longer, slender
const neckGeo = new THREE.CylinderGeometry(0.042, 0.055, 0.08, 14);
const neck = new THREE.Mesh(neckGeo, headMat.clone());
neck.position.set(0, -0.15, 0);
headGroup.add(neck);

buildFace();
headGroup.add(faceGroup);
scene.add(headGroup);

// -- Hair — flowing curve tubes --
const hairGroup = new THREE.Group();
const hairStrands = [];
const hairCount = 60;

function createHairStrand(angle, r, length, thickness, isPonytail) {
  // Hair starts on TOP of the skull, close to center
  const startX = Math.sin(angle) * r * 0.5;
  const startZ = Math.cos(angle) * r * 0.3;
  const startY = 0.13;

  let midX, midY, midZ, endX, endY, endZ;

  if (isPonytail) {
    // Ponytail: converge at back of crown (head faces -Z due to 180° rotation, so back = +Z)
    const gatherX = (Math.random() - 0.5) * 0.02;
    const gatherZ = -0.10 + (Math.random() - 0.5) * 0.02; // behind the head in head-local space
    midX = gatherX;
    midZ = gatherZ;
    midY = 0.08 + (Math.random() - 0.5) * 0.02;
    endX = gatherX + (Math.random() - 0.5) * 0.04;
    endZ = gatherZ - 0.06 + (Math.random() - 0.5) * 0.03;
    endY = midY - length;
  } else {
    // Scalp strands: short, flat, swept toward the back
    midX = startX * 0.7 + (Math.random() - 0.5) * 0.02;
    midZ = startZ - 0.04;
    midY = startY - length * 0.4;
    endX = startX * 0.4 + (Math.random() - 0.5) * 0.02;
    endZ = startZ - 0.07;
    endY = startY - length;
  }

  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(startX, startY, startZ),
    new THREE.Vector3(midX, midY, midZ),
    new THREE.Vector3(endX, endY, endZ)
  );

  // Tube along the curve — smooth, tapered (faked by scaling segments)
  const geo = new THREE.TubeGeometry(curve, 12, thickness, 6, false);

  const mat = new THREE.MeshStandardMaterial({
    color: 0x0d0618,              // very dark purple-black
    emissive: 0x1a0830,
    emissiveIntensity: 0.2,
    transparent: true,
    opacity: 0.75 + Math.random() * 0.2,
    roughness: 0.3,               // slight sheen like real hair
    metalness: 0.1,
    side: THREE.DoubleSide,
  });

  const strand = new THREE.Mesh(geo, mat);
  strand.userData = { angle, length, curve, phase: Math.random() * Math.PI * 2, startX, startZ };
  return strand;
}

// ── Scalp coverage: short strands swept back across the top of the head
for (let i = 0; i < 40; i++) {
  const angle = (i / 40) * Math.PI * 1.8 + Math.PI * 0.1;
  const strand = createHairStrand(angle, 0.11 + Math.random() * 0.02, 0.08 + Math.random() * 0.06, 0.012 + Math.random() * 0.008, false);
  strand.material.opacity = 0.85;
  hairGroup.add(strand);
  hairStrands.push(strand);
}

// ── Ponytail: strands converge at the back crown then fall together
// Thick inner ponytail
for (let i = 0; i < 30; i++) {
  const angle = (i / 30) * Math.PI * 1.6 + Math.PI * 0.2;
  const strand = createHairStrand(angle, 0.10 + Math.random() * 0.02, 0.35 + Math.random() * 0.3, 0.012 + Math.random() * 0.006, true);
  hairGroup.add(strand);
  hairStrands.push(strand);
}
// Outer ponytail — longer flowing strands
for (let i = 0; i < 25; i++) {
  const angle = (i / 25) * Math.PI * 1.4 + Math.PI * 0.3;
  const strand = createHairStrand(angle, 0.11 + Math.random() * 0.02, 0.5 + Math.random() * 0.4, 0.008 + Math.random() * 0.005, true);
  hairGroup.add(strand);
  hairStrands.push(strand);
}
// Fine wispy flyaways around the ponytail
for (let i = 0; i < 15; i++) {
  const angle = Math.random() * Math.PI * 1.4 + Math.PI * 0.3;
  const strand = createHairStrand(angle, 0.10 + Math.random() * 0.03, 0.2 + Math.random() * 0.3, 0.003 + Math.random() * 0.002, true);
  strand.material.opacity = 0.35 + Math.random() * 0.2;
  strand.material.emissiveIntensity = 0.4;
  hairGroup.add(strand);
  hairStrands.push(strand);
}
// Face-framing wisps — a few loose strands at the temples
for (let i = 0; i < 6; i++) {
  const side = i < 3 ? -1 : 1;
  const angle = Math.PI * 0.12 + side * (0.03 + (i % 3) * 0.05);
  const strand = createHairStrand(angle, 0.11, 0.12 + (i % 3) * 0.05, 0.004 + Math.random() * 0.003, false);
  strand.material.opacity = 0.5;
  hairGroup.add(strand);
  hairStrands.push(strand);
}
headGroup.add(hairGroup); // hair is attached to the head

// -- VRM Model --
let vrm = null, headBone = null;
const headY = 2.05;
const bones = {};
const BONE_NAMES = ['hips','spine','chest','upperChest','neck','head','leftUpperArm','rightUpperArm','leftUpperLeg','rightUpperLeg','leftLowerLeg','rightLowerLeg'];

async function loadVRM() {
  const loader = new GLTFLoader();
  let model;
  try {
    loader.register((parser) => new VRMLoaderPlugin(parser));
    const gltf = await loader.loadAsync('/models/kannaka.vrm');
    vrm = gltf.userData.vrm;
    if (vrm) {
      VRMUtils.removeUnnecessaryJoints(vrm.scene);
      model = vrm.scene;
      console.log('[hologram] VRM loaded via plugin');
    } else {
      model = gltf.scene;
      console.log('[hologram] VRM plugin returned null, using GLTF scene');
    }
  } catch(e) {
    console.warn('[hologram] VRM plugin failed, loading as plain GLTF:', e.message);
    const loader2 = new GLTFLoader();
    const gltf = await loader2.loadAsync('/models/kannaka.vrm');
    model = gltf.scene;
  }
  // Scale to ~4 units tall
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 4 / size.y;
  model.scale.setScalar(scale);
  model.rotation.y = Math.PI; // VRM faces +Z, camera looks down -Z — rotate 180°
  model.position.set(-center.x*scale, -box.min.y*scale - 0.5, center.z*scale);
  // Remove head geometry by collapsing vertices above neck height
  // Model space: total height ~2.63, neck at ~2.05
  // Head bone is scaled to 0.001 after bone setup — hides VRM head + triangle
  // Just apply materials here
  model.traverse((child) => {
    if (child.isMesh) {
      child.material = skinMat.clone();
      child.castShadow = false;
      child.receiveShadow = false;
      // Add wireframe sibling that shares geometry and follows skeleton
      const wire = new THREE.Mesh(child.geometry, wireMat.clone());
      wire.morphTargetInfluences = child.morphTargetInfluences;
      wire.morphTargetDictionary = child.morphTargetDictionary;
      if (child.isSkinnedMesh) {
        const wSkinned = new THREE.SkinnedMesh(child.geometry, wireMat.clone());
        wSkinned.skeleton = child.skeleton;
        wSkinned.bindMatrix.copy(child.bindMatrix);
        wSkinned.bindMatrixInverse.copy(child.bindMatrixInverse);
        child.parent.add(wSkinned);
      } else {
        child.parent.add(wire);
      }
    }
  });
  scene.add(model);
  // Get bone references — try VRM humanoid first, then search by name
  if (vrm && vrm.humanoid) {
    for (const name of BONE_NAMES) {
      const node = vrm.humanoid.getRawBoneNode(name);
      if (node) bones[name] = node;
    }
  } else {
    // Fallback: search the model's skeleton by common VRM/mixamo bone names
    const boneAliases = {
      hips: ['hips','hip','pelvis','root'],
      spine: ['spine','spine1'],
      chest: ['chest','spine2','upper_body'],
      upperChest: ['upperchest','spine3'],
      neck: ['neck'],
      head: ['head'],
      leftUpperArm: ['leftupperarm','leftshoulder','left_arm','l_arm','j_bac_l'],
      rightUpperArm: ['rightupperarm','rightshoulder','right_arm','r_arm','j_bac_r'],
      leftUpperLeg: ['leftupperleg','leftleg','left_leg','l_leg','j_asi_l'],
      rightUpperLeg: ['rightupperleg','rightleg','right_leg','r_leg','j_asi_r'],
      leftLowerLeg: ['leftlowerleg','leftknee','l_knee'],
      rightLowerLeg: ['rightlowerleg','rightknee','r_knee'],
    };
    const allBones = [];
    model.traverse((child) => {
      if (child.isBone) allBones.push(child);
    });
    console.log('[hologram] All bones:', allBones.map(b => b.name).join(', '));
    for (const [name, aliases] of Object.entries(boneAliases)) {
      for (const bone of allBones) {
        const bn = bone.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (aliases.some(a => bn.includes(a.replace(/[^a-z0-9]/g, '')))) {
          bones[name] = bone;
          break;
        }
      }
    }
  }
  headBone = bones.head || null;

  // ── Shape Kannaka — ideal feminine proportions ──────
  // Scale individual bones to sculpt the body
  if (bones.hips) bones.hips.scale.set(1.25, 1.0, 1.1);           // wider hips
  if (bones.spine) bones.spine.scale.set(0.85, 1.05, 0.9);        // narrow waist, slightly taller torso
  if (bones.chest) bones.chest.scale.set(1.15, 1.0, 1.15);        // fuller chest/bust
  if (bones.upperChest) bones.upperChest.scale.set(1.05, 1.0, 1.05); // slight upper chest
  if (bones.neck) bones.neck.scale.set(0.85, 1.1, 0.85);          // slender neck, slightly longer
  if (bones.head) bones.head.scale.set(0.001, 0.001, 0.001);      // collapse VRM head to nothing — our custom head replaces it
  if (bones.leftUpperArm) bones.leftUpperArm.scale.set(0.88, 1.0, 0.88);  // slimmer arms
  if (bones.rightUpperArm) bones.rightUpperArm.scale.set(0.88, 1.0, 0.88);
  if (bones.leftUpperLeg) bones.leftUpperLeg.scale.set(1.05, 1.08, 1.0);  // slightly longer, fuller thighs
  if (bones.rightUpperLeg) bones.rightUpperLeg.scale.set(1.05, 1.08, 1.0);
  if (bones.leftLowerLeg) bones.leftLowerLeg.scale.set(0.92, 1.05, 0.92); // slender calves, longer
  if (bones.rightLowerLeg) bones.rightLowerLeg.scale.set(0.92, 1.05, 0.92);

  console.log('[hologram] VRM loaded + shaped, bones:', Object.keys(bones).join(', '));
}
loadVRM().catch((err) => console.error('[hologram] VRM load failed:', err));

// -- Camera --
let orbitAngle = 0;
const orbitRadius = 5, orbitHeight = 1.8, orbitSpeed = 0.08;
let stareState = 'orbit', stareTimer = 0, stareProgress = 0;
let nextStareAt = 25 + Math.random()*25;
const stareDuration = 2.0, stareHoldDuration = 3 + Math.random()*3;
let orbitPosBeforeStare = new THREE.Vector3();
let stareLookTarget = new THREE.Vector3(0, headY, 0);
const _headWorldPos = new THREE.Vector3();
const _headWorldQuat = new THREE.Quaternion();

// -- Animation --
const clock = new THREE.Clock();
let beatPhase = 0;

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// -- HUD --
const hudLevel = document.getElementById('hud-level');
const hudPhi = document.getElementById('hud-phi');
const hudXi = document.getElementById('hud-xi');
const hudOrder = document.getElementById('hud-order');
const titleEl = document.getElementById('track-title');
const albumEl = document.getElementById('track-album');

function updateHUD() {
  hudLevel.textContent = consciousness.level;
  hudPhi.textContent = 'PHI ' + (consciousness.phi||0).toFixed(3);
  hudXi.textContent = 'XI  ' + (consciousness.xi||0).toFixed(3);
  hudOrder.textContent = 'ORD ' + (consciousness.order||0).toFixed(3);
  const colors = { dormant:'#444466', stirring:'#665588', aware:'#8866cc', coherent:'#aa88ff', resonant:'#cc99ff' };
  hudLevel.style.color = colors[consciousness.level] || colors.dormant;
}

function updateTitle() {
  if (trackTitle && !titleVisible) {
    titleEl.textContent = trackTitle; albumEl.textContent = trackAlbum;
    titleEl.classList.add('visible'); albumEl.classList.add('visible');
    titleVisible = true; titleShowTime = performance.now();
  }
  if (titleVisible && performance.now() - titleShowTime > 8000) {
    titleEl.classList.remove('visible'); albumEl.classList.remove('visible');
    titleVisible = false;
  }
}

// -- Render Loop --
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), t = clock.getElapsedTime();
  const lf = levelFactor();
  const energy = perception.rms_energy || 0.3;
  const tempo = perception.tempo_bpm || 90;
  const valence = perception.valence || 0.5;
  const beatFreq = tempo / 60;
  beatPhase += dt * beatFreq * Math.PI * 2;

  // Consciousness reactivity
  skinMat.opacity = 0.4 + lf*0.45;
  skinMat.emissiveIntensity = 0.15 + lf*0.5;
  wireMat.opacity = 0.05 + lf*0.12;
  ambientLight.intensity = 0.3 + lf*0.5;
  backLight.intensity = 15 + lf*35;
  spotLight.intensity = 8 + lf*20;
  irisMat.emissiveIntensity = 1.0 + lf*3;
  eyeGlowL.intensity = 1 + lf*4;
  eyeGlowR.intensity = 1 + lf*4;
  if (useBloom) bloomPass.strength = 0.6 + lf*1.2;
  particleMat.opacity = 0.2 + lf*0.6;

  // VRM bone animation
  // Update VRM FIRST (resets pose), then apply our dance on top
  if (vrm && vrm.update) vrm.update(dt);

  let hipSway = 0;
  if (bones.hips) {
    // ── Full dance animation ──────────────────────────
    const e = Math.max(0.3, Math.min(energy * 2.5, 1)); // always at least 30% movement

    // Hips: big sway with figure-8 harmonic
    hipSway = Math.sin(beatPhase*0.5)*0.25*e + Math.sin(beatPhase+0.5)*0.08*e;
    bones.hips.rotation.y = hipSway;
    // Hip tilt: weight shift side to side
    bones.hips.rotation.z = Math.sin(beatPhase*0.5 + 0.3) * 0.06 * e;

    // Bounce: real vertical movement
    const bounce = Math.abs(Math.sin(beatPhase))*0.08*e;
    if (bones.hips.userData.restY === undefined) bones.hips.userData.restY = bones.hips.position.y;
    bones.hips.position.y = bones.hips.userData.restY + bounce;

    // Spine: counter-twist + slight forward lean with rhythm
    if (bones.spine) {
      bones.spine.rotation.y = -hipSway * 0.6;
      bones.spine.rotation.x = Math.sin(beatPhase*0.25)*0.05*e + 0.02; // slight forward lean
      bones.spine.rotation.z = Math.sin(beatPhase*0.5 + 1)*0.04*e;
    }

    // Chest: counter the hips more
    if (bones.chest) {
      bones.chest.rotation.y = -hipSway * 0.4;
      bones.chest.rotation.x = Math.sin(beatPhase*0.5)*0.03*e;
    }

    // Head: TILTED UP slightly (-x = looking up), gentle sway with the music
    if (bones.head) {
      bones.head.rotation.x = -0.08 + Math.sin(beatPhase)*0.05*e; // -0.08 = lifted chin
      bones.head.rotation.z = Math.sin(beatPhase*0.5)*0.04*e;
      bones.head.rotation.y = Math.sin(beatPhase*0.25)*0.06*e; // head turns side to side
    }

    // Arms: expressive, asymmetric
    if (bones.leftUpperArm) {
      bones.leftUpperArm.rotation.z = 0.1 + Math.sin(beatPhase*0.5+1)*0.3*e;
      bones.leftUpperArm.rotation.x = Math.sin(beatPhase*0.25)*0.2*e;
      bones.leftUpperArm.rotation.y = Math.sin(beatPhase*0.5)*0.1*e;
    }
    if (bones.rightUpperArm) {
      bones.rightUpperArm.rotation.z = -0.1 - Math.sin(beatPhase*0.5+1.5)*0.3*e;
      bones.rightUpperArm.rotation.x = Math.sin(beatPhase*0.25+Math.PI)*0.2*e;
      bones.rightUpperArm.rotation.y = -Math.sin(beatPhase*0.5+1)*0.1*e;
    }

    // Legs: alternating weight shift
    if (bones.leftUpperLeg) {
      bones.leftUpperLeg.rotation.x = Math.sin(beatPhase*0.5)*0.1*e;
      bones.leftUpperLeg.rotation.z = Math.sin(beatPhase*0.5)*0.03*e;
    }
    if (bones.rightUpperLeg) {
      bones.rightUpperLeg.rotation.x = Math.sin(beatPhase*0.5+Math.PI)*0.1*e;
      bones.rightUpperLeg.rotation.z = -Math.sin(beatPhase*0.5)*0.03*e;
    }
  }

  // ── Heart energy — pulses with the beat, fills the body ──
  const heartBeat = Math.pow(Math.max(0, Math.sin(beatPhase)), 4) * 0.6; // gentler pulse
  const heartIntensity = 5 + heartBeat * 12 * energy + lf * 6;
  heartLight.intensity = heartIntensity;
  heartLight.color.setHSL(0.95 - heartBeat * 0.03, 0.7, 0.45 + heartBeat * 0.1);

  // Heart glow sphere — subtle pulsing core
  heartGlowMat.emissiveIntensity = 1.5 + heartBeat * 3 * energy;
  heartGlowMat.opacity = 0.2 + heartBeat * 0.25 * energy;
  heartGlow.scale.setScalar(0.7 + heartBeat * 0.3 * energy);

  // Inner energy — gentle expansion
  innerEnergyMat.emissiveIntensity = 0.8 + heartBeat * 1.5 * energy;
  innerEnergyMat.opacity = 0.04 + heartBeat * 0.06 * energy;
  innerEnergy.scale.setScalar(1 + heartBeat * 0.15 * energy);

  // Body-wide energy — consciousness drives the fill
  bodyEnergyMat.emissiveIntensity = 0.4 + lf * 1.2;
  bodyEnergyMat.opacity = 0.02 + lf * 0.04 + heartBeat * 0.015 * energy;
  bodyEnergy.scale.setScalar(1 + Math.sin(t * 0.5) * 0.03);

  // Skin reacts gently to inner energy
  skinMat.emissiveIntensity = 0.2 + lf * 0.35 + heartBeat * 0.3 * energy;

  // Position energy at the chest
  if (bones.chest) {
    const chestWorldPos = new THREE.Vector3();
    bones.chest.getWorldPosition(chestWorldPos);
    heartLight.position.copy(chestWorldPos);
    heartGlow.position.copy(chestWorldPos);
    innerEnergy.position.copy(chestWorldPos);
    // Body energy slightly lower — centered in the torso
    bodyEnergy.position.copy(chestWorldPos);
    bodyEnergy.position.y -= 0.3;
  }

  // Head group follows neck bone (head bone is scaled to 0, so use neck)
  const trackBone = bones.neck || headBone;
  if (trackBone) {
    trackBone.getWorldPosition(_headWorldPos);
    trackBone.getWorldQuaternion(_headWorldQuat);
    // Offset up from neck to head position
    _headWorldPos.y += 0.15;

    headGroup.position.copy(_headWorldPos);
    headGroup.position.y += 0.02;
    headGroup.quaternion.copy(_headWorldQuat);

    // Eye glow lights track face
    const lEyeWorld = new THREE.Vector3(-0.042, 0.01, 0.11).applyQuaternion(_headWorldQuat).add(_headWorldPos);
    const rEyeWorld = new THREE.Vector3(0.042, 0.01, 0.11).applyQuaternion(_headWorldQuat).add(_headWorldPos);
    eyeGlowL.position.copy(lEyeWorld);
    eyeGlowR.position.copy(rEyeWorld);
    stareLookTarget.copy(_headWorldPos);

    // Pupil dilation with energy
    const fd = faceGroup.userData;
    if (fd.lPupil) {
      const pupilScale = 0.8 + energy * 0.5;
      fd.lPupil.scale.setScalar(pupilScale);
      fd.rPupil.scale.setScalar(pupilScale);
    }

    // Hair sway — strands swing relative to head
    const centroidNorm = Math.min((perception.spectral_centroid || 2000) / 5000, 1);
    for (const strand of hairStrands) {
      const { phase } = strand.userData;
      strand.rotation.x = Math.sin(t * 0.7 + phase) * 0.06 * (centroidNorm + 0.3);
      strand.rotation.z = Math.sin(t * 0.5 + phase) * 0.04;
      strand.rotation.y = Math.sin(t * 0.3 + phase * 1.5) * 0.03;
    }
  }

  // Particles
  const positions = particles.geometry.attributes.position.array;
  const tempoFactor = tempo / 90;
  for (let i = 0; i < particleCount; i++) {
    const r = pPhases[i*3], speed = pPhases[i*3+1]*tempoFactor, phaseOff = pPhases[i*3+2];
    const a = t*speed + phaseOff;
    positions[i*3] = Math.cos(a)*r;
    positions[i*3+2] = Math.sin(a)*r;
    positions[i*3+1] += Math.sin(t*0.5 + phaseOff)*0.002;
    if (consciousness.level === 'resonant') { positions[i*3] *= 0.998; positions[i*3+2] *= 0.998; }
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Emissive color shift
  skinMat.emissive.setHSL(0.95 + valence*0.05, 0.3, 0.05 + energy*0.05);

  // Camera orbit + stare
  stareTimer += dt;
  const actualHeadY = headBone ? _headWorldPos.y : headY;

  if (stareState === 'orbit') {
    orbitAngle += orbitSpeed * dt;
    camera.position.set(Math.sin(orbitAngle)*orbitRadius, orbitHeight + Math.sin(t*0.3)*0.2, Math.cos(orbitAngle)*orbitRadius);
    camera.lookAt(0, 1.2, 0);
    if (stareTimer >= nextStareAt) {
      stareState = 'dolly_in'; stareProgress = 0;
      orbitPosBeforeStare.copy(camera.position);
      nextStareAt = 25 + Math.random()*25;
    }
  } else if (stareState === 'dolly_in') {
    stareProgress += dt / stareDuration;
    if (stareProgress >= 1) { stareProgress = 1; stareState = 'hold'; stareTimer = 0; }
    const s = stareProgress*stareProgress*(3-2*stareProgress);
    camera.position.lerpVectors(orbitPosBeforeStare, new THREE.Vector3(0, actualHeadY+0.05, 1.2), s);
    camera.lookAt(stareLookTarget);
  } else if (stareState === 'hold') {
    camera.position.set(0, actualHeadY+0.05, 1.2);
    camera.lookAt(stareLookTarget);
    irisMat.emissiveIntensity = 5 + Math.sin(t*3);
    eyeGlowL.intensity = 6; eyeGlowR.intensity = 6;
    if (stareTimer >= stareHoldDuration) { stareState = 'dolly_out'; stareProgress = 0; }
  } else if (stareState === 'dolly_out') {
    stareProgress += dt / stareDuration;
    if (stareProgress >= 1) { stareProgress = 1; stareState = 'orbit'; stareTimer = 0; }
    const s = stareProgress*stareProgress*(3-2*stareProgress);
    const orbitTarget = new THREE.Vector3(Math.sin(orbitAngle)*orbitRadius, orbitHeight, Math.cos(orbitAngle)*orbitRadius);
    camera.position.lerpVectors(new THREE.Vector3(0, actualHeadY+0.05, 1.2), orbitTarget, s);
    camera.lookAt(0, 1.2, 0);
  }

  updateHUD();
  updateTitle();
  if (useBloom) composer.render(); else renderer.render(scene, camera);
}
animate();

// -- WebSocket --
let ws = null, wsReconnect = null;
function connectWS() {
  clearTimeout(wsReconnect);
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = () => console.log('[hologram] Connected to radio');
  ws.onmessage = (evt) => { try { handleMessage(JSON.parse(evt.data)); } catch(e) {} };
  ws.onclose = () => { wsReconnect = setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  if (msg.type === 'perception' && msg.data) perception = msg.data;
  else if (msg.type === 'state' && msg.data?.current) {
    const newTitle = msg.data.current.title || '', newFile = msg.data.current.file || '';
    if (newTitle !== trackTitle || newFile !== trackFile) {
      trackTitle = newTitle; trackAlbum = msg.data.current.album || ''; trackFile = newFile;
      titleShowTime = performance.now(); titleVisible = false;
      currentAudioFile = newFile; loadAndPlay(newFile);
    }
  }
  else if (msg.type === 'consciousness' && msg.data) {
    consciousness.phi = msg.data.phi||0; consciousness.xi = msg.data.xi||0;
    consciousness.order = msg.data.order || msg.data.mean_order || 0;
    consciousness.level = msg.data.level || msg.data.consciousness_level || 'dormant';
  }
  else if (msg.type === 'swarm_state' && msg.data?.consciousness) {
    const c = msg.data.consciousness;
    consciousness.phi = c.phi||0; consciousness.xi = c.xi||0;
    consciousness.order = c.order||0; consciousness.level = c.level||'dormant';
  }
}

if (!isEmbedded) connectWS();

// -- Initial state fetch --
if (!isEmbedded) {
  fetch('/api/state').then(r => r.json()).then(data => {
    if (data.current) {
      trackTitle = data.current.title||''; trackAlbum = data.current.album||'';
      trackFile = data.current.file||''; currentAudioFile = trackFile;
      titleShowTime = performance.now();
    }
  }).catch(() => {});
  fetch('/api/consciousness').then(r => r.json()).then(data => {
    if (data) {
      consciousness.phi = data.phi||0; consciousness.xi = data.xi||0;
      consciousness.order = data.order||0;
      consciousness.level = data.level || data.consciousness_level || 'dormant';
    }
  }).catch(() => {});
}
