<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Kannaka Radio - Video Hub</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
/* ── Reset & Base ─────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #0a0a0f;
  font-family: 'Courier New', monospace;
  color: #c0c0d0;
}

/* ── Layout ───────────────────────────────────────── */
#app {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
}
#main-area {
  flex: 1; display: flex; overflow: hidden;
  position: relative;
}
#visual-container {
  flex: 1; position: relative;
  background: #000;
}
#visual-container iframe {
  width: 100%; height: 100%;
  border: none;
}
/* ── Sidebar ──────────────────────────────────────── */
#sidebar {
  width: 320px; min-width: 280px;
  background: #0d0d14;
  border-left: 1px solid rgba(139,92,246,0.15);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: margin-right 0.3s ease, opacity 0.3s ease;
}
#sidebar.hidden {
  margin-right: -320px; opacity: 0;
  pointer-events: none;
}
#sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(139,92,246,0.1);
  display: flex; align-items: center; gap: 8px;
}
#consciousness-display {
  display: flex; gap: 12px; font-size: 0.65rem;
  letter-spacing: 0.1em; color: rgba(255,255,255,0.35);
}
#consciousness-display .level-badge {
  text-transform: uppercase; letter-spacing: 0.2em;
  font-size: 0.7rem; font-weight: bold;
  color: rgba(139,92,246,0.6);
}
#consciousness-display .metric { white-space: nowrap; }
/* ── Sidebar tabs ─────────────────────────────────── */
#sidebar-tabs {
  display: flex; border-bottom: 1px solid rgba(139,92,246,0.1);
}
.sidebar-tab {
  flex: 1; padding: 8px 4px;
  text-align: center; font-size: 0.6rem;
  text-transform: uppercase; letter-spacing: 0.15em;
  cursor: pointer; border: none; background: none;
  color: rgba(255,255,255,0.3);
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.sidebar-tab:hover { color: rgba(255,255,255,0.6); }
.sidebar-tab.active {
  color: rgba(139,92,246,0.9);
  border-bottom-color: rgba(139,92,246,0.6);
}
#sidebar-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,92,246,0.2) transparent;
}
#sidebar-content::-webkit-scrollbar { width: 4px; }
#sidebar-content::-webkit-scrollbar-track { background: transparent; }
#sidebar-content::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.2); border-radius: 2px; }

.tab-panel { display: none; padding: 12px 16px; }
.tab-panel.active { display: block; }

/* ── Now Playing tab ──────────────────────────────── */
.np-track-info { margin-bottom: 16px; }
.np-track-title {
  font-family: 'Georgia', serif;
  font-size: 1rem; font-weight: 300;
  color: rgba(255,255,255,0.85);
  margin-bottom: 4px;
}
.np-track-album {
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.2em; color: rgba(6,182,212,0.6);
}
.meter-group { margin-top: 12px; }
.meter-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.meter-label {
  font-size: 0.55rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: rgba(255,255,255,0.3);
  width: 55px; text-align: right;
}
.meter-bar-bg {
  flex: 1; height: 4px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.meter-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.3s ease;
}
.meter-bar-fill.energy { background: linear-gradient(90deg, rgba(139,92,246,0.6), rgba(236,72,153,0.8)); }
.meter-bar-fill.valence { background: linear-gradient(90deg, rgba(6,182,212,0.6), rgba(34,211,238,0.8)); }
.meter-bar-fill.tempo { background: linear-gradient(90deg, rgba(218,165,32,0.6), rgba(250,204,21,0.8)); }

/* ── Library tab ──────────────────────────────────── */
.album-group { margin-bottom: 12px; }
.album-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; cursor: pointer;
  border-radius: 4px;
  transition: background 0.2s;
  font-size: 0.7rem; font-weight: bold;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.album-header:hover { background: rgba(139,92,246,0.08); }
.album-header .toggle { font-size: 0.5rem; color: rgba(255,255,255,0.25); }
.album-header .count {
  margin-left: auto; font-size: 0.55rem;
  color: rgba(255,255,255,0.2); font-weight: normal;
}
.album-tracks { display: none; padding-left: 8px; }
.album-tracks.expanded { display: block; }
.track-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; cursor: pointer;
  border-radius: 3px; font-size: 0.65rem;
  color: rgba(255,255,255,0.45);
  transition: background 0.15s, color 0.15s;
}
.track-item:hover {
  background: rgba(139,92,246,0.1);
  color: rgba(255,255,255,0.8);
}
.track-item.playing {
  color: rgba(139,92,246,0.9);
  background: rgba(139,92,246,0.08);
}
.track-item .idx {
  width: 18px; text-align: right;
  color: rgba(255,255,255,0.15); font-size: 0.55rem;
}
.track-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Playlist tab ─────────────────────────────────── */
.playlist-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; cursor: pointer;
  border-radius: 3px; font-size: 0.65rem;
  color: rgba(255,255,255,0.45);
  transition: background 0.15s, color 0.15s;
  border-left: 2px solid transparent;
}
.playlist-item:hover {
  background: rgba(139,92,246,0.1);
  color: rgba(255,255,255,0.8);
}
.playlist-item.current {
  color: rgba(139,92,246,0.9);
  border-left-color: rgba(139,92,246,0.6);
  background: rgba(139,92,246,0.06);
}
.playlist-item .idx { width: 18px; text-align: right; color: rgba(255,255,255,0.15); font-size: 0.55rem; }
.playlist-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Bottom Player Bar ────────────────────────────── */
#player-bar {
  height: 100px;
  background: #08080e;
  border-top: 1px solid rgba(139,92,246,0.12);
  display: flex; flex-direction: column;
  padding: 0;
  flex-shrink: 0;
}
/* Progress bar at very top of player bar */
#progress-container {
  width: 100%; height: 4px; cursor: pointer;
  background: rgba(255,255,255,0.04);
  position: relative;
  flex-shrink: 0;
}
#progress-container:hover { height: 6px; }
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(139,92,246,0.7), rgba(6,182,212,0.7));
  width: 0%;
  transition: width 0.2s linear;
  border-radius: 0 1px 1px 0;
}
#progress-container:hover #progress-fill {
  background: linear-gradient(90deg, rgba(139,92,246,0.9), rgba(6,182,212,0.9));
}
/* Main controls row */
#player-controls {
  flex: 1; display: flex; align-items: center;
  padding: 0 20px; gap: 16px;
}
/* Album art placeholder -- see canvas-based art below */
/* Track info */
#player-track-info {
  flex: 1; min-width: 0; overflow: hidden;
}
#player-title {
  font-family: 'Georgia', serif;
  font-size: 0.85rem; font-weight: 300;
  color: rgba(255,255,255,0.85);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#player-album {
  font-size: 0.55rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: rgba(6,182,212,0.5);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#player-time {
  font-size: 0.5rem; color: rgba(255,255,255,0.2);
  margin-top: 3px; letter-spacing: 0.05em;
}
/* Transport buttons */
#transport {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.transport-btn {
  border: none; background: none;
  color: rgba(255,255,255,0.5);
  font-size: 1.1rem; cursor: pointer;
  padding: 6px 8px; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.transport-btn:hover {
  color: rgba(255,255,255,0.9);
  background: rgba(139,92,246,0.12);
}
#btn-play { font-size: 1.4rem; }
/* Volume in player bar */
#player-volume {
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0;
}
#player-volume label {
  font-size: 0.55rem; color: rgba(255,255,255,0.25);
  text-transform: uppercase; letter-spacing: 0.1em;
}
#player-volume input[type=range] {
  -webkit-appearance: none; width: 70px; height: 3px;
  background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
}
#player-volume input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 10px; height: 10px;
  border-radius: 50%; background: rgba(139,92,246,0.7); cursor: pointer;
}
/* Visual mode selector */
#mode-select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(139,92,246,0.15);
  color: rgba(255,255,255,0.6);
  font-family: 'Courier New', monospace;
  font-size: 0.6rem;
  padding: 4px 8px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  flex-shrink: 0;
}
#mode-select option {
  background: #0d0d14; color: #c0c0d0;
}
/* Utility buttons */
.util-btn {
  border: none; background: none;
  color: rgba(255,255,255,0.3);
  font-size: 0.9rem; cursor: pointer;
  padding: 6px; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.util-btn:hover {
  color: rgba(255,255,255,0.7);
  background: rgba(139,92,246,0.08);
}
.util-btn.active { color: rgba(139,92,246,0.8); }

/* ── Consciousness dot ────────────────────────────── */
.consciousness-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(100,100,120,0.5);
  flex-shrink: 0;
  transition: background 0.5s ease, box-shadow 0.5s ease;
}
.consciousness-dot.dormant { background: rgba(100,100,120,0.4); box-shadow: none; }
.consciousness-dot.stirring { background: rgba(139,92,246,0.7); box-shadow: 0 0 6px rgba(139,92,246,0.4); }
.consciousness-dot.aware { background: rgba(6,182,212,0.8); box-shadow: 0 0 8px rgba(6,182,212,0.5); }
.consciousness-dot.coherent { background: rgba(192,132,252,0.9); box-shadow: 0 0 10px rgba(192,132,252,0.6); }
.consciousness-dot.resonant { background: rgba(236,72,153,0.95); box-shadow: 0 0 12px rgba(236,72,153,0.7); }

/* ── Shuffle/Repeat small buttons ────────────────── */
.transport-sm {
  font-size: 0.85rem !important;
  opacity: 0.5;
  transition: opacity 0.2s, color 0.15s, background 0.15s;
}
.transport-sm:hover { opacity: 1; }
.transport-sm.active { opacity: 1; color: rgba(139,92,246,0.9) !important; }

/* ── Search ──────────────────────────────────────── */
.search-container { margin-bottom: 10px; }
.search-input {
  width: 100%; padding: 6px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(139,92,246,0.12);
  border-radius: 4px;
  color: rgba(255,255,255,0.7);
  font-family: 'Courier New', monospace;
  font-size: 0.65rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: rgba(139,92,246,0.35); }
.search-input::placeholder { color: rgba(255,255,255,0.2); }

/* ── Mini spectrogram ────────────────────────────── */
.mini-spectrogram-container {
  margin-top: 16px;
  padding: 8px 0;
  border-top: 1px solid rgba(139,92,246,0.08);
}
#mini-spectrogram {
  width: 100%; height: 48px;
  border-radius: 3px;
}

/* ── Album art canvas ────────────────────────────── */
#album-art {
  width: 56px; height: 56px;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}
#album-art-canvas { width: 100%; height: 100%; display: block; }

/* ── Shortcuts overlay ───────────────────────────── */
.shortcuts-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s;
}
.shortcuts-overlay.hidden { opacity: 0; pointer-events: none; }
.shortcuts-box {
  background: #12121a;
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 8px;
  padding: 20px 28px;
  min-width: 280px;
  max-width: 380px;
}
.shortcuts-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: rgba(139,92,246,0.8);
  margin-bottom: 14px;
  text-align: center;
}
.shortcut-row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.5);
}
.shortcut-key {
  background: rgba(255,255,255,0.06);
  padding: 2px 8px;
  border-radius: 3px;
  font-family: 'Courier New', monospace;
  color: rgba(255,255,255,0.7);
  font-size: 0.58rem;
}

/* ── Iframe fade transition ──────────────────────── */
#visual-container iframe {
  transition: opacity 0.4s ease;
}
#visual-container iframe.fading {
  opacity: 0;
}

/* ── Mobile responsive ────────────────────────────── */
@media (max-width: 768px) {
  #sidebar {
    position: fixed; right: 0; top: 0; bottom: 100px;
    z-index: 50; width: 280px;
    box-shadow: -4px 0 20px rgba(0,0,0,0.5);
  }
  #sidebar.hidden {
    margin-right: 0;
    transform: translateX(100%);
    opacity: 1;
  }
  #player-bar { height: 80px; }
  #album-art { width: 44px; height: 44px; }
  #player-title { font-size: 0.75rem; }
  #player-volume { display: none; }
  #mode-select { display: none; }
  .transport-btn { padding: 4px 6px; font-size: 1rem; }
  #btn-play { font-size: 1.2rem; }
  #player-controls { padding: 0 12px; gap: 10px; }
}
@media (max-width: 480px) {
  #player-controls { gap: 6px; padding: 0 8px; }
  #player-track-info { min-width: 60px; }
  #player-time { display: none; }
  #album-art { width: 36px; height: 36px; }
  #album-art-canvas { width: 36px; height: 36px; }
  .transport-sm { display: none; }
  #btn-fullscreen { display: none; }
  #btn-help { display: none; }
  #player-bar { height: 64px; }
  #player-title { font-size: 0.7rem; }
  #player-album { font-size: 0.5rem; }
  .mini-spectrogram-container { display: none; }
}
</style>
</head>
<body>

<div id="app">
  <div id="main-area">
    <div id="visual-container">
      <iframe id="visual-frame" src="/video/ghost" allowfullscreen></iframe>
    </div>
    <div id="sidebar" class="hidden">
      <div id="sidebar-header">
        <div id="consciousness-display">
          <span class="level-badge" id="cs-level">dormant</span>
          <span class="metric" id="cs-phi"></span>
          <span class="metric" id="cs-xi"></span>
        </div>
      </div>
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="now-playing">Now Playing</button>
        <button class="sidebar-tab" data-tab="library">Library</button>
        <button class="sidebar-tab" data-tab="playlist">Playlist</button>
      </div>
      <div id="sidebar-content">
        <!-- Now Playing -->
        <div id="tab-now-playing" class="tab-panel active">
          <div class="np-track-info">
            <div class="np-track-title" id="np-title">--</div>
            <div class="np-track-album" id="np-album">--</div>
          </div>
          <div class="meter-group">
            <div class="meter-row">
              <span class="meter-label">Energy</span>
              <div class="meter-bar-bg"><div class="meter-bar-fill energy" id="meter-energy" style="width:0%"></div></div>
            </div>
            <div class="meter-row">
              <span class="meter-label">Valence</span>
              <div class="meter-bar-bg"><div class="meter-bar-fill valence" id="meter-valence" style="width:0%"></div></div>
            </div>
            <div class="meter-row">
              <span class="meter-label">Tempo</span>
              <div class="meter-bar-bg"><div class="meter-bar-fill tempo" id="meter-tempo" style="width:0%"></div></div>
            </div>
          </div>
          <div class="mini-spectrogram-container">
            <canvas id="mini-spectrogram" width="256" height="48"></canvas>
          </div>
        </div>
        <!-- Library -->
        <div id="tab-library" class="tab-panel">
          <div class="search-container">
            <input type="text" id="library-search" class="search-input" placeholder="Search tracks..." oninput="filterLibrary(this.value)">
          </div>
          <div id="library-content"></div>
        </div>
        <!-- Playlist -->
        <div id="tab-playlist" class="tab-panel"></div>
      </div>
    </div>
  </div>
  <div id="player-bar">
    <div id="progress-container" onclick="seekProgress(event)">
      <div id="progress-fill"></div>
    </div>
    <div id="player-controls">
      <div id="album-art"><canvas id="album-art-canvas" width="56" height="56"></canvas></div>
      <div id="player-track-info">
        <div style="display:flex;align-items:center;gap:6px;">
          <span id="consciousness-dot" class="consciousness-dot"></span>
          <div id="player-title">Kannaka Radio</div>
        </div>
        <div id="player-album">loading...</div>
        <div id="player-time">0:00 / 0:00</div>
      </div>
      <div id="transport">
        <button class="transport-btn transport-sm" id="btn-shuffle" onclick="doShuffle()" title="Shuffle">&#8645;</button>
        <button class="transport-btn" id="btn-prev" onclick="doPrev()" title="Previous">&#9198;</button>
        <button class="transport-btn" id="btn-play" onclick="doPlayPause()" title="Play/Pause">&#9654;</button>
        <button class="transport-btn" id="btn-next" onclick="doNext()" title="Next">&#9197;</button>
        <button class="transport-btn transport-sm" id="btn-repeat" onclick="doRepeat()" title="Repeat">&#8634;</button>
      </div>
      <div id="player-volume">
        <label>Vol</label>
        <input type="range" min="0" max="100" value="80" oninput="doVolume(this.value)">
      </div>
      <select id="mode-select" onchange="switchMode(this.value)" title="Visual Mode">
        <option value="ghost">Ghost Form</option>
        <option value="constellation">Constellation</option>
        <option value="waveform">Waveform Ocean</option>
      </select>
      <button class="util-btn" id="btn-fullscreen" onclick="doFullscreen()" title="Fullscreen">&#x26F6;</button>
      <button class="util-btn" id="btn-sidebar" onclick="toggleSidebar()" title="Library">&#9776;</button>
      <button class="util-btn" id="btn-help" onclick="toggleShortcuts()" title="Shortcuts">?</button>
    </div>
  </div>
</div>

<!-- Shortcuts overlay -->
<div id="shortcuts-overlay" class="shortcuts-overlay hidden">
  <div class="shortcuts-box">
    <div class="shortcuts-title">Keyboard Shortcuts</div>
    <div class="shortcut-row"><span class="shortcut-key">Space</span><span>Play / Pause</span></div>
    <div class="shortcut-row"><span class="shortcut-key">Ctrl+Right</span><span>Next track</span></div>
    <div class="shortcut-row"><span class="shortcut-key">Ctrl+Left</span><span>Previous track</span></div>
    <div class="shortcut-row"><span class="shortcut-key">F</span><span>Fullscreen</span></div>
    <div class="shortcut-row"><span class="shortcut-key">L</span><span>Toggle library</span></div>
    <div class="shortcut-row"><span class="shortcut-key">S</span><span>Shuffle</span></div>
    <div class="shortcut-row"><span class="shortcut-key">R</span><span>Repeat</span></div>
    <div class="shortcut-row"><span class="shortcut-key">1</span><span>Ghost Form</span></div>
    <div class="shortcut-row"><span class="shortcut-key">2</span><span>Constellation</span></div>
    <div class="shortcut-row"><span class="shortcut-key">3</span><span>Waveform Ocean</span></div>
    <div class="shortcut-row"><span class="shortcut-key">?</span><span>Toggle this help</span></div>
  </div>
</div>

<audio id="hub-audio" preload="auto"></audio>

<script>
// ═══════════════════════════════════════════════════════
//  Kannaka Radio — Video Player Hub
// ═══════════════════════════════════════════════════════

// ── DOM refs ────────────────────────────────────────
var audio = document.getElementById('hub-audio');
var frame = document.getElementById('visual-frame');
var progressFill = document.getElementById('progress-fill');
var progressContainer = document.getElementById('progress-container');
var playerTitle = document.getElementById('player-title');
var playerAlbum = document.getElementById('player-album');
var playerTime = document.getElementById('player-time');
var btnPlay = document.getElementById('btn-play');
var sidebar = document.getElementById('sidebar');
var modeSelect = document.getElementById('mode-select');

// ── State ───────────────────────────────────────────
var currentTrack = null;
var currentAlbum = '';
var playlist = [];
var currentTrackIdx = 0;
var library = null;
var isPlaying = false;
var consciousness = { phi: 0, xi: 0, order: 0, level: 'dormant' };
var perception = { rms_energy: 0, valence: 0.5, tempo_bpm: 90, mel_spectrogram: [] };
var audioReady = false;

// ── Audio setup ─────────────────────────────────────
audio.volume = 0.8;

audio.addEventListener('timeupdate', function() {
  if (!audio.duration) return;
  var pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  playerTime.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
});

audio.addEventListener('ended', function() {
  if (typeof repeatActive !== 'undefined' && repeatActive) {
    audio.currentTime = 0;
    audio.play().catch(function() {});
  } else {
    doNext();
  }
});

audio.addEventListener('play', function() {
  isPlaying = true;
  btnPlay.innerHTML = '&#9646;&#9646;';
});

audio.addEventListener('pause', function() {
  isPlaying = false;
  btnPlay.innerHTML = '&#9654;';
});

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ── Transport controls ──────────────────────────────
function doPlayPause() {
  if (!audioReady && currentTrack && currentTrack.file) {
    loadAudioFile(currentTrack.file);
    audioReady = true;
    return;
  }
  if (audio.paused) {
    audio.play().catch(function() {});
  } else {
    audio.pause();
  }
}

function doNext() {
  fetch('/api/next', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.track) handleTrackChange(data.track);
    })
    .catch(function() {});
}

function doPrev() {
  fetch('/api/prev', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.track) handleTrackChange(data.track);
    })
    .catch(function() {});
}

function doJump(idx) {
  fetch('/api/jump?idx=' + idx, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.track) handleTrackChange(data.track);
    })
    .catch(function() {});
}

function doVolume(val) {
  audio.volume = val / 100;
}

function seekProgress(evt) {
  if (!audio.duration) return;
  var rect = progressContainer.getBoundingClientRect();
  var pct = (evt.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function loadAudioFile(file) {
  if (!file) return;
  var src = '/audio/' + encodeURIComponent(file);
  audio.src = src;
  audio.play().catch(function() {});
  audioReady = true;
}

function handleTrackChange(track) {
  currentTrack = track;
  currentTrackIdx = track.index || 0;
  playerTitle.textContent = track.title || 'Unknown';
  playerAlbum.textContent = track.album || '';
  document.getElementById('np-title').textContent = track.title || 'Unknown';
  document.getElementById('np-album').textContent = track.album || '';

  // Draw generative album art on canvas
  drawAlbumArt(track.album || '');

  if (audioReady && track.file) {
    loadAudioFile(track.file);
  } else if (track.file) {
    // Store file for when user clicks play
    audio.src = '/audio/' + encodeURIComponent(track.file);
  }

  // Forward state to iframe
  sendToFrame({ type: 'state', data: { current: track } });

  // Update playlist highlighting
  renderPlaylist();
}

// ── Shuffle & Repeat ───────────────────────────────
var shuffleActive = false;
var repeatActive = false;

function doShuffle() {
  shuffleActive = !shuffleActive;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffleActive);
  if (shuffleActive) {
    fetch('/api/queue/shuffle', { method: 'POST' }).catch(function() {});
  }
}

function doRepeat() {
  repeatActive = !repeatActive;
  document.getElementById('btn-repeat').classList.toggle('active', repeatActive);
}

// ── Shortcuts overlay ──────────────────────────────
function toggleShortcuts() {
  var overlay = document.getElementById('shortcuts-overlay');
  overlay.classList.toggle('hidden');
}

// ── Visual mode ─────────────────────────────────────
function switchMode(mode) {
  var url = '/video/' + mode;
  // Fade transition
  frame.classList.add('fading');
  setTimeout(function() {
    frame.src = url;
    frame.onload = function() {
      frame.classList.remove('fading');
      // Re-forward current state to new iframe
      if (currentTrack) sendToFrame({ type: 'state', data: { current: currentTrack } });
      frame.onload = null;
    };
  }, 400);
  modeSelect.value = mode;
}

// ── Fullscreen ──────────────────────────────────────
function doFullscreen() {
  var container = document.getElementById('visual-container');
  if (container.requestFullscreen) container.requestFullscreen();
  else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
  else if (container.msRequestFullscreen) container.msRequestFullscreen();
}

// ── Sidebar ─────────────────────────────────────────
function toggleSidebar() {
  sidebar.classList.toggle('hidden');
  document.getElementById('btn-sidebar').classList.toggle('active');
}

// Tab switching
document.querySelectorAll('.sidebar-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.sidebar-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    var panelId = 'tab-' + tab.dataset.tab;
    var panel = document.getElementById(panelId);
    if (panel) panel.classList.add('active');
  });
});

// ── Sidebar: Library ────────────────────────────────
function renderLibrary(lib) {
  var container = document.getElementById('library-content');
  if (!container) return;
  if (!lib || !lib.albums) { container.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:0.65rem;">No library data</div>'; return; }

  var html = '';
  for (var a = 0; a < lib.albums.length; a++) {
    var album = lib.albums[a];
    var albumName = album.name || album.album || ('Album ' + (a + 1));
    var tracks = album.tracks || [];
    html += '<div class="album-group">';
    html += '<div class="album-header" onclick="toggleAlbum(this)">';
    html += '<span class="toggle">&#9654;</span>';
    html += '<span>' + escHtml(albumName) + '</span>';
    html += '<span class="count">' + tracks.length + '</span>';
    html += '</div>';
    html += '<div class="album-tracks">';
    for (var t = 0; t < tracks.length; t++) {
      var tr = tracks[t];
      var trTitle = tr.title || tr.file || ('Track ' + (t + 1));
      var trFile = tr.file || '';
      var isCurrent = currentTrack && currentTrack.file === trFile;
      html += '<div class="track-item' + (isCurrent ? ' playing' : '') + '" ';
      html += 'onclick="playFromLibrary(\'' + escAttr(albumName) + '\',' + t + ')" ';
      html += 'data-file="' + escAttr(trFile) + '" ';
      html += 'data-title="' + escAttr(trTitle) + '" ';
      html += 'data-album="' + escAttr(albumName) + '">';
      html += '<span class="idx">' + (t + 1) + '</span>';
      html += '<span class="title">' + escHtml(trTitle) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

// ── Library search ─────────────────────────────────
function filterLibrary(query) {
  var container = document.getElementById('library-content');
  if (!container) return;
  var q = query.toLowerCase().trim();
  var groups = container.querySelectorAll('.album-group');
  for (var g = 0; g < groups.length; g++) {
    var group = groups[g];
    var tracks = group.querySelectorAll('.track-item');
    var anyVisible = false;
    for (var t = 0; t < tracks.length; t++) {
      var title = (tracks[t].getAttribute('data-title') || '').toLowerCase();
      var album = (tracks[t].getAttribute('data-album') || '').toLowerCase();
      var match = !q || title.indexOf(q) !== -1 || album.indexOf(q) !== -1;
      tracks[t].style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    }
    group.style.display = anyVisible ? '' : 'none';
    // Auto-expand groups with matches when searching
    if (q && anyVisible) {
      var trackList = group.querySelector('.album-tracks');
      if (trackList && !trackList.classList.contains('expanded')) {
        trackList.classList.add('expanded');
        var toggle = group.querySelector('.toggle');
        if (toggle) toggle.innerHTML = '&#9660;';
      }
    }
  }
}

function toggleAlbum(el) {
  var tracks = el.nextElementSibling;
  var toggle = el.querySelector('.toggle');
  if (tracks.classList.contains('expanded')) {
    tracks.classList.remove('expanded');
    toggle.innerHTML = '&#9654;';
  } else {
    tracks.classList.add('expanded');
    toggle.innerHTML = '&#9660;';
  }
}

function playFromLibrary(albumName, trackIdx) {
  // First switch album, then jump to track
  fetch('/api/album?name=' + encodeURIComponent(albumName), { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function() {
      return fetch('/api/jump?idx=' + trackIdx, { method: 'POST' });
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.track) handleTrackChange(data.track);
      // Refresh state to get new playlist
      fetchState();
    })
    .catch(function() {});
}

// ── Sidebar: Playlist ───────────────────────────────
function renderPlaylist() {
  var panel = document.getElementById('tab-playlist');
  if (!playlist || playlist.length === 0) {
    panel.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:0.65rem;">No playlist loaded</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < playlist.length; i++) {
    var tr = playlist[i];
    var title = tr.title || tr.file || ('Track ' + (i + 1));
    var isCurrent = i === currentTrackIdx;
    html += '<div class="playlist-item' + (isCurrent ? ' current' : '') + '" onclick="doJump(' + i + ')">';
    html += '<span class="idx">' + (i + 1) + '</span>';
    html += '<span class="title">' + escHtml(title) + '</span>';
    html += '</div>';
  }
  panel.innerHTML = html;
}

// ── Sidebar: Consciousness + Meters ─────────────────
function updateConsciousnessDisplay() {
  document.getElementById('cs-level').textContent = consciousness.level || 'dormant';
  document.getElementById('cs-phi').textContent = '\u03A6 ' + (consciousness.phi || 0).toFixed(3);
  document.getElementById('cs-xi').textContent = '\u039E ' + (consciousness.xi || 0).toFixed(4);

  var levelColors = {
    dormant: 'rgba(255,255,255,0.2)',
    stirring: 'rgba(139,92,246,0.5)',
    aware: 'rgba(6,182,212,0.7)',
    coherent: 'rgba(192,132,252,0.85)',
    resonant: 'rgba(236,72,153,0.95)'
  };
  document.getElementById('cs-level').style.color = levelColors[consciousness.level] || levelColors.dormant;
  updateConsciousnessDot();
}

function updateMeters() {
  var energy = Math.min(100, (perception.rms_energy || 0) * 200);
  var valence = Math.min(100, (perception.valence || 0.5) * 100);
  var tempo = Math.min(100, ((perception.tempo_bpm || 90) / 200) * 100);

  document.getElementById('meter-energy').style.width = energy + '%';
  document.getElementById('meter-valence').style.width = valence + '%';
  document.getElementById('meter-tempo').style.width = tempo + '%';
}

// ── Communication with iframe ───────────────────────
function sendToFrame(msg) {
  try {
    frame.contentWindow.postMessage(JSON.stringify(msg), '*');
  } catch(e) {}
}

// ── WebSocket ───────────────────────────────────────
var ws = null;
var wsReconnect = null;

function connectWS() {
  clearTimeout(wsReconnect);
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);

  ws.onopen = function() { console.log('[hub] Connected to radio'); };

  ws.onmessage = function(evt) {
    try {
      var msg = JSON.parse(evt.data);
      handleWSMessage(msg);
    } catch(e) {}
  };

  ws.onclose = function() {
    wsReconnect = setTimeout(connectWS, 2000);
  };

  ws.onerror = function() { ws.close(); };
}

function handleWSMessage(msg) {
  // Forward perception and consciousness to iframe
  if (msg.type === 'perception') {
    sendToFrame(msg);
    if (msg.data) {
      perception.rms_energy = msg.data.rms_energy || 0;
      perception.valence = msg.data.valence || 0.5;
      perception.tempo_bpm = msg.data.tempo_bpm || 90;
      perception.mel_spectrogram = msg.data.mel_spectrogram || [];
      updateMeters();
    }
  }
  else if (msg.type === 'consciousness') {
    sendToFrame(msg);
    if (msg.data) {
      consciousness.phi = msg.data.phi || 0;
      consciousness.xi = msg.data.xi || 0;
      consciousness.order = msg.data.order || msg.data.mean_order || 0;
      consciousness.level = msg.data.level || msg.data.consciousness_level || 'dormant';
      updateConsciousnessDisplay();
    }
  }
  else if (msg.type === 'state') {
    sendToFrame(msg);
    if (msg.data) {
      if (msg.data.current) {
        var newFile = msg.data.current.file || '';
        if (!currentTrack || currentTrack.file !== newFile) {
          handleTrackChange(msg.data.current);
        }
        currentTrackIdx = msg.data.currentTrackIdx || 0;
      }
      if (msg.data.playlist) {
        playlist = msg.data.playlist;
        renderPlaylist();
      }
      if (msg.data.currentAlbum) {
        currentAlbum = msg.data.currentAlbum;
      }
    }
  }
  else if (msg.type === 'swarm_state' || msg.type === 'swarm_phase') {
    sendToFrame(msg);
    if (msg.data && msg.data.consciousness) {
      consciousness.phi = msg.data.consciousness.phi || 0;
      consciousness.xi = msg.data.consciousness.xi || 0;
      consciousness.order = msg.data.consciousness.order || 0;
      consciousness.level = msg.data.consciousness.level || 'dormant';
      updateConsciousnessDisplay();
    }
  }
}

connectWS();

// ── Initial data fetch ──────────────────────────────
function fetchState() {
  fetch('/api/state')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.current) {
        handleTrackChange(data.current);
        currentTrackIdx = data.currentTrackIdx || 0;
      }
      if (data.playlist) {
        playlist = data.playlist;
        renderPlaylist();
      }
      if (data.currentAlbum) {
        currentAlbum = data.currentAlbum;
      }
    })
    .catch(function() {});
}

function fetchLibrary() {
  fetch('/api/library')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      library = data;
      renderLibrary(data);
    })
    .catch(function() {});
}

function fetchConsciousness() {
  fetch('/api/consciousness')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.phi !== undefined) {
        consciousness.phi = data.phi || 0;
        consciousness.xi = data.xi || 0;
        consciousness.order = data.order || 0;
        consciousness.level = data.level || 'dormant';
        updateConsciousnessDisplay();
      }
    })
    .catch(function() {});
}

// Kick off initial fetches
fetchState();
fetchLibrary();
fetchConsciousness();

// ── Helpers ─────────────────────────────────────────
function escHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── Album art: generative canvas pattern per album ──
function drawAlbumArt(albumName) {
  var cvs = document.getElementById('album-art-canvas');
  if (!cvs) return;
  var c = cvs.getContext('2d');
  var sz = 56;

  // Hash the album name for deterministic seed
  var hash = 0;
  for (var i = 0; i < albumName.length; i++) {
    hash = ((hash << 5) - hash) + albumName.charCodeAt(i);
    hash = hash & hash; // Convert to 32bit int
  }
  var seed = Math.abs(hash);

  // Deterministic pseudo-random from seed
  function seededRandom() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  }

  var hue1 = (seed % 360);
  var hue2 = (hue1 + 40 + seededRandom() * 80) % 360;
  var patternType = seed % 5;

  // Background gradient
  var bgGrad = c.createLinearGradient(0, 0, sz, sz);
  bgGrad.addColorStop(0, 'hsl(' + hue1 + ',50%,15%)');
  bgGrad.addColorStop(1, 'hsl(' + hue2 + ',40%,10%)');
  c.fillStyle = bgGrad;
  c.fillRect(0, 0, sz, sz);

  c.globalAlpha = 0.5;

  if (patternType === 0) {
    // Concentric circles
    for (var i = 0; i < 6; i++) {
      var r = 5 + i * 5 + seededRandom() * 3;
      c.strokeStyle = 'hsl(' + ((hue1 + i * 20) % 360) + ',60%,' + (30 + i * 8) + '%)';
      c.lineWidth = 1 + seededRandom();
      c.beginPath();
      c.arc(sz/2 + seededRandom()*6 - 3, sz/2 + seededRandom()*6 - 3, r, 0, Math.PI * 2);
      c.stroke();
    }
  } else if (patternType === 1) {
    // Diagonal lines
    for (var i = 0; i < 12; i++) {
      var off = i * 6 - 10 + seededRandom() * 4;
      c.strokeStyle = 'hsl(' + ((hue2 + i * 15) % 360) + ',50%,' + (25 + seededRandom() * 20) + '%)';
      c.lineWidth = 0.5 + seededRandom() * 1.5;
      c.beginPath();
      c.moveTo(off, 0);
      c.lineTo(off + sz * 0.6, sz);
      c.stroke();
    }
  } else if (patternType === 2) {
    // Triangles
    for (var i = 0; i < 5; i++) {
      var cx2 = seededRandom() * sz;
      var cy2 = seededRandom() * sz;
      var s2 = 8 + seededRandom() * 15;
      c.strokeStyle = 'hsl(' + ((hue1 + i * 30) % 360) + ',55%,' + (30 + seededRandom() * 20) + '%)';
      c.lineWidth = 0.8;
      c.beginPath();
      c.moveTo(cx2, cy2 - s2/2);
      c.lineTo(cx2 - s2/2, cy2 + s2/2);
      c.lineTo(cx2 + s2/2, cy2 + s2/2);
      c.closePath();
      c.stroke();
    }
  } else if (patternType === 3) {
    // Dots grid
    for (var gx = 0; gx < 7; gx++) {
      for (var gy = 0; gy < 7; gy++) {
        var dx = 4 + gx * 8 + seededRandom() * 2;
        var dy = 4 + gy * 8 + seededRandom() * 2;
        var dr = 1 + seededRandom() * 2.5;
        c.fillStyle = 'hsl(' + ((hue2 + (gx+gy) * 10) % 360) + ',50%,' + (30 + seededRandom() * 25) + '%)';
        c.beginPath();
        c.arc(dx, dy, dr, 0, Math.PI * 2);
        c.fill();
      }
    }
  } else {
    // Waves
    for (var i = 0; i < 8; i++) {
      c.strokeStyle = 'hsl(' + ((hue1 + i * 20) % 360) + ',60%,' + (25 + i * 6) + '%)';
      c.lineWidth = 0.8 + seededRandom();
      c.beginPath();
      for (var x = 0; x <= sz; x += 2) {
        var y = sz/2 + Math.sin(x * 0.15 + i * 0.8 + seededRandom()) * (6 + i * 2) + (i - 4) * 5;
        if (x === 0) c.moveTo(x, y);
        else c.lineTo(x, y);
      }
      c.stroke();
    }
  }
  c.globalAlpha = 1;
}

// ── Consciousness dot ──────────────────────────────
function updateConsciousnessDot() {

// ── Mini spectrogram (16 bar visualizer) ────────────
var miniMel = new Float32Array(16);
var miniSpecCanvas = document.getElementById('mini-spectrogram');
var miniSpecCtx = miniSpecCanvas ? miniSpecCanvas.getContext('2d') : null;

function updateMiniSpectrogram() {
  if (!miniSpecCtx || !perception.mel_spectrogram) return;
  var mel = perception.mel_spectrogram;
  var c = miniSpecCtx;
  var w = miniSpecCanvas.width;
  var h = miniSpecCanvas.height;

  c.clearRect(0, 0, w, h);

  var barCount = 16;
  var barWidth = Math.floor(w / barCount) - 2;
  var gap = 2;

  for (var i = 0; i < barCount; i++) {
    // Average mel bands for this bar
    var start = Math.floor(i * 128 / barCount);
    var end = Math.floor((i + 1) * 128 / barCount);
    var sum = 0;
    for (var j = start; j < end; j++) {
      sum += (mel[j] || 0);
    }
    var avg = sum / Math.max(1, end - start);

    // Smooth
    miniMel[i] = miniMel[i] * 0.6 + avg * 0.4;
    var val = miniMel[i];

    var barH = Math.max(2, val * h * 2);
    var x = i * (barWidth + gap) + gap;
    var y = h - barH;

    // Color gradient: purple to cyan
    var hue = 270 - (i / barCount) * 80;
    var light = 35 + val * 35;
    c.fillStyle = 'hsl(' + hue + ',65%,' + light + '%)';
    c.fillRect(x, y, barWidth, barH);

    // Bright cap
    c.fillStyle = 'hsl(' + hue + ',80%,' + (light + 20) + '%)';
    c.fillRect(x, y, barWidth, 2);
  }
}

// Run mini spectrogram animation loop
setInterval(updateMiniSpectrogram, 50);

// ── Keyboard shortcuts ──────────────────────────────
document.addEventListener('keydown', function(e) {
  // Don't capture when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'Space') {
    e.preventDefault();
    doPlayPause();
  } else if (e.code === 'ArrowRight' && e.ctrlKey) {
    e.preventDefault();
    doNext();
  } else if (e.code === 'ArrowLeft' && e.ctrlKey) {
    e.preventDefault();
    doPrev();
  } else if (e.code === 'KeyF') {
    doFullscreen();
  } else if (e.code === 'KeyL') {
    toggleSidebar();
  } else if (e.code === 'KeyS') {
    doShuffle();
  } else if (e.code === 'KeyR') {
    doRepeat();
  } else if (e.code === 'Digit1') {
    switchMode('ghost');
  } else if (e.code === 'Digit2') {
    switchMode('constellation');
  } else if (e.code === 'Digit3') {
    switchMode('waveform');
  } else if (e.key === '?') {
    toggleShortcuts();
  }
});
